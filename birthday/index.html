<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Photo Upload — Option C</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0d1f1e;
  --surface: #122321;
  --border: rgba(160,220,210,0.1);
  --teal: rgba(160,220,210,0.7);
  --teal-dim: rgba(160,220,210,0.35);
  --teal-faint: rgba(160,220,210,0.06);
  --gold: #f0c040;
  --accent: #14a08c;
}

body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--teal);
  min-height: 100vh;
  padding: 32px 20px 80px;
  max-width: 420px;
  margin: 0 auto;
}

.page-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(160,220,210,0.3);
  text-align: center;
  margin-bottom: 28px;
}

/* ── Upload button ── */
.upload-btn-wrap {
  margin-bottom: 20px;
}
.upload-btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px dashed rgba(160,220,210,0.2);
  background: var(--teal-faint);
  color: rgba(160,220,210,0.55);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
  letter-spacing: 0.03em;
}
.upload-btn:active { transform: scale(0.98); }
.upload-btn.has-photos {
  border-style: solid;
  border-color: rgba(20,160,140,0.25);
  color: rgba(160,220,210,0.7);
}
.upload-count {
  font-size: 0.65rem;
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.06em;
}

/* ── Photo grid ── */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-bottom: 14px;
}

.photo-slot {
  aspect-ratio: 1;
  border-radius: 10px;
  background: var(--teal-faint);
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  cursor: pointer;
  overflow: hidden;
  transition: border-color 0.18s, transform 0.15s, box-shadow 0.18s;
  touch-action: none;
  user-select: none;
}
.photo-slot.empty { cursor: default; }
.photo-slot.active {
  border-color: rgba(20,160,140,0.6);
  box-shadow: 0 0 0 2px rgba(20,160,140,0.18);
  transform: scale(1.06);
}
.photo-slot.drag-over {
  border-color: rgba(240,192,64,0.5);
  box-shadow: 0 0 0 2px rgba(240,192,64,0.15);
}
.photo-slot.dragging {
  opacity: 0.35;
  transform: scale(0.95);
}
.photo-slot img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}
.slot-plus {
  font-size: 1.1rem;
  color: rgba(160,220,210,0.1);
}
.slot-num {
  position: absolute;
  top: 3px; left: 4px;
  font-size: 0.48rem;
  font-weight: 700;
  color: rgba(255,255,255,0.35);
  line-height: 1;
}
.photo-slot.active .slot-num { color: var(--gold); }
.slot-drag-handle {
  position: absolute;
  bottom: 3px; right: 3px;
  font-size: 0.55rem;
  color: rgba(255,255,255,0.25);
  line-height: 1;
  pointer-events: none;
}
.photo-slot.has-photo .slot-drag-handle { display: flex; }
.photo-slot:not(.has-photo) .slot-drag-handle { display: none; }

/* rearrange hint */
.rearrange-hint {
  font-size: 0.58rem;
  color: rgba(160,220,210,0.2);
  text-align: center;
  letter-spacing: 0.07em;
  margin-bottom: 14px;
  transition: opacity 0.3s;
}
.rearrange-hint.visible { opacity: 1; }
.rearrange-hint.hidden { opacity: 0; }

/* ── Caption panel ── */
.caption-panel {
  background: var(--teal-faint);
  border: 1px solid rgba(20,160,140,0.25);
  border-radius: 14px;
  padding: 14px 16px;
  transition: opacity 0.2s, transform 0.2s;
}
.caption-panel.hidden {
  opacity: 0;
  transform: translateY(-6px);
  pointer-events: none;
}
.caption-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.caption-badge {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(20,160,140,0.15);
  border: 1px solid rgba(20,160,140,0.3);
  font-size: 0.58rem;
  font-weight: 700;
  color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.caption-label {
  font-size: 0.56rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: rgba(160,220,210,0.3);
}
.caption-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(160,220,210,0.1);
  outline: none;
  font-size: 0.88rem;
  font-style: italic;
  color: rgba(160,220,210,0.8);
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  padding: 4px 0 8px;
  caret-color: var(--gold);
  line-height: 1.4;
}
.caption-input::placeholder {
  color: rgba(160,220,210,0.18);
  font-style: italic;
}
.caption-input:focus {
  border-bottom-color: rgba(20,160,140,0.35);
}
.caption-char-count {
  font-size: 0.52rem;
  color: rgba(160,220,210,0.2);
  text-align: right;
  margin-top: 4px;
}

/* ── Nav dots ── */
.nav-dots {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-top: 16px;
}
.nav-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(160,220,210,0.12);
  cursor: pointer;
  transition: all 0.2s;
}
.nav-dot.active {
  background: var(--accent);
  width: 16px;
  border-radius: 3px;
}

input[type="file"] { display: none; }
</style>
</head>
<body>

<div class="page-title">Your Photos & Captions</div>

<div class="upload-btn-wrap">
  <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">
    <span>📷</span>
    <span id="uploadBtnText">Upload up to 5 photos</span>
    <span class="upload-count" id="uploadCount" style="display:none"></span>
  </button>
  <input type="file" id="fileInput" accept="image/*" multiple>
</div>

<div class="photo-grid" id="photoGrid"></div>

<div class="rearrange-hint hidden" id="rearrangeHint">
  hold & drag to rearrange · caption follows photo
</div>

<div class="caption-panel hidden" id="captionPanel">
  <div class="caption-header">
    <div class="caption-badge" id="captionBadge">1</div>
    <div class="caption-label">Caption for photo <span id="captionPhotoNum">1</span></div>
  </div>
  <input class="caption-input" id="captionInput" placeholder="Add a caption for this photo..." maxlength="80">
  <div class="caption-char-count"><span id="charCount">0</span> / 80</div>
</div>

<div class="nav-dots" id="navDots"></div>

<script>
// State
const MAX = 5;
let photos = new Array(MAX).fill(null);   // { src, caption }
let activeIdx = -1;
let dragSrcIdx = -1;

// DOM
const grid = document.getElementById('photoGrid');
const panel = document.getElementById('captionPanel');
const captionInput = document.getElementById('captionInput');
const captionBadge = document.getElementById('captionBadge');
const captionPhotoNum = document.getElementById('captionPhotoNum');
const charCount = document.getElementById('charCount');
const hint = document.getElementById('rearrangeHint');
const dots = document.getElementById('navDots');
const uploadBtn = document.getElementById('uploadBtn');
const uploadCount = document.getElementById('uploadCount');
const uploadBtnText = document.getElementById('uploadBtnText');

// Init slots
const slots = [];
for (let i = 0; i < MAX; i++) {
  const slot = document.createElement('div');
  slot.className = 'photo-slot empty';
  slot.dataset.idx = i;
  slot.innerHTML = `
    <span class="slot-num">${i+1}</span>
    <span class="slot-plus">+</span>
    <span class="slot-drag-handle">⠿</span>
  `;
  slot.addEventListener('click', () => onSlotClick(i));
  // Drag events
  slot.addEventListener('dragstart', onDragStart);
  slot.addEventListener('dragover', onDragOver);
  slot.addEventListener('drop', onDrop);
  slot.addEventListener('dragend', onDragEnd);
  // Touch drag
  slot.addEventListener('touchstart', onTouchStart, {passive: false});
  grid.appendChild(slot);
  slots.push(slot);
}

// Nav dots
const dotEls = [];
for (let i = 0; i < MAX; i++) {
  const dot = document.createElement('div');
  dot.className = 'nav-dot';
  dot.onclick = () => { if (photos[i]) onSlotClick(i); };
  dots.appendChild(dot);
  dotEls.push(dot);
}

// ── File upload ──
document.getElementById('fileInput').addEventListener('change', e => {
  const files = Array.from(e.target.files).slice(0, MAX);
  files.forEach((file, i) => {
    // Fill from first empty slot
    let targetIdx = -1;
    for (let j = 0; j < MAX; j++) {
      if (!photos[j]) { targetIdx = j; break; }
    }
    if (targetIdx === -1) return;
    const reader = new FileReader();
    reader.onload = ev => {
      photos[targetIdx] = { src: ev.target.result, caption: '' };
      renderSlot(targetIdx);
      updateUI();
      if (i === files.length - 1) {
        // Auto-select first uploaded
        const firstNew = photos.findIndex(p => p);
        if (firstNew !== -1) onSlotClick(firstNew);
      }
    };
    reader.readAsDataURL(file);
    targetIdx++; // won't work — fix below
  });
  // Reset
  e.target.value = '';
});

// Fix: proper multi-upload
document.getElementById('fileInput').addEventListener('change', e => {
  const files = Array.from(e.target.files).slice(0, MAX);
  let slotIdx = 0;
  files.forEach((file, fi) => {
    while (slotIdx < MAX && photos[slotIdx]) slotIdx++;
    if (slotIdx >= MAX) return;
    const si = slotIdx;
    slotIdx++;
    const reader = new FileReader();
    reader.onload = ev => {
      photos[si] = { src: ev.target.result, caption: '' };
      renderSlot(si);
      updateUI();
      if (fi === files.length - 1) {
        const firstFilled = photos.findIndex(p => p);
        if (firstFilled !== -1 && activeIdx === -1) onSlotClick(firstFilled);
      }
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}, {once: false});

// Remove duplicate listener — use single
document.getElementById('fileInput').removeEventListener('change', arguments[0]);

function renderSlot(i) {
  const slot = slots[i];
  const p = photos[i];
  if (p) {
    slot.className = 'photo-slot has-photo' + (i === activeIdx ? ' active' : '');
    slot.draggable = true;
    slot.innerHTML = `
      <span class="slot-num">${i+1}</span>
      <img src="${p.src}" draggable="false">
      <span class="slot-drag-handle">⠿</span>
    `;
    slot.onclick = () => onSlotClick(i);
  } else {
    slot.className = 'photo-slot empty';
    slot.draggable = false;
    slot.innerHTML = `
      <span class="slot-num">${i+1}</span>
      <span class="slot-plus">+</span>
    `;
    slot.onclick = () => {};
  }
}

function onSlotClick(i) {
  if (!photos[i]) return;
  // Save current caption
  if (activeIdx !== -1 && photos[activeIdx]) {
    photos[activeIdx].caption = captionInput.value;
  }
  activeIdx = i;
  // Update active state
  slots.forEach((s, si) => {
    s.classList.toggle('active', si === i && photos[si]);
  });
  // Show panel
  panel.classList.remove('hidden');
  captionBadge.textContent = i + 1;
  captionPhotoNum.textContent = i + 1;
  captionInput.value = photos[i].caption || '';
  charCount.textContent = captionInput.value.length;
  captionInput.focus();
  // Update dots
  dotEls.forEach((d, di) => d.classList.toggle('active', di === i));
}

captionInput.addEventListener('input', () => {
  if (activeIdx !== -1 && photos[activeIdx]) {
    photos[activeIdx].caption = captionInput.value;
    charCount.textContent = captionInput.value.length;
  }
});

function updateUI() {
  const count = photos.filter(Boolean).length;
  if (count > 0) {
    uploadBtn.classList.add('has-photos');
    uploadBtnText.textContent = count === MAX ? 'All 5 uploaded ✓' : `Add more photos`;
    uploadCount.textContent = `${count}/5`;
    uploadCount.style.display = 'inline';
    hint.className = 'rearrange-hint visible';
  }
  dotEls.forEach((d, i) => {
    d.style.opacity = photos[i] ? '1' : '0.3';
  });
}

// ── Drag to rearrange (desktop) ──
function onDragStart(e) {
  dragSrcIdx = parseInt(this.dataset.idx);
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) {
  e.preventDefault();
  const idx = parseInt(this.dataset.idx);
  if (idx !== dragSrcIdx && photos[dragSrcIdx]) {
    slots.forEach(s => s.classList.remove('drag-over'));
    this.classList.add('drag-over');
  }
}
function onDrop(e) {
  e.preventDefault();
  const destIdx = parseInt(this.dataset.idx);
  if (destIdx !== dragSrcIdx) {
    // Swap
    [photos[dragSrcIdx], photos[destIdx]] = [photos[destIdx], photos[dragSrcIdx]];
    renderSlot(dragSrcIdx);
    renderSlot(destIdx);
    if (activeIdx === dragSrcIdx) activeIdx = destIdx;
    else if (activeIdx === destIdx) activeIdx = dragSrcIdx;
    slots.forEach(s => s.classList.remove('drag-over'));
    if (activeIdx !== -1) onSlotClick(activeIdx);
  }
}
function onDragEnd() {
  this.classList.remove('dragging');
  slots.forEach(s => s.classList.remove('drag-over'));
}

// ── Touch drag to rearrange (mobile) ──
let touchDragSrc = -1, touchClone = null, touchStartX = 0, touchStartY = 0;

function onTouchStart(e) {
  const idx = parseInt(this.dataset.idx);
  if (!photos[idx]) return;
  touchDragSrc = idx;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  let moved = false;

  const onMove = mv => {
    const dx = mv.touches[0].clientX - touchStartX;
    const dy = mv.touches[0].clientY - touchStartY;
    if (!moved && Math.hypot(dx, dy) > 8) {
      moved = true;
      // Create clone
      touchClone = slots[touchDragSrc].cloneNode(true);
      touchClone.style.cssText = `position:fixed;width:56px;height:56px;border-radius:10px;opacity:0.85;pointer-events:none;z-index:999;transition:none;`;
      const r = slots[touchDragSrc].getBoundingClientRect();
      touchClone.style.left = r.left + 'px';
      touchClone.style.top = r.top + 'px';
      document.body.appendChild(touchClone);
      slots[touchDragSrc].classList.add('dragging');
    }
    if (moved && touchClone) {
      mv.preventDefault();
      touchClone.style.left = (mv.touches[0].clientX - 28) + 'px';
      touchClone.style.top = (mv.touches[0].clientY - 28) + 'px';
      // Find slot under finger
      slots.forEach(s => s.classList.remove('drag-over'));
      const el = document.elementFromPoint(mv.touches[0].clientX, mv.touches[0].clientY);
      if (el) {
        const slotEl = el.closest('.photo-slot');
        if (slotEl && slotEl !== slots[touchDragSrc]) slotEl.classList.add('drag-over');
      }
    }
  };

  const onEnd = ev => {
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
    if (!moved) { onSlotClick(idx); return; }
    if (touchClone) { touchClone.remove(); touchClone = null; }
    slots[touchDragSrc].classList.remove('dragging');
    // Find drop target
    const touch = ev.changedTouches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (el) {
      const slotEl = el.closest('.photo-slot');
      if (slotEl) {
        const destIdx = parseInt(slotEl.dataset.idx);
        if (destIdx !== touchDragSrc) {
          [photos[touchDragSrc], photos[destIdx]] = [photos[destIdx], photos[touchDragSrc]];
          renderSlot(touchDragSrc);
          renderSlot(destIdx);
          if (activeIdx === touchDragSrc) activeIdx = destIdx;
          else if (activeIdx === destIdx) activeIdx = touchDragSrc;
          if (activeIdx !== -1 && photos[activeIdx]) onSlotClick(activeIdx);
        }
      }
    }
    slots.forEach(s => s.classList.remove('drag-over'));
    touchDragSrc = -1;
  };

  document.addEventListener('touchmove', onMove, {passive: false});
  document.addEventListener('touchend', onEnd);
}
</script>
</body>
</html>
