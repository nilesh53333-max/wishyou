<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WishYou.ai — Unboxing Birthday Card 🎁</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎁</text></svg>">
<meta property="og:title" content="You have a birthday gift to unbox! 🎁">
<meta property="og:description" content="Tap to unbox your birthday surprise — photos, music & a letter inside.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+Devanagari&display=swap" rel="stylesheet">
<style>
/* ── BASE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#1a0a00;}
.app{position:fixed;inset:0;overflow:hidden;background:#1a0a00;}
@media(min-width:500px){
  .app{top:50%;left:50%;right:auto;bottom:auto;transform:translate(-50%,-50%);
    width:430px;height:90vh;max-height:900px;border-radius:40px;
    box-shadow:0 40px 120px rgba(0,0,0,0.9);}
}

/* ── SCREEN SYSTEM ── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.5s ease;overflow:hidden;}
.screen.active{opacity:1;pointer-events:all;}
.screen.slide-out{opacity:0;}

/* ── LOADING ── */
#rv-loading{background:linear-gradient(160deg,#2d1a00,#1a0a00);align-items:center;justify-content:center;gap:16px;}
.load-box{font-size:3.2rem;animation:loadBounce 0.8s ease-in-out infinite;}
@keyframes loadBounce{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-14px) scale(1.08);}}
.load-text{font-family:'Cormorant Garamond',serif;font-size:1rem;color:rgba(255,200,100,0.5);letter-spacing:0.08em;}

/* ── ERROR ── */
#rv-error{background:linear-gradient(160deg,#2d1a00,#1a0a00);align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px;gap:14px;}
.err-emoji{font-size:3rem;}
.err-text{font-family:'Cormorant Garamond',serif;font-size:1rem;color:rgba(255,200,100,0.5);line-height:1.8;}

/* ── WELCOME ── */
#rv-welcome{background:linear-gradient(160deg,#2d1a00,#1a0a00);align-items:center;justify-content:center;flex-direction:column;padding:40px 28px;}
.wlc-tag{font-size:0.58rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,180,60,0.4);margin-bottom:24px;}
.wlc-emoji{font-size:4rem;margin-bottom:16px;animation:wlcPop 0.6s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes wlcPop{from{transform:scale(0) rotate(-20deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.wlc-name{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,7vw,2.6rem);font-weight:700;color:#fff;line-height:1.1;margin-bottom:8px;text-align:center;}
.wlc-sub{font-size:0.85rem;color:rgba(255,200,120,0.5);margin-bottom:8px;line-height:1.5;text-align:center;}
.wlc-from{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.88rem;color:rgba(255,180,60,0.35);margin-bottom:32px;text-align:center;}
.wlc-btn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a0a00;border:none;border-radius:50px;padding:16px 44px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 8px 28px rgba(245,158,11,0.4);transition:transform 0.2s;touch-action:manipulation;animation:btnPulse 2.5s ease-in-out infinite;}
@keyframes btnPulse{0%,100%{box-shadow:0 8px 28px rgba(245,158,11,0.4);}50%{box-shadow:0 12px 40px rgba(245,158,11,0.65);}}
.wlc-btn:active{transform:scale(0.97);}
.wlc-create{margin-top:14px;background:none;border:1.5px solid rgba(245,158,11,0.25);color:rgba(245,158,11,0.5);border-radius:50px;padding:10px 28px;font-family:'DM Sans',sans-serif;font-size:0.82rem;cursor:pointer;touch-action:manipulation;}

/* ── UNBOXING SCENE ── */
#rv-unbox{background:linear-gradient(160deg,#2d1a00,#1a0a00);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow:hidden;}

/* Ambient warm glow behind box */
.scene-glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 50% 60%,rgba(245,158,11,0.08) 0%,transparent 70%);}

/* Confetti overlay */
#confettiCanvas{position:absolute;inset:0;pointer-events:none;z-index:50;}

/* Phone frame — wraps everything */
.scene-phone-frame{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;}

/* Top label bar */
.scene-topbar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:max(14px,env(safe-area-inset-top)) 20px 10px;flex-shrink:0;z-index:10;}
.scene-channel{font-size:0.6rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,180,60,0.4);}
.scene-progress-dots{display:flex;gap:5px;align-items:center;}
.scene-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,180,60,0.15);transition:all 0.35s ease;}
.scene-dot.done{background:rgba(245,158,11,0.6);}
.scene-dot.active{width:18px;border-radius:3px;background:rgba(245,158,11,0.9);}

/* Stage — where items appear */
.scene-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;width:100%;min-height:0;}

/* ── THE BOX ── */
.gift-wrap{position:relative;width:200px;height:200px;cursor:pointer;touch-action:manipulation;}
.gift-box-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:180px;height:130px;background:linear-gradient(145deg,#c2410c,#9a3412);border-radius:6px 6px 10px 10px;box-shadow:0 20px 60px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.12),inset 0 -2px 0 rgba(0,0,0,0.3);}
.gift-box-front-stripe{position:absolute;left:50%;transform:translateX(-50%);width:36px;height:100%;background:linear-gradient(90deg,rgba(255,255,255,0.0) 0%,rgba(255,200,60,0.6) 40%,rgba(255,200,60,0.6) 60%,rgba(255,255,255,0) 100%);}
.gift-box-lid{position:absolute;top:0;left:50%;transform:translateX(-50%);width:190px;height:44px;background:linear-gradient(145deg,#dc2626,#b91c1c);border-radius:8px 8px 3px 3px;box-shadow:0 8px 20px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.18);transition:transform 0.7s cubic-bezier(.34,1.56,.64,1),opacity 0.5s ease;transform-origin:center top;}
.gift-box-lid.open{transform:translateX(-50%) translateY(-80px) rotate(-15deg);opacity:0;}
.gift-lid-stripe{position:absolute;left:50%;transform:translateX(-50%);width:36px;height:100%;background:linear-gradient(90deg,rgba(255,255,255,0) 0%,rgba(255,200,60,0.6) 40%,rgba(255,200,60,0.6) 60%,rgba(255,255,255,0) 100%);}
/* Ribbon bow on top */
.gift-bow{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:2rem;transition:transform 0.4s ease,opacity 0.4s ease;}
.gift-bow.open{transform:translateX(-50%) translateY(-30px) scale(0);opacity:0;}
/* Shimmer shine on box */
.gift-shine{position:absolute;top:8px;left:14px;width:28px;height:60px;background:linear-gradient(160deg,rgba(255,255,255,0.15),transparent);border-radius:50%;transform:rotate(-20deg);pointer-events:none;}
/* Box wiggle on idle */
@keyframes boxWiggle{0%,100%{transform:translateX(-50%) rotate(-2deg);}50%{transform:translateX(-50%) rotate(2deg);}}
.gift-box-lid.wiggle{animation:boxWiggle 0.5s ease-in-out 3;}

/* Tap hint */
.tap-hint{font-size:0.7rem;color:rgba(255,200,100,0.45);letter-spacing:0.06em;margin-top:16px;text-align:center;transition:opacity 0.4s;pointer-events:none;}
.tap-hint.hide{opacity:0;}

/* ── REVEALED ITEM ── */
.revealed-item{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;padding:16px 20px;transition:opacity 0.4s ease;}
.revealed-item.show{opacity:1;pointer-events:all;}

/* Photo item — like being pulled out of box */
.unbox-photo-wrap{width:100%;max-width:340px;position:relative;}
.unbox-photo-container{background:#fff;padding:10px 10px 46px;border-radius:3px;box-shadow:0 24px 80px rgba(0,0,0,0.6),0 4px 16px rgba(0,0,0,0.4);transform-origin:top center;animation:pullOut 0.65s cubic-bezier(.34,1.4,.64,1) both;}
@keyframes pullOut{from{transform:translateY(60px) scale(0.85) rotate(-3deg);opacity:0;}to{transform:translateY(0) scale(1) rotate(0deg);opacity:1;}}
.unbox-photo-container img{width:100%;aspect-ratio:4/3;object-fit:cover;object-position:center 20%;display:block;border-radius:1px;}
.unbox-photo-caption{position:absolute;bottom:0;left:0;right:0;height:46px;display:flex;align-items:center;justify-content:center;padding:0 12px;}
.unbox-photo-caption-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.92rem;color:#c2410c;text-align:center;line-height:1.3;}
/* Item number badge */
.unbox-item-num{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;background:rgba(245,158,11,0.9);display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;color:#1a0a00;}
/* Next tap label below photo */
.unbox-next-hint{font-size:0.65rem;color:rgba(255,200,100,0.35);margin-top:16px;letter-spacing:0.06em;text-align:center;}

/* Song item */
.unbox-song-wrap{width:100%;max-width:320px;text-align:center;}
.unbox-record{width:150px;height:150px;border-radius:50%;margin:0 auto 20px;background:radial-gradient(circle,#fef3c7 0%,#fef3c7 13%,#1c1917 14%,#1c1917 18%,#292524 19%,#292524 25%,#1c1917 26%,#1c1917 32%,#292524 33%,#292524 39%,#1c1917 40%,#1c1917 100%);box-shadow:0 20px 60px rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;animation:pullOut 0.65s cubic-bezier(.34,1.4,.64,1) both,recordSpin 3s linear infinite 0.65s;}
@keyframes recordSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.unbox-record-label{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fcd34d,#f59e0b 50%,#d97706);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.5);}
.unbox-record-label::after{content:'';width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.9);position:absolute;box-shadow:0 0 0 2px rgba(0,0,0,0.3);}
.unbox-song-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.3;animation:fadeUp 0.5s ease 0.3s both;}
.unbox-song-artist{font-size:0.75rem;color:rgba(255,200,100,0.45);margin-bottom:18px;animation:fadeUp 0.5s ease 0.45s both;}
.unbox-yt-wrap{width:100%;border-radius:12px;overflow:hidden;margin-bottom:14px;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.5);animation:fadeUp 0.5s ease 0.5s both;}
.unbox-yt-wrap iframe{width:100%;height:160px;border:none;display:block;}
.unbox-yt-wrap.show{display:block;}

/* Letter item */
.unbox-letter-wrap{width:100%;max-width:340px;}
.unbox-envelope{width:80px;height:60px;margin:0 auto 20px;position:relative;cursor:pointer;animation:pullOut 0.65s cubic-bezier(.34,1.4,.64,1) both;}
.env-body{position:absolute;inset:0;background:linear-gradient(160deg,#fef3c7,#fde68a);border-radius:4px;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.env-flap{position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(160deg,#fde68a,#fcd34d);border-radius:4px 4px 0 0;clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top;transition:transform 0.4s ease;}
.env-flap.open{transform:rotateX(180deg);}
.env-seal{position:absolute;top:22px;left:50%;transform:translateX(-50%);font-size:1rem;z-index:2;}

.letter-paper-reveal{background:white;border-radius:12px;padding:20px 18px;box-shadow:0 12px 40px rgba(0,0,0,0.5);border-top:3px solid #f59e0b;animation:slideUpReveal 0.6s cubic-bezier(.22,1,.36,1) both;}
@keyframes slideUpReveal{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.letter-reveal-scroll{max-height:280px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.letter-reveal-scroll::-webkit-scrollbar{display:none;}
.l-body-unbox{font-family:'Cormorant Garamond','Noto Sans Devanagari',serif;font-size:1.05rem;color:#1c1917;line-height:2.1;white-space:pre-wrap;}
.l-sign-unbox{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:#d97706;margin-top:16px;display:block;}

/* Bottom action bar */
.scene-bottom{width:100%;padding:14px 20px max(18px,env(safe-area-inset-bottom));flex-shrink:0;z-index:10;}
.scene-tap-btn{width:100%;padding:15px;border:none;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:0.92rem;font-weight:700;cursor:pointer;touch-action:manipulation;transition:transform 0.15s;background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a0a00;box-shadow:0 8px 28px rgba(245,158,11,0.35);letter-spacing:0.02em;}
.scene-tap-btn:active{transform:scale(0.97);}
.scene-tap-btn.ghost{background:transparent;border:1.5px solid rgba(245,158,11,0.25);color:rgba(245,158,11,0.5);box-shadow:none;}

/* ── SAVE / SHARE ── */
.save-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(14px);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px;}
.save-overlay.show{display:flex;}
.save-box{background:#1c1917;border:1px solid rgba(245,158,11,0.15);border-radius:24px;padding:28px 24px;width:100%;max-width:320px;text-align:center;}
.save-spinner{position:relative;width:64px;height:64px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;}
.save-ring{position:absolute;inset:0;border-radius:50%;border:3px solid rgba(245,158,11,0.12);border-top-color:#f59e0b;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.save-emoji{font-size:1.8rem;position:relative;z-index:1;}
.save-label{font-size:1rem;font-weight:600;color:#fff;margin-bottom:14px;}
.save-bar-wrap{height:6px;border-radius:50px;background:rgba(245,158,11,0.1);overflow:hidden;width:100%;margin-bottom:8px;}
.save-bar{height:100%;border-radius:50px;width:0%;transition:width 0.4s ease;background:linear-gradient(90deg,#f59e0b,#d97706);}

.share-modal{position:absolute;inset:0;background:rgba(0,0,0,0.88);backdrop-filter:blur(14px);z-index:600;display:none;align-items:center;justify-content:center;padding:20px;}
.share-modal.show{display:flex;}
.share-box{background:#1c1917;border:1px solid rgba(245,158,11,0.15);border-radius:24px;padding:26px 22px;width:100%;max-width:360px;text-align:center;}
.share-box .share-title{font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:6px;}
.share-box .share-sub{font-size:0.82rem;color:rgba(255,200,100,0.4);margin-bottom:14px;}
.share-link-row{background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.12);border-radius:12px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:9px;}
.share-link-txt{font-size:0.7rem;color:rgba(255,200,100,0.4);flex:1;text-align:left;word-break:break-all;}
.copy-btn{padding:6px 14px;border:none;border-radius:8px;font-size:0.72rem;font-weight:700;cursor:pointer;white-space:nowrap;background:#f59e0b;color:#1a0a00;}
.btn-wa{width:100%;padding:14px;border:none;border-radius:50px;background:linear-gradient(135deg,#25d366,#128c7e);color:white;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;margin-bottom:8px;touch-action:manipulation;}
.modal-close{width:100%;padding:11px;background:none;border:1.5px solid rgba(245,158,11,0.15);border-radius:50px;font-family:'DM Sans',sans-serif;font-size:0.78rem;color:rgba(245,158,11,0.4);cursor:pointer;}

.wm{position:absolute;bottom:8px;right:12px;font-size:0.5rem;color:rgba(255,255,255,0.06);pointer-events:none;z-index:1;}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="app" id="mainApp">

<!-- Loading -->
<div class="screen" id="rv-loading">
  <div class="load-box">🎁</div>
  <div class="load-text">Preparing your gift...</div>
</div>

<!-- Error -->
<div class="screen" id="rv-error">
  <div class="err-emoji">📦</div>
  <div class="err-text">This gift has expired<br>or couldn't be found.</div>
  <button onclick="window.location.href='/'" style="margin-top:28px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a0a00;border:none;border-radius:50px;padding:14px 32px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;">🎁 Create your own</button>
</div>

<!-- Welcome -->
<div class="screen" id="rv-welcome">
  <div class="wlc-tag">WishYou.ai</div>
  <div class="wlc-emoji">🎁</div>
  <div class="wlc-name" id="rvName">Happy Birthday!</div>
  <div class="wlc-sub" id="rvSub">Someone special packed you a gift 🎀</div>
  <div class="wlc-from" id="rvFrom"></div>
  <button class="wlc-btn" onclick="startUnbox()">Unbox your gift 🎁</button>
  <button class="wlc-create" onclick="window.location.href='/'">🎁 Create a card like this</button>
</div>

<!-- Unboxing scene -->
<div class="screen" id="rv-unbox">
  <div class="scene-glow"></div>
  <canvas id="confettiCanvas"></canvas>

  <div class="scene-phone-frame">
    <div class="scene-topbar">
      <div class="scene-channel">🎁 wishyou.ai</div>
      <div class="scene-progress-dots" id="sceneDots"></div>
    </div>

    <div class="scene-stage" id="sceneStage">

      <!-- Gift box (step 0) -->
      <div id="stageBox" class="gift-wrap" onclick="openBox()">
        <div class="gift-box-body">
          <div class="gift-box-front-stripe"></div>
          <div class="gift-shine"></div>
        </div>
        <div class="gift-box-lid" id="boxLid">
          <div class="gift-lid-stripe"></div>
        </div>
        <div class="gift-bow" id="boxBow">🎀</div>
      </div>
      <div class="tap-hint" id="tapHint">tap to open 🎁</div>

      <!-- Revealed items container -->
      <div class="revealed-item" id="stageItem">
        <!-- dynamically filled -->
      </div>

    </div>

    <div class="scene-bottom" id="sceneBottom" style="display:none;">
      <button class="scene-tap-btn" id="nextBtn" onclick="nextItem()">Next →</button>
    </div>
  </div>
</div>

<!-- Save overlay -->
<div class="save-overlay" id="saveOverlay">
  <div class="save-box">
    <div class="save-spinner">
      <div class="save-ring"></div>
      <span class="save-emoji" id="saveEmoji">🎁</span>
    </div>
    <div class="save-label" id="saveLabel">Creating your card...</div>
    <div class="save-bar-wrap"><div class="save-bar" id="saveBar"></div></div>
  </div>
</div>

<!-- Share modal -->
<div class="share-modal" id="shareModal">
  <div class="share-box">
    <div style="font-size:2rem;margin-bottom:8px;">🎁</div>
    <div class="share-title">Card is ready! 🎉</div>
    <div class="share-sub">Send this link to them 🎀</div>
    <div class="share-link-row">
      <span class="share-link-txt" id="shareLinkTxt"></span>
      <button class="copy-btn" id="copyBtn" onclick="copyLink()">Copy</button>
    </div>
    <button class="btn-wa" onclick="openWhatsApp()">💬 Share on WhatsApp</button>
    <button class="modal-close" onclick="closeShare()">Done ✓</button>
  </div>
</div>

<div class="wm"><a href="https://wishyou.ai/" style="color:inherit;text-decoration:none;">WishYou.ai</a></div>
</div><!-- /app -->

<script>
const FIREBASE_URL = 'https://feeltwo-d28b0-default-rtdb.firebaseio.com/wishyou-cards';
const WORKER_URL   = 'https://wild-fog-b15e.nilesh53333.workers.dev';

let curScreen = '';
let cardData  = null;
// Unboxing state
let unboxItems   = []; // [{type:'photo'|'song'|'letter', ...}]
let unboxStep    = -1; // -1 = box closed, 0..n = items
let boxOpened    = false;
let shareLink    = '';

// ── NAVIGATION ──
function goTo(id){
  const prev = document.getElementById(curScreen);
  const next = document.getElementById(id);
  if(!next || curScreen === id) return;
  if(prev){ prev.classList.remove('active'); prev.classList.add('slide-out'); setTimeout(()=>prev.classList.remove('slide-out'),500); }
  next.classList.add('active');
  curScreen = id;
}

// ── INIT ──
window.addEventListener('DOMContentLoaded',()=>{
  const cardId = new URLSearchParams(window.location.search).get('card');
  if(cardId){ goTo('rv-loading'); loadCard(); }
  else { goTo('rv-error'); }
});

async function loadCard(){
  const cardId = new URLSearchParams(window.location.search).get('card');
  if(!cardId){ goTo('rv-error'); return; }
  try{
    const res = await fetch(`${FIREBASE_URL}/${cardId}.json`);
    const d   = await res.json();
    if(!d){ goTo('rv-error'); return; }
    if(d.expiresAt && Date.now()>d.expiresAt){ goTo('rv-error'); return; }
    // Increment views
    fetch(`${FIREBASE_URL}/${cardId}/views.json`).then(r=>r.json()).then(v=>{
      fetch(`${FIREBASE_URL}/${cardId}/views.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify((v||0)+1)}).catch(()=>{});
    }).catch(()=>{});
    cardData = d;
    renderCard(d);
  }catch(e){ console.error(e); goTo('rv-error'); }
}

function renderCard(d){
  const name   = d.name   || '';
  const sender = d.sender || '';
  document.getElementById('rvName').textContent = name   ? `Happy Birthday, ${name}! 🎂` : 'Happy Birthday! 🎂';
  document.getElementById('rvSub').textContent  = sender ? `${sender} packed this just for you 🎀` : 'Someone special packed this just for you 🎀';
  document.getElementById('rvFrom').textContent = '';

  // Build unboxItems array
  unboxItems = [];
  const photos   = (d.photos||[]).filter(Boolean);
  const captions = d.photoCaptions || [];
  photos.forEach((url,i)=>{ unboxItems.push({type:'photo', url, caption:captions[i]||'', index:i, total:photos.length}); });
  const hasSong  = !!(d.songName && d.songName !== '—');
  if(hasSong) unboxItems.push({type:'song', name:d.songName, spotify:d.spotify||''});
  const hasLetter = !!(d.msg && d.msg.trim());
  if(hasLetter) unboxItems.push({type:'letter', msg:d.msg, sign:d.sign||(sender?`With love, ${sender} 💕`:'With love 💕')});

  goTo('rv-welcome');
}

// ── UNBOX FLOW ──
function startUnbox(){
  goTo('rv-unbox');
  buildDots();
  // Wiggle the box after a moment
  setTimeout(()=>{
    const lid = document.getElementById('boxLid');
    if(lid) lid.classList.add('wiggle');
    setTimeout(()=>{ if(lid) lid.classList.remove('wiggle'); }, 1600);
  }, 800);
}

function buildDots(){
  const container = document.getElementById('sceneDots');
  container.innerHTML = '';
  // box open dot + one per item
  const total = 1 + unboxItems.length;
  for(let i=0;i<total;i++){
    const d = document.createElement('div');
    d.className = 'scene-dot' + (i===0 ? ' active' : '');
    d.id = 'dot'+i;
    container.appendChild(d);
  }
}

function updateDots(activeIdx){
  const total = 1 + unboxItems.length;
  for(let i=0;i<total;i++){
    const d = document.getElementById('dot'+i);
    if(!d) continue;
    d.className = 'scene-dot' + (i < activeIdx ? ' done' : i === activeIdx ? ' active' : '');
  }
}

function openBox(){
  if(boxOpened) return;
  boxOpened = true;
  const lid = document.getElementById('boxLid');
  const bow = document.getElementById('boxBow');
  const hint = document.getElementById('tapHint');
  lid.classList.add('open');
  bow.classList.add('open');
  hint.classList.add('hide');
  // Confetti burst
  launchConfetti();
  // Show first item after short delay
  setTimeout(()=>{
    document.getElementById('stageBox').style.pointerEvents='none';
    updateDots(1);
    unboxStep = 0;
    showItem(0);
  }, 700);
}

function showItem(idx){
  const item = unboxItems[idx];
  if(!item) return;
  const stage = document.getElementById('stageItem');
  const bottom = document.getElementById('sceneBottom');
  const btn = document.getElementById('nextBtn');

  stage.innerHTML = '';
  stage.classList.remove('show');

  // Move box up and shrink
  const boxEl = document.getElementById('stageBox');
  boxEl.style.transition = 'all 0.5s cubic-bezier(.4,0,.2,1)';
  boxEl.style.transform = 'scale(0.5) translateY(-60px)';
  boxEl.style.opacity = '0.4';

  if(item.type === 'photo'){
    const isLast = idx === unboxItems.length - 1;
    const nextIsNotPhoto = idx+1 < unboxItems.length && unboxItems[idx+1].type !== 'photo';
    stage.innerHTML = `
      <div class="unbox-photo-wrap">
        <div class="unbox-photo-container" id="photoContainer">
          <img src="${esc(item.url)}" alt="" onerror="this.style.background='#222'">
          <div class="unbox-photo-caption">
            <div class="unbox-photo-caption-text">${esc(item.caption)}</div>
          </div>
          <div class="unbox-item-num">${item.index+1}/${item.total}</div>
        </div>
        <div class="unbox-next-hint">${isLast ? '✨ last photo' : `${item.total - item.index - 1} more inside`}</div>
      </div>`;
    const btnLabel = isLast
      ? (unboxItems[idx+1] ? `Next → ${unboxItems[idx+1].type === 'song' ? 'Your Song 🎵' : 'Your Letter 💌'}` : 'That\'s everything 🎁')
      : `Next photo →`;
    btn.textContent = btnLabel;
  }
  else if(item.type === 'song'){
    const ytM = item.spotify.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    const ytId = ytM ? ytM[1] : null;
    stage.innerHTML = `
      <div class="unbox-song-wrap">
        <div class="unbox-record"><div class="unbox-record-label"></div></div>
        <div class="unbox-song-title">${esc(item.name)}</div>
        <div class="unbox-song-artist">A song chosen just for you 🎵</div>
        ${ytId ? `<div class="unbox-yt-wrap show" id="unboxYt"><iframe src="https://www.youtube.com/embed/${ytId}?autoplay=0" allowfullscreen></iframe></div>` : ''}
      </div>`;
    const hasLetter = unboxItems.find(i=>i.type==='letter');
    btn.textContent = hasLetter ? 'Next → Your Letter 💌' : 'That\'s everything 🎁';
  }
  else if(item.type === 'letter'){
    stage.innerHTML = `
      <div class="unbox-letter-wrap">
        <div class="letter-paper-reveal">
          <div class="letter-reveal-scroll">
            <div class="l-body-unbox" id="unboxLetterBody"></div>
            <span class="l-sign-unbox" id="unboxLetterSign"></span>
          </div>
        </div>
      </div>`;
    // Typewrite the letter
    setTimeout(()=>{
      typewrite(document.getElementById('unboxLetterBody'), item.msg, ()=>{
        const signEl = document.getElementById('unboxLetterSign');
        if(signEl){ signEl.style.transition='opacity 0.6s'; signEl.style.opacity='1'; signEl.textContent=item.sign; }
      });
      const signEl = document.getElementById('unboxLetterSign');
      if(signEl){ signEl.style.opacity='0'; signEl.textContent=item.sign; }
    }, 200);
    btn.textContent = '💝 Replay from start';
    btn.onclick = ()=>{ window.location.reload(); };
  }

  setTimeout(()=>{ stage.classList.add('show'); bottom.style.display='block'; }, 80);
}

function nextItem(){
  unboxStep++;
  if(unboxStep < unboxItems.length){
    updateDots(1 + unboxStep);
    // Re-animate pull-out
    const stage = document.getElementById('stageItem');
    stage.classList.remove('show');
    setTimeout(()=>{ showItem(unboxStep); }, 200);
  }
}

// ── CONFETTI ──
function launchConfetti(){
  const canvas = document.getElementById('confettiCanvas');
  const app    = document.getElementById('mainApp');
  canvas.width  = app.offsetWidth  || window.innerWidth;
  canvas.height = app.offsetHeight || window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#f59e0b','#ef4444','#ec4899','#8b5cf6','#10b981','#fff','#fcd34d'];
  const pieces = Array.from({length:90},()=>({
    x: canvas.width/2 + (Math.random()-0.5)*60,
    y: canvas.height*0.45,
    vx: (Math.random()-0.5)*14,
    vy: -(Math.random()*18+8),
    r: Math.random()*6+3,
    color: colors[Math.floor(Math.random()*colors.length)],
    rot: Math.random()*360,
    rspeed: (Math.random()-0.5)*10,
    shape: Math.random() > 0.5 ? 'rect' : 'circle',
    gravity: 0.4+Math.random()*0.3,
    fade: 1,
  }));
  let frame = 0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive = false;
    pieces.forEach(p=>{
      p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.rot += p.rspeed;
      p.vx *= 0.99;
      if(frame > 80) p.fade = Math.max(0, p.fade - 0.015);
      ctx.save(); ctx.globalAlpha = p.fade; ctx.fillStyle = p.color;
      ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      if(p.shape==='rect') ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
      else{ ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
      if(p.fade > 0) alive = true;
    });
    frame++;
    if(alive && frame < 200) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// ── TYPEWRITER ──
function typewrite(el, text, onDone){
  if(!el||!text) return;
  el.textContent = '';
  const chars = text.split('');
  let i = 0;
  function next(){
    if(i<chars.length){ el.textContent+=chars[i]; i++; setTimeout(next,16); }
    else if(onDone) onDone();
  }
  next();
}

// ── HELPERS ──
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let shareLinkShort = '';

function setP(pct, label){
  document.getElementById('saveBar').style.width = pct+'%';
  document.getElementById('saveLabel').textContent = label;
}

// ── COPY / WA ──
function copyLink(){
  navigator.clipboard.writeText(shareLink2).then(()=>{
    const btn = document.getElementById('copyBtn');
    btn.textContent='Copied ✓';
    setTimeout(()=>btn.textContent='Copy',2000);
  });
}
function openWhatsApp(){
  const name   = cardData?.name   || '';
  const sender = cardData?.sender || '';
  const msg    = `🎁 *Happy Birthday${name?' '+name:''}!*\n\n${sender?sender+' packed you a birthday gift 🎀\n\n':'Someone packed you a gift 🎀\n\n'}Unbox it:\n${shareLink2}`;
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if(navigator.share && isMobile) navigator.share({text:msg}).catch(()=>window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank'));
  else window.open('https://web.whatsapp.com/send?text='+encodeURIComponent(msg),'_blank');
}
function closeShare(){ document.getElementById('shareModal').classList.remove('show'); }
