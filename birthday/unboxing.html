<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WishYou.ai — Unboxing</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎁</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;600;700&family=Noto+Sans+Devanagari&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#111;}
.app{position:fixed;inset:0;overflow:hidden;}
@media(min-width:500px){.app{top:50%;left:50%;right:auto;bottom:auto;transform:translate(-50%,-50%);width:430px;height:90vh;max-height:900px;border-radius:40px;box-shadow:0 40px 120px rgba(0,0,0,.95);}}
#s-load{position:absolute;inset:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .4s;}
#s-load.gone{opacity:0;pointer-events:none;}
.ld-ico{font-size:2.8rem;animation:ldB .7s ease-in-out infinite;}
@keyframes ldB{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
.ld-t{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.2);}
#s-err{position:absolute;inset:0;background:#111;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:40px;}
#s-err.show{display:flex;}
#s-err p{font-family:'Cormorant Garamond',serif;font-size:1rem;color:rgba(255,255,255,.35);line-height:1.7;}
#s-err button{margin-top:16px;background:#fff;color:#111;border:none;border-radius:50px;padding:12px 28px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;}

/* WRAPPING PAPER */
#s-wrap{position:absolute;inset:0;cursor:pointer;touch-action:none;user-select:none;-webkit-user-select:none;overflow:hidden;}
#wpCanvas{position:absolute;inset:0;width:100%;height:100%;}
.wp-over{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;pointer-events:none;}
.wp-tag{font-size:.55rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.55);background:rgba(0,0,0,.3);padding:5px 12px;border-radius:50px;backdrop-filter:blur(4px);}
.wp-name{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,8vw,3rem);font-weight:700;color:#fff;text-align:center;line-height:1.15;text-shadow:0 2px 20px rgba(0,0,0,.5);white-space:pre-line;}
.wp-sub{font-size:.8rem;color:rgba(255,255,255,.5);text-align:center;margin-top:4px;}
.wp-hint{position:absolute;bottom:52px;left:0;right:0;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;}
.wp-hand{font-size:1.6rem;animation:hDrag 1.5s ease-in-out infinite;}
@keyframes hDrag{0%,100%{transform:translate(0,0) rotate(-10deg);}50%{transform:translate(30px,20px) rotate(10deg);}}
.wp-hlbl{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);animation:hPulse 2s ease-in-out infinite;}
@keyframes hPulse{0%,100%{opacity:.4;}50%{opacity:.9;}}

/* REVEAL */
#s-reveal{position:absolute;inset:0;background:#0a0a0a;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .6s ease;}
#s-reveal.show{opacity:1;pointer-events:all;}
#cCanvas{position:absolute;inset:0;pointer-events:none;z-index:60;}
.prog-strip{position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,.06);z-index:30;}
.prog-fill{height:100%;background:linear-gradient(90deg,#f59e0b,#d97706);transition:width .5s ease;width:0%;}
.prog-dots{position:absolute;top:8px;left:0;right:0;display:flex;justify-content:center;gap:5px;z-index:30;}
.pdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.12);transition:all .3s;}
.pdot.done{background:rgba(245,158,11,.5);}
.pdot.active{width:16px;border-radius:3px;background:#f59e0b;}
.item-stage{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .5s ease;pointer-events:none;}
.item-stage.active{opacity:1;pointer-events:all;}

/* PHOTO — full bleed */
.photo-full{position:absolute;inset:0;}
.photo-full img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-full::after{content:'';position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.5) 50%,transparent 100%);pointer-events:none;}
.photo-ov{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:0 24px 100px;}
.photo-num{font-size:.55rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,180,50,.6);margin-bottom:8px;}
.photo-cap{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,5.5vw,2rem);font-weight:700;color:#fff;line-height:1.25;text-shadow:0 2px 12px rgba(0,0,0,.5);}

/* SONG */
.song-full{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,#1a0e00,#000);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 28px 100px;gap:0;}
.s-disc{width:190px;height:190px;border-radius:50%;background:radial-gradient(circle,#fef3c7 0%,#fef3c7 12%,#0a0a0a 13%,#0a0a0a 18%,#1c1917 19%,#1c1917 25%,#0a0a0a 26%,#0a0a0a 32%,#1c1917 33%,#1c1917 39%,#0a0a0a 40%,#0a0a0a 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 3px rgba(245,158,11,.2),0 24px 80px rgba(0,0,0,.8);animation:dSpin 4s linear infinite;margin-bottom:26px;}
@keyframes dSpin{from{transform:rotate(0);}to{transform:rotate(360deg);}}
.s-disc-lbl{width:62px;height:62px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fcd34d,#f59e0b 50%,#b45309);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.6);position:relative;}
.s-disc-lbl::after{content:'';width:10px;height:10px;border-radius:50%;background:#fff;position:absolute;box-shadow:0 0 0 2px rgba(0,0,0,.4);}
.s-eye{font-size:.55rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(245,158,11,.45);margin-bottom:12px;text-align:center;}
.s-name{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,6vw,2.2rem);font-weight:700;color:#fff;text-align:center;line-height:1.2;}
.s-yt{width:100%;border-radius:12px;overflow:hidden;margin-top:20px;display:none;box-shadow:0 8px 32px rgba(0,0,0,.7);}
.s-yt iframe{width:100%;height:155px;border:none;display:block;}
.s-yt.show{display:block;}

/* LETTER */
.letter-full{position:absolute;inset:0;background:linear-gradient(160deg,#1a1200,#0a0a00);display:flex;flex-direction:column;overflow:hidden;}
.letter-paper{flex:1;margin:max(52px,env(safe-area-inset-top)) 20px max(90px,calc(env(safe-area-inset-bottom)+80px));background:linear-gradient(160deg,#fffdf5,#fef9e7);border-radius:3px 3px 16px 16px;padding:28px 22px 24px;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 0 0 1px rgba(245,158,11,.1),0 32px 80px rgba(0,0,0,.8);position:relative;}
.letter-paper::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#f59e0b,#d97706);}
.letter-paper::-webkit-scrollbar{display:none;}
.l-eye{font-size:.52rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(180,83,9,.4);margin-bottom:18px;}
.l-body{font-family:'Cormorant Garamond','Noto Sans Devanagari',serif;font-size:1.08rem;color:#1c1000;line-height:2.15;white-space:pre-wrap;}
.l-sign{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:#b45309;margin-top:22px;display:block;opacity:0;transition:opacity .8s ease;}
.l-sign.vis{opacity:1;}
.l-candle{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);font-size:1.4rem;pointer-events:none;filter:drop-shadow(0 0 12px rgba(245,158,11,.6));animation:cFlick 1.5s ease-in-out infinite;}
@keyframes cFlick{0%,100%{opacity:.8;transform:translateX(-50%) scale(1);}50%{opacity:1;transform:translateX(-50%) scale(1.05);}}

/* NAV */
.mnav{position:absolute;bottom:0;left:0;right:0;padding:14px 20px max(20px,env(safe-area-inset-bottom));z-index:20;display:flex;gap:10px;background:linear-gradient(to top,rgba(0,0,0,.8),transparent);}
.nb{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;}
.nn{flex:1;height:44px;border:none;border-radius:50px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#0a0a00;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;touch-action:manipulation;transition:transform .15s;}
.nn:active{transform:scale(.97);}
.nn.ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);}

/* FINALE */
.finale{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 60%,#1a0e00,#000);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:40px;opacity:0;pointer-events:none;transition:opacity .6s;}
.finale.show{opacity:1;pointer-events:all;}
.fin-ico{font-size:3.5rem;margin-bottom:20px;animation:finP .6s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes finP{from{transform:scale(0) rotate(-20deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.fin-t{font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,6vw,2.2rem);font-weight:700;color:#fff;text-align:center;margin-bottom:10px;line-height:1.2;}
.fin-s{font-size:.82rem;color:rgba(255,200,100,.4);text-align:center;line-height:1.6;margin-bottom:28px;}
.fin-b{background:none;border:1px solid rgba(245,158,11,.25);border-radius:50px;padding:11px 28px;font-family:'DM Sans',sans-serif;font-size:.8rem;color:rgba(245,158,11,.5);cursor:pointer;touch-action:manipulation;}

/* SHARE/SAVE */
.save-ov{position:absolute;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(16px);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px;}
.save-ov.show{display:flex;}
.sv-box{background:#111;border:1px solid rgba(245,158,11,.12);border-radius:24px;padding:28px 24px;width:100%;max-width:320px;text-align:center;}
.sv-sp{position:relative;width:56px;height:56px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;}
.sv-rg{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(245,158,11,.1);border-top-color:#f59e0b;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.sv-ic{font-size:1.5rem;}
.sv-lb{font-size:.9rem;font-weight:600;color:#fff;margin-bottom:12px;}
.sv-bg{height:4px;border-radius:50px;background:rgba(245,158,11,.1);overflow:hidden;}
.sv-br{height:100%;border-radius:50px;width:0%;transition:width .4s;background:linear-gradient(90deg,#f59e0b,#d97706);}
.sh-m{position:absolute;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(16px);z-index:600;display:none;align-items:center;justify-content:center;padding:20px;}
.sh-m.show{display:flex;}
.sh-bx{background:#111;border:1px solid rgba(245,158,11,.12);border-radius:24px;padding:26px 22px;width:100%;max-width:360px;text-align:center;}
.sh-t{font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:4px;}
.sh-s{font-size:.78rem;color:rgba(255,200,100,.35);margin-bottom:14px;}
.sh-rw{background:rgba(245,158,11,.04);border:1px solid rgba(245,158,11,.1);border-radius:10px;padding:9px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sh-ln{font-size:.67rem;color:rgba(255,200,100,.35);flex:1;text-align:left;word-break:break-all;}
.sh-cp{padding:5px 12px;border:none;border-radius:7px;font-size:.68rem;font-weight:700;cursor:pointer;background:#f59e0b;color:#0a0a00;white-space:nowrap;}
.sh-wa{width:100%;padding:12px;border:none;border-radius:50px;background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;font-family:'DM Sans',sans-serif;font-size:.86rem;font-weight:600;cursor:pointer;margin-bottom:8px;touch-action:manipulation;}
.sh-cl{width:100%;padding:10px;background:none;border:1px solid rgba(245,158,11,.1);border-radius:50px;font-family:'DM Sans',sans-serif;font-size:.74rem;color:rgba(245,158,11,.35);cursor:pointer;}
.wm{position:absolute;bottom:5px;right:9px;font-size:.46rem;color:rgba(255,255,255,.04);pointer-events:none;z-index:1;}
</style>
</head>
<body>
<div class="app" id="mainApp">
<div id="s-load"><div class="ld-ico">🎁</div><div class="ld-t">Opening your gift…</div></div>
<div id="s-err"><span style="font-size:2.5rem">📦</span><p>This gift has expired<br>or couldn't be found.</p><button onclick="location.href='/'">Create your own</button></div>
<div id="s-wrap">
  <canvas id="wpCanvas"></canvas>
  <div class="wp-over" id="wpOver">
    <div class="wp-tag">WishYou.ai 🎁</div>
    <div class="wp-name" id="wpName">Happy Birthday!</div>
    <div class="wp-sub" id="wpSub">Someone wrapped something for you</div>
    <div class="wp-hint"><div class="wp-hand" id="wpHand">👆</div><div class="wp-hlbl">scratch to unwrap</div></div>
  </div>
</div>
<div id="s-reveal">
  <canvas id="cCanvas"></canvas>
  <div class="prog-strip"><div class="prog-fill" id="progFill"></div></div>
  <div class="prog-dots" id="progDots"></div>
  <div id="stagesWrap" style="position:absolute;inset:0;"></div>
  <div class="mnav" id="mNav">
    <button class="nb" id="navBack" onclick="goBack()">←</button>
    <button class="nn" id="navNext" onclick="goNext()">Next →</button>
  </div>
</div>
<div class="finale" id="s-finale">
  <div class="fin-ico">🎀</div>
  <div class="fin-t" id="finT">Happy Birthday!</div>
  <div class="fin-s">Every memory,<br>every note — all yours.</div>
  <button class="fin-b" onclick="location.href='/'">✨ Create a card like this</button>
</div>
<div class="save-ov" id="saveOv"><div class="sv-box"><div class="sv-sp"><div class="sv-rg"></div><div class="sv-ic">🎁</div></div><div class="sv-lb" id="svLbl">Creating…</div><div class="sv-bg"><div class="sv-br" id="svBr"></div></div></div></div>
<div class="sh-m" id="shM"><div class="sh-bx"><div style="font-size:1.8rem;margin-bottom:8px">🎁</div><div class="sh-t">Ready! 🎉</div><div class="sh-s">Send to them 🎀</div><div class="sh-rw"><span class="sh-ln" id="shLn"></span><button class="sh-cp" id="shCp" onclick="copyLink()">Copy</button></div><button class="sh-wa" onclick="shareWA()">💬 Share on WhatsApp</button><button class="sh-cl" onclick="document.getElementById('shM').classList.remove('show')">Done ✓</button></div></div>
<div class="wm"><a href="https://wishyou.ai/" style="color:inherit;text-decoration:none;">WishYou.ai</a></div>
</div>
<script>
const FIREBASE='https://feeltwo-d28b0-default-rtdb.firebaseio.com/wishyou-cards';
let cardData=null,unboxItems=[],curItem=-1,shareLink='',wpDone=false;

window.addEventListener('DOMContentLoaded',()=>{
  const cardId=new URLSearchParams(location.search).get('card');
  if(!cardId){showErr();return;}
  fetch(`${FIREBASE}/${cardId}.json`).then(r=>r.json()).then(d=>{
    if(!d){showErr();return;}
    if(d.expiresAt&&Date.now()>d.expiresAt){showErr();return;}
    fetch(`${FIREBASE}/${cardId}/views.json`).then(r=>r.json()).then(v=>{fetch(`${FIREBASE}/${cardId}/views.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify((v||0)+1)}).catch(()=>{});}).catch(()=>{});
    cardData=d;
    buildItems(d);
    const name=d.name||'',sender=d.sender||'';
    document.getElementById('wpName').textContent=name?`Happy Birthday,\n${name}!`:'Happy Birthday!';
    document.getElementById('wpSub').textContent=sender?`${sender} wrapped something for you 🎀`:'Someone wrapped something just for you 🎀';
    document.getElementById('s-load').classList.add('gone');
    initWrap();
  }).catch(showErr);
});

function showErr(){document.getElementById('s-load').classList.add('gone');document.getElementById('s-err').classList.add('show');}

function buildItems(d){
  unboxItems=[];
  const photos=(d.photos||[]).filter(Boolean),caps=d.photoCaptions||[];
  photos.forEach((url,i)=>unboxItems.push({type:'photo',url,cap:caps[i]||'',n:i,total:photos.length}));
  if(d.songName&&d.songName!=='—') unboxItems.push({type:'song',name:d.songName,spotify:d.spotify||''});
  if(d.msg&&d.msg.trim()) unboxItems.push({type:'letter',msg:d.msg,sign:d.sign||(d.sender?`With love, ${d.sender} 💕`:'With love 💕')});
}

function initWrap(){
  const wrap=document.getElementById('s-wrap');
  const wpC=document.getElementById('wpCanvas');
  const app=document.getElementById('mainApp');
  const W=app.offsetWidth||window.innerWidth,H=app.offsetHeight||window.innerHeight;
  wpC.width=W;wpC.height=H;
  const ctx=wpC.getContext('2d');
  ctx.fillStyle='#b91c1c';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(150,0,15,0.55)';ctx.lineWidth=30;
  for(let x=-H;x<W+H;x+=55){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+H,H);ctx.stroke();}
  ctx.fillStyle='rgba(255,215,0,0.15)';
  for(let x=0;x<W;x+=34)for(let y=0;y<H;y+=34){ctx.beginPath();ctx.arc(x+(y%68===0?17:0),y,3.5,0,Math.PI*2);ctx.fill();}
  ctx.strokeStyle='rgba(255,210,0,0.45)';ctx.lineWidth=16;ctx.strokeRect(8,8,W-16,H-16);
  ctx.strokeStyle='rgba(255,210,0,0.2)';ctx.lineWidth=4;ctx.strokeRect(22,22,W-44,H-44);
  const gv=ctx.createLinearGradient(W/2-22,0,W/2+22,0);
  gv.addColorStop(0,'rgba(255,210,0,0)');gv.addColorStop(.35,'rgba(255,210,0,.75)');gv.addColorStop(.65,'rgba(255,210,0,.75)');gv.addColorStop(1,'rgba(255,210,0,0)');
  ctx.fillStyle=gv;ctx.fillRect(0,0,W,H);
  const gh=ctx.createLinearGradient(0,H/2-22,0,H/2+22);
  gh.addColorStop(0,'rgba(255,210,0,0)');gh.addColorStop(.35,'rgba(255,210,0,.75)');gh.addColorStop(.65,'rgba(255,210,0,.75)');gh.addColorStop(1,'rgba(255,210,0,0)');
  ctx.fillStyle=gh;ctx.fillRect(0,0,W,H);
  ctx.font='56px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=20;
  ctx.fillText('🎀',W/2,H/2);ctx.shadowBlur=0;

  let isDown=false,lastX=null,lastY=null;
  function scratch(x,y){
    if(wpDone)return;
    ctx.globalCompositeOperation='destination-out';
    const r=32+Math.random()*10;
    ctx.beginPath();
    const pts=10;
    ctx.moveTo(x+r,y);
    for(let i=1;i<=pts;i++){
      const a=(i/pts)*Math.PI*2,jr=r*(.65+Math.random()*.7);
      ctx.lineTo(x+Math.cos(a)*jr,y+Math.sin(a)*jr);
    }
    ctx.closePath();ctx.fill();
    if(lastX!==null){
      ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(x,y);
      ctx.lineWidth=r*1.3;ctx.lineCap='round';ctx.stroke();
    }
    lastX=x;lastY=y;
    // sample every 20 moves
    if(Math.random()<.05){
      const d=ctx.getImageData(0,0,W,H).data;
      let clr=0;
      for(let i=3;i<d.length;i+=16)if(d[i]<128)clr++;
      if(clr/(d.length/16)>.42){wpDone=true;document.getElementById('wpHand').style.display='none';setTimeout(doReveal,300);}
    }
  }
  function gp(e){const r=wpC.getBoundingClientRect();if(e.touches)return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};return{x:e.clientX-r.left,y:e.clientY-r.top};}
  wrap.addEventListener('mousedown',e=>{isDown=true;const p=gp(e);lastX=p.x;lastY=p.y;scratch(p.x,p.y);});
  wrap.addEventListener('mousemove',e=>{if(!isDown)return;const p=gp(e);scratch(p.x,p.y);});
  wrap.addEventListener('mouseup',()=>{isDown=false;lastX=lastY=null;});
  wrap.addEventListener('touchstart',e=>{e.preventDefault();isDown=true;const p=gp(e);lastX=p.x;lastY=p.y;scratch(p.x,p.y);},{passive:false});
  wrap.addEventListener('touchmove',e=>{e.preventDefault();if(!isDown)return;const p=gp(e);scratch(p.x,p.y);},{passive:false});
  wrap.addEventListener('touchend',()=>{isDown=false;lastX=lastY=null;});
}

function doReveal(){
  const wrap=document.getElementById('s-wrap');
  wrap.style.transition='opacity .7s ease';wrap.style.opacity='0';
  burstConfetti();
  setTimeout(()=>{
    wrap.style.display='none';
    buildReveal();
    document.getElementById('s-reveal').classList.add('show');
    buildDots();goToItem(0);
  },700);
}

function buildReveal(){
  const w=document.getElementById('stagesWrap');w.innerHTML='';
  unboxItems.forEach((item,i)=>{
    const stage=document.createElement('div');
    stage.className='item-stage';stage.id='stg'+i;
    if(item.type==='photo'){
      stage.innerHTML=`<div class="photo-full"><img src="${esc(item.url)}" onerror="this.style.background='#111'"><div class="photo-ov"><div class="photo-num">Memory ${item.n+1} of ${item.total}</div><div class="photo-cap">${esc(item.cap)||'&nbsp;'}</div></div></div>`;
    }else if(item.type==='song'){
      const yt=item.spotify.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      const ytId=yt?yt[1]:null;
      stage.innerHTML=`<div class="song-full"><div class="s-disc"><div class="s-disc-lbl"></div></div><div class="s-eye">🎵 A song chosen just for you</div><div class="s-name">${esc(item.name)}</div>${ytId?`<div class="s-yt show"><iframe src="https://www.youtube.com/embed/${ytId}?autoplay=0" allowfullscreen></iframe></div>`:''}</div>`;
    }else if(item.type==='letter'){
      stage.innerHTML=`<div class="letter-full"><div class="l-candle">🕯️</div><div class="letter-paper"><div class="l-eye">💌 A letter for you</div><div class="l-body" id="lb${i}"></div><span class="l-sign" id="ls${i}">${esc(item.sign)}</span></div></div>`;
    }
    w.appendChild(stage);
  });
}

function buildDots(){
  const c=document.getElementById('progDots');c.innerHTML='';
  unboxItems.forEach((_,i)=>{const d=document.createElement('div');d.className='pdot';d.id='pd'+i;c.appendChild(d);});
}
function updateDots(idx){
  unboxItems.forEach((_,i)=>{const d=document.getElementById('pd'+i);if(!d)return;d.className='pdot'+(i<idx?' done':i===idx?' active':'');});
  document.getElementById('progFill').style.width=(unboxItems.length>1?(idx/(unboxItems.length-1))*100:100)+'%';
}

function goToItem(idx){
  if(curItem>=0){const p=document.getElementById('stg'+curItem);if(p)p.classList.remove('active');}
  curItem=idx;
  if(idx>=unboxItems.length){showFinale();return;}
  const stage=document.getElementById('stg'+idx);
  if(stage){
    stage.classList.add('active');
    const item=unboxItems[idx];
    if(item.type==='letter'){
      const el=document.getElementById('lb'+idx),se=document.getElementById('ls'+idx);
      if(el&&!el._typed){el._typed=true;if(se)se.style.opacity='0';setTimeout(()=>typewrite(el,item.msg,()=>{if(se)se.classList.add('vis');}),400);}
    }
  }
  updateDots(idx);
  const isLast=idx===unboxItems.length-1;
  const btn=document.getElementById('navNext');
  btn.textContent=isLast?'All done 🎀':(()=>{const n=unboxItems[idx+1];return n?(n.type==='photo'?'Next Memory →':n.type==='song'?'Your Song 🎵 →':'Your Letter 💌 →'):'All done 🎀';})();
  btn.classList.toggle('ghost',isLast);
  const back=document.getElementById('navBack');
  back.style.opacity=idx>0?'1':'.25';back.style.pointerEvents=idx>0?'all':'none';
}
function goNext(){if(curItem<unboxItems.length-1)goToItem(curItem+1);else showFinale();}
function goBack(){if(curItem>0)goToItem(curItem-1);}
function showFinale(){
  document.getElementById('s-reveal').classList.remove('show');
  document.getElementById('s-finale').classList.add('show');
  const name=cardData?.name||'';
  document.getElementById('finT').textContent=name?`Happy Birthday, ${name}! 🎂`:'Happy Birthday! 🎂';
  burstConfetti();
}
function burstConfetti(){
  const canvas=document.getElementById('cCanvas'),app=document.getElementById('mainApp');
  canvas.width=app.offsetWidth||innerWidth;canvas.height=app.offsetHeight||innerHeight;
  const ctx=canvas.getContext('2d');
  const cols=['#f59e0b','#ef4444','#ec4899','#8b5cf6','#10b981','#fff','#fcd34d','#fb923c','#c0152a'];
  const ps=Array.from({length:110},()=>({x:canvas.width/2+(Math.random()-.5)*100,y:canvas.height*.5,vx:(Math.random()-.5)*18,vy:-(Math.random()*22+8),r:Math.random()*7+3,col:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*360,rs:(Math.random()-.5)*14,shape:Math.random()>.5?'r':'c',g:.5+Math.random()*.35,fade:1}));
  let f=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);let alive=false;
    ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.rot+=p.rs;p.vx*=.99;if(f>60)p.fade=Math.max(0,p.fade-.02);ctx.save();ctx.globalAlpha=p.fade;ctx.fillStyle=p.col;ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);if(p.shape==='r')ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);else{ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}ctx.restore();if(p.fade>0)alive=true;});
    f++;if(alive&&f<200)requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}
function typewrite(el,text,onDone){if(!el||!text)return;el.textContent='';const chars=text.split('');let i=0;function next(){if(i<chars.length){el.textContent+=chars[i++];setTimeout(next,14);}else if(onDone)onDone();}next();}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function copyLink(){navigator.clipboard.writeText(shareLink).then(()=>{const b=document.getElementById('shCp');b.textContent='Copied ✓';setTimeout(()=>b.textContent='Copy',2000);});}
function shareWA(){const n=cardData?.name||'',s=cardData?.sender||'';const msg=`🎁 *Tera gift aa gaya!*\n\n${n?'*'+n+'* ke liye ek special unboxing 🎀\n\n':''}${s?s+' ne wrap kiya — ':''}Scratch karke dekho:\n${shareLink}`;const mob=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);if(navigator.share&&mob)navigator.share({text:msg}).catch(()=>window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank'));else window.open('https://web.whatsapp.com/send?text='+encodeURIComponent(msg),'_blank');}
</script>
