<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>You have a birthday surprise! 💝</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💝</text></svg>">
<meta property="og:title" content="You have a birthday surprise! 💝">
<meta property="og:description" content="Someone made you a special interactive card with photos, music & a heartfelt letter.">
<meta property="og:image" content="https://wishyou.ai/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:#111;display:flex;align-items:center;justify-content:center;}

.app{position:relative;width:100%;max-width:430px;height:100vh;overflow:hidden;margin:0 auto;}
@media(min-width:500px){
  .app{height:90vh;max-height:900px;border-radius:40px;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,0.8);}
}

.screen{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.6s ease,transform 0.6s cubic-bezier(.4,0,.2,1);
  transform:translateY(30px);overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0);}
.screen.out{opacity:0;transform:translateY(-30px);}

/* LOADING */
#s-loading{background:linear-gradient(160deg,#fde8f0,#fce4ec);}
.loading-heart{font-size:3rem;animation:hb 1.2s ease-in-out infinite;}
@keyframes hb{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}
.loading-text{font-family:'Cormorant Garamond',serif;font-size:1rem;color:#8d3a5a;margin-top:14px;opacity:0.6;}

/* ERROR */
#s-error{background:linear-gradient(160deg,#fde8f0,#fce4ec);text-align:center;padding:40px;}
.error-emoji{font-size:3rem;margin-bottom:16px;display:block;}
.error-text{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:#8d3a5a;line-height:1.7;}

/* WELCOME */
#s-welcome{background:linear-gradient(160deg,#fde8f0 0%,#fce4ec 50%,#fdf0f5 100%);padding:40px 28px;}
.petals-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.petal{position:absolute;animation:pf linear infinite;opacity:0;}
@keyframes pf{0%{transform:translateY(-20px) rotate(0deg);opacity:0;}10%{opacity:1;}90%{opacity:0.4;}100%{transform:translateY(100vh) rotate(360deg);opacity:0;}}
.welcome-inner{position:relative;z-index:2;text-align:center;width:100%;}
.w-tag{font-size:0.6rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:rgba(233,30,99,0.45);margin-bottom:22px;display:block;}
.w-emoji{font-size:4rem;margin-bottom:18px;display:block;animation:hb2 1.8s ease-in-out infinite;}
@keyframes hb2{0%,100%{transform:scale(1);}14%{transform:scale(1.15);}28%{transform:scale(1);}42%{transform:scale(1.08);}56%{transform:scale(1);}}
.w-name{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,7vw,2.6rem);font-weight:700;color:#4a0e2a;line-height:1.1;margin-bottom:8px;}
.w-sub{font-size:0.85rem;color:#8d3a5a;opacity:0.65;margin-bottom:8px;line-height:1.5;}
.w-from{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.88rem;color:rgba(74,14,42,0.45);margin-bottom:36px;}
.open-btn{background:linear-gradient(135deg,#e91e63,#f06292);color:white;border:none;border-radius:50px;padding:16px 44px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;box-shadow:0 8px 28px rgba(233,30,99,0.4);transition:transform 0.2s;touch-action:manipulation;animation:bp 2.5s ease-in-out infinite;}
@keyframes bp{0%,100%{box-shadow:0 8px 28px rgba(233,30,99,0.4);}50%{box-shadow:0 12px 36px rgba(233,30,99,0.6);}}
.open-btn:active{transform:scale(0.97);}

/* PHOTOS */
#s-photos{background:linear-gradient(160deg,#fde8f0,#fce4ec,#fdf0f5);padding:0;align-items:stretch;justify-content:flex-start;}
.sec-hdr{padding:48px 24px 18px;text-align:center;}
.sec-tag{font-size:0.6rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:rgba(233,30,99,0.5);margin-bottom:6px;display:block;}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:#4a0e2a;}
.pol-strip{flex:1;padding:8px 16px 16px;display:flex;gap:12px;overflow-x:auto;align-items:center;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
.pol-strip::-webkit-scrollbar{display:none;}
.pol{flex-shrink:0;scroll-snap-align:center;background:white;padding:8px 8px 28px;box-shadow:0 8px 24px rgba(74,14,42,0.12);border-radius:2px;}
.pol:nth-child(odd){transform:rotate(-2.5deg);}
.pol:nth-child(even){transform:rotate(2deg);}
.pol:nth-child(3n+1){transform:rotate(-1deg);}
.pol img{width:190px;height:210px;object-fit:cover;display:block;}
.pol-lbl{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.72rem;color:#8d3a5a;text-align:center;margin-top:6px;opacity:0.55;}
.no-photo{text-align:center;padding:40px 20px;color:rgba(74,14,42,0.35);font-style:italic;flex:1;display:flex;align-items:center;justify-content:center;}
.next-btn{margin:0 24px 24px;background:linear-gradient(135deg,#e91e63,#f06292);color:white;border:none;border-radius:50px;padding:14px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;touch-action:manipulation;width:calc(100% - 48px);box-shadow:0 6px 20px rgba(233,30,99,0.35);transition:transform 0.2s;}
.next-btn:active{transform:scale(0.97);}

/* SONG */
#s-song{background:linear-gradient(160deg,#fde8f0,#fce4ec);padding:36px 28px;}
.vinyl-wrap{width:140px;height:140px;margin:0 auto 24px;position:relative;}
.vinyl{width:100%;height:100%;border-radius:50%;background:conic-gradient(#1a0a1a 0deg,#2d1430 18deg,#1a0a1a 36deg,#2d1430 54deg,#1a0a1a 72deg,#2d1430 90deg,#1a0a1a 108deg,#2d1430 126deg,#1a0a1a 144deg,#2d1430 162deg,#1a0a1a 180deg,#2d1430 198deg,#1a0a1a 216deg,#2d1430 234deg,#1a0a1a 252deg,#2d1430 270deg,#1a0a1a 288deg,#2d1430 306deg,#1a0a1a 324deg,#2d1430 342deg,#1a0a1a 360deg);box-shadow:0 8px 32px rgba(74,14,42,0.2),0 0 0 4px rgba(233,30,99,0.1);display:flex;align-items:center;justify-content:center;}
.vinyl-center{width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#f06292,#e91e63);display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.vs{animation:vs 3s linear infinite;}
@keyframes vs{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.vp{animation-play-state:paused;}
.song-t{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:#4a0e2a;text-align:center;margin-bottom:4px;}
.song-a{font-size:0.78rem;color:#8d3a5a;opacity:0.55;text-align:center;margin-bottom:24px;}
.yt-wrap{width:100%;border-radius:14px;overflow:hidden;box-shadow:0 8px 24px rgba(74,14,42,0.12);margin-bottom:20px;display:none;}
.yt-wrap iframe{width:100%;height:190px;border:none;display:block;}
.yt-wrap.show{display:block;}

/* ENVELOPE */
#s-envelope{background:linear-gradient(160deg,#fde8f0,#fce4ec,#fdf0f5);}
.env-inner{text-align:center;padding:28px;}
.env-t{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:#4a0e2a;margin-bottom:8px;}
.env-h{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.88rem;color:#8d3a5a;opacity:0.6;margin-bottom:28px;}
.env-icon{font-size:5rem;display:block;cursor:pointer;animation:ef 2s ease-in-out infinite;transition:transform 0.2s;}
@keyframes ef{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-12px) rotate(3deg);}}
.env-icon:active{transform:scale(0.9)!important;}

/* LETTER */
#s-letter{background:linear-gradient(160deg,#fde8f0,#fce4ec,#fdf0f5);padding:0;align-items:stretch;justify-content:flex-start;}
.letter-bar{height:3px;background:linear-gradient(90deg,#e91e63,#f48fb1);flex-shrink:0;}
.letter-scroll{flex:1;padding:32px 28px 110px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.l-greet{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:#4a0e2a;margin-bottom:16px;}
.l-body{font-family:'Cormorant Garamond',serif;font-size:1.02rem;color:#5a1e32;line-height:1.9;white-space:pre-wrap;}
.l-sign{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.95rem;color:#e91e63;margin-top:20px;}
.letter-foot{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:16px 24px;background:linear-gradient(to top,rgba(253,232,240,1) 55%,rgba(253,232,240,0));}
.replay-btn{width:100%;background:linear-gradient(135deg,#e91e63,#f06292);color:white;border:none;border-radius:50px;padding:14px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;touch-action:manipulation;box-shadow:0 6px 20px rgba(233,30,99,0.35);transition:transform 0.2s;}
.replay-btn:active{transform:scale(0.97);}

.wm{position:fixed;bottom:10px;right:14px;font-size:0.58rem;color:rgba(74,14,42,0.18);letter-spacing:0.08em;z-index:999;}
</style>
</head>
<body>
<div class="app">

  <div class="screen active" id="s-loading">
    <span class="loading-heart">💝</span>
    <div class="loading-text">Opening your card...</div>
  </div>

  <div class="screen" id="s-error">
    <span class="error-emoji">💔</span>
    <div class="error-text">This card has expired<br>or couldn't be found.</div>
  </div>

  <!-- WELCOME -->
  <div class="screen" id="s-welcome">
    <div class="petals-bg" id="petals"></div>
    <div class="welcome-inner">
      <span class="w-tag">WishYou.ai</span>
      <span class="w-emoji">💝</span>
      <div class="w-name" id="wName">Happy Birthday!</div>
      <div class="w-sub" id="wSub">Someone special made this just for you 🌸</div>
      <div class="w-from" id="wFrom"></div>
      <button class="open-btn" onclick="goTo('s-photos')">Open Your Card ✨</button>
    </div>
  </div>

  <!-- PHOTOS -->
  <div class="screen" id="s-photos">
    <div class="sec-hdr">
      <span class="sec-tag">Your Memories 📸</span>
      <div class="sec-title">Moments just for you</div>
    </div>
    <div class="pol-strip" id="polStrip"></div>
    <button class="next-btn" onclick="goTo('s-song')">Next → Your Special Song 🎵</button>
  </div>

  <!-- SONG -->
  <div class="screen" id="s-song">
    <span class="sec-tag" style="margin-bottom:18px;">Your Song 🎵</span>
    <div class="vinyl-wrap">
      <div class="vinyl vs" id="vinyl">
        <div class="vinyl-center">🎵</div>
      </div>
    </div>
    <div class="song-t" id="songT">A song just for you</div>
    <div class="song-a" id="songA"></div>
    <div class="yt-wrap" id="ytWrap"><div id="ytEmbed"></div></div>
    <button class="next-btn" style="width:calc(100% - 48px);margin:0 24px;" onclick="goTo('s-envelope')">Next → Your Letter 💌</button>
  </div>

  <!-- ENVELOPE -->
  <div class="screen" id="s-envelope">
    <div class="env-inner">
      <div class="env-t">A letter from the heart</div>
      <div class="env-h">Tap the envelope to open it</div>
      <span class="env-icon" onclick="openLetter()">💌</span>
    </div>
  </div>

  <!-- LETTER -->
  <div class="screen" id="s-letter">
    <div class="letter-bar"></div>
    <div class="letter-scroll">
      <div class="l-greet" id="lGreet">Dear you,</div>
      <div class="l-body" id="lBody"></div>
      <div class="l-sign" id="lSign"></div>
    </div>
    <div class="letter-foot">
      <button class="replay-btn" onclick="goTo('s-welcome')">💝 Replay from start</button>
    </div>
  </div>

</div>
<div class="wm">WishYou.ai</div>

<script>
const FIREBASE_URL = 'https://feeltwo-d28b0-default-rtdb.firebaseio.com/wishyou-cards';
let curScreen = 's-loading';

function goTo(id){
  const prev = document.getElementById(curScreen);
  const next = document.getElementById(id);
  if(!next || curScreen === id) return;
  if(prev){ prev.classList.remove('active'); prev.classList.add('out'); setTimeout(()=>prev.classList.remove('out'),600); }
  next.classList.add('active');
  curScreen = id;
  const v = document.getElementById('vinyl');
  if(id === 's-song') v.classList.remove('vp'); else v.classList.add('vp');
}

function initPetals(){
  const wrap = document.getElementById('petals');
  const emojis = ['🌸','💕','✨','🌷','💖','🎀'];
  for(let i=0;i<16;i++){
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const s = 0.7+Math.random()*0.8;
    p.style.cssText=`font-size:${s}rem;left:${Math.random()*100}%;animation-duration:${8+Math.random()*10}s;animation-delay:${Math.random()*10}s;`;
    wrap.appendChild(p);
  }
}

async function loadCard(){
  const params = new URLSearchParams(window.location.search);
  const cardId = params.get('card');
  if(!cardId){ goTo('s-error'); return; }
  try{
    const res = await fetch(`${FIREBASE_URL}/${cardId}.json`);
    const d = await res.json();
    if(!d){ goTo('s-error'); return; }
    if(d.expiresAt && Date.now() > d.expiresAt){ goTo('s-error'); return; }
    // views
    fetch(`${FIREBASE_URL}/${cardId}/views.json`).then(r=>r.json()).then(v=>{
      fetch(`${FIREBASE_URL}/${cardId}/views.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify((v||0)+1)}).catch(()=>{});
    }).catch(()=>{});
    renderCard(d);
  } catch(e){ goTo('s-error'); }
}

function renderCard(d){
  const name = d.name||'';
  const sender = d.sender||'';
  document.getElementById('wName').textContent = name ? `Happy Birthday, ${name}! 🎂` : 'Happy Birthday! 🎂';
  document.getElementById('wSub').textContent = sender ? `${sender} made this just for you 🌸` : 'Someone special made this just for you 🌸';
  document.getElementById('wFrom').textContent = sender ? `With love from ${sender} 💕` : '';

  // Photos
  const strip = document.getElementById('polStrip');
  strip.innerHTML = '';
  const labels = ['A memory 💕','Just us 🌸','Together ✨','Always 💖','Forever 🌷'];
  if(d.photos && d.photos.length > 0){
    d.photos.forEach((url,i)=>{
      const pol = document.createElement('div');
      pol.className = 'pol';
      pol.innerHTML = `<img src="${url}" alt="photo" onerror="this.parentNode.style.display='none'"><div class="pol-lbl">${labels[i]||'💕'}</div>`;
      strip.appendChild(pol);
    });
  } else {
    strip.innerHTML = '<div class="no-photo">💕 A card made with love</div>';
  }

  // Song
  const sn = d.songName||'';
  if(sn && sn !== '—'){
    document.getElementById('songT').textContent = sn;
    document.getElementById('songA').textContent = 'A song chosen just for you';
    const sp = d.spotify||'';
    if(sp){
      const ytM = sp.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      if(ytM){
        const w = document.getElementById('ytWrap'); w.classList.add('show');
        document.getElementById('ytEmbed').innerHTML=`<iframe src="https://www.youtube.com/embed/${ytM[1]}" allow="autoplay" allowfullscreen></iframe>`;
      }
    }
  }

  // Letter
  document.getElementById('lGreet').textContent = name ? `Dear ${name},` : 'Dear you,';
  document.getElementById('lBody').textContent = d.msg||'';
  document.getElementById('lSign').textContent = d.sign||(sender?`With love, ${sender} 💕`:'With love 💕');

  goTo('s-welcome');
}

function openLetter(){
  const e = document.querySelector('.env-icon');
  e.style.transform = 'scale(1.3) rotate(15deg)';
  setTimeout(()=>{ e.style.transform=''; goTo('s-letter'); }, 380);
}

initPetals();
loadCard();
</script>
</body>
</html>
