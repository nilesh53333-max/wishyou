<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WishYou.ai — Your Constellation ⭐</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
<meta property="og:title" content="Someone made you a constellation ⭐">
<meta property="og:description" content="Tap each star to reveal your birthday memories.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#020818;}
.app{position:fixed;inset:0;overflow:hidden;background:#020818;}
@media(min-width:500px){
  .app{top:50%;left:50%;right:auto;bottom:auto;transform:translate(-50%,-50%);
    width:430px;height:90vh;max-height:900px;border-radius:40px;
    box-shadow:0 40px 120px rgba(0,0,0,0.9);}
}
.screen{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity 0.6s ease;display:flex;flex-direction:column;overflow:hidden;}
.screen.active{opacity:1;pointer-events:all;}

#rv-loading{background:#020818;align-items:center;justify-content:center;gap:16px;}
.load-star{font-size:2.5rem;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:0.2;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}
.load-txt{font-size:0.65rem;letter-spacing:0.24em;text-transform:uppercase;color:rgba(200,210,255,0.3);}

#rv-error{background:#020818;align-items:center;justify-content:center;text-align:center;padding:40px;gap:16px;}
.err-t{font-size:0.85rem;color:rgba(200,210,255,0.35);line-height:1.8;}

#rv-welcome{background:#020818;align-items:center;justify-content:center;padding:40px 28px;}
.wc-eye{font-size:0.58rem;letter-spacing:0.26em;text-transform:uppercase;color:rgba(200,210,255,0.25);margin-bottom:18px;}
.wc-name{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,9vw,3rem);font-weight:300;color:rgba(230,235,255,0.9);text-align:center;line-height:1.1;margin-bottom:6px;}
.wc-sub{font-size:0.75rem;color:rgba(200,210,255,0.3);text-align:center;margin-bottom:44px;}
.wc-icon{font-size:3rem;margin-bottom:36px;animation:pulse 3s ease-in-out infinite;}
.wc-btn{background:transparent;border:1px solid rgba(200,210,255,0.2);border-radius:50px;padding:14px 44px;font-family:'DM Sans',sans-serif;font-size:0.82rem;color:rgba(200,210,255,0.6);cursor:pointer;letter-spacing:0.1em;touch-action:manipulation;transition:all 0.3s;}
.wc-btn:active{transform:scale(0.96);}
.wc-hint{font-size:0.56rem;color:rgba(200,210,255,0.18);letter-spacing:0.1em;margin-top:14px;text-align:center;}

#rv-sky{background:#020818;padding:0;}
#skyCanvas{position:absolute;inset:0;width:100%;height:100%;}
.sky-top{position:absolute;top:max(18px,env(safe-area-inset-top));left:0;right:0;text-align:center;pointer-events:none;z-index:2;}
.sky-heading{font-size:0.55rem;letter-spacing:0.22em;text-transform:uppercase;color:rgba(200,210,255,0.18);}
.sky-prog{font-size:0.55rem;letter-spacing:0.14em;color:rgba(200,210,255,0.2);margin-top:4px;}
.sky-hint{position:absolute;bottom:max(20px,env(safe-area-inset-bottom));left:0;right:0;text-align:center;font-size:0.6rem;letter-spacing:0.1em;color:rgba(200,210,255,0.22);pointer-events:none;z-index:2;transition:opacity 0.5s;}

.photo-panel{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,#010610,rgba(1,6,16,0.97));border-radius:22px 22px 0 0;transform:translateY(100%);transition:transform 0.45s cubic-bezier(.4,0,.2,1);padding-bottom:max(20px,env(safe-area-inset-bottom));z-index:10;}
.photo-panel.open{transform:translateY(0);}
.panel-pill{width:34px;height:3px;border-radius:2px;background:rgba(200,210,255,0.12);margin:10px auto 14px;}
.panel-img{width:calc(100% - 28px);max-height:55vh;object-fit:contain;border-radius:10px;display:block;margin:0 auto 12px;background:#060e24;}
.panel-cap{font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;color:rgba(200,215,255,0.7);text-align:center;padding:0 24px;line-height:1.5;margin-bottom:4px;}
.panel-num{font-size:0.52rem;letter-spacing:0.16em;text-transform:uppercase;color:rgba(200,210,255,0.18);text-align:center;margin-bottom:12px;}
.panel-close{display:block;margin:0 auto;background:transparent;border:1px solid rgba(200,210,255,0.1);border-radius:50px;padding:7px 26px;font-size:0.68rem;letter-spacing:0.1em;color:rgba(200,210,255,0.28);cursor:pointer;font-family:'DM Sans',sans-serif;touch-action:manipulation;}

#rv-song{background:radial-gradient(ellipse at 50% 50%,#081230,#020818);align-items:center;justify-content:center;padding:32px;}
.song-icon{font-size:1.8rem;letter-spacing:0.3em;margin-bottom:22px;}
.song-lbl{font-size:0.54rem;letter-spacing:0.22em;text-transform:uppercase;color:rgba(200,210,255,0.22);margin-bottom:10px;}
.song-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:rgba(220,230,255,0.85);text-align:center;margin-bottom:4px;line-height:1.3;}
.song-sub{font-size:0.7rem;color:rgba(200,210,255,0.3);text-align:center;margin-bottom:26px;}
.yt-wrap{width:100%;border-radius:10px;overflow:hidden;border:1px solid rgba(200,210,255,0.07);margin-bottom:20px;display:none;}
.yt-wrap iframe{width:100%;height:175px;border:none;display:block;}
.yt-wrap.show{display:block;}
.song-nxt{background:transparent;border:1px solid rgba(200,210,255,0.14);border-radius:50px;padding:12px 36px;font-family:'DM Sans',sans-serif;font-size:0.8rem;color:rgba(200,210,255,0.5);cursor:pointer;letter-spacing:0.08em;touch-action:manipulation;}
.song-nxt:active{transform:scale(0.96);}

#rv-letter{background:#020818;}
.letter-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:max(50px,env(safe-area-inset-top)+28px) 28px 24px;}
.letter-scroll::-webkit-scrollbar{display:none;}
.letter-star{text-align:center;font-size:1.6rem;margin-bottom:20px;animation:pulse 3s ease-in-out infinite;}
.letter-lbl{font-size:0.54rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(200,210,255,0.2);text-align:center;margin-bottom:24px;}
.letter-greet{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-style:italic;color:rgba(200,215,255,0.55);margin-bottom:18px;}
.letter-body{font-family:'Cormorant Garamond',serif;font-size:1.02rem;font-weight:300;color:rgba(220,230,255,0.8);line-height:2;white-space:pre-wrap;margin-bottom:24px;}
.letter-sign{font-family:'Cormorant Garamond',serif;font-size:0.95rem;font-style:italic;color:rgba(200,210,255,0.45);text-align:right;margin-bottom:36px;}
.letter-replay{display:block;margin:0 auto;background:transparent;border:1px solid rgba(200,210,255,0.1);border-radius:50px;padding:10px 28px;font-family:'DM Sans',sans-serif;font-size:0.7rem;color:rgba(200,210,255,0.25);cursor:pointer;letter-spacing:0.1em;touch-action:manipulation;}
.wm{position:absolute;bottom:6px;right:10px;font-size:0.52rem;color:rgba(255,255,255,0.05);pointer-events:none;z-index:1;}
</style>
</head>
<body>
<div class="app">

<div class="screen" id="rv-loading">
  <div class="load-star">✦</div>
  <div class="load-txt">loading your stars...</div>
</div>

<div class="screen" id="rv-error">
  <div class="err-t">This constellation has faded<br>or couldn't be found.</div>
  <button onclick="window.location.href='/'" style="margin-top:24px;background:transparent;color:rgba(200,210,255,0.3);border:1px solid rgba(200,210,255,0.12);border-radius:50px;padding:11px 26px;font-family:'DM Sans',sans-serif;font-size:0.76rem;cursor:pointer;letter-spacing:0.08em;">Create your own</button>
</div>

<div class="screen" id="rv-welcome">
  <div class="wc-eye">A birthday constellation</div>
  <div class="wc-name" id="rvName">Happy Birthday</div>
  <div class="wc-sub" id="rvSub"></div>
  <div class="wc-icon">⭐</div>
  <button class="wc-btn" id="openSkyBtn">✦ Open your sky</button>
  <div class="wc-hint">tap each star to reveal a memory</div>
</div>

<div class="screen" id="rv-sky">
  <canvas id="skyCanvas"></canvas>
  <div class="sky-top">
    <div class="sky-heading" id="skyHeading"></div>
    <div class="sky-prog" id="skyProg"></div>
  </div>
  <div class="sky-hint" id="skyHint">tap a star ✦</div>
  <div class="photo-panel" id="photoPanel">
    <div class="panel-pill"></div>
    <img class="panel-img" id="panelImg" src="" alt="">
    <div class="panel-cap" id="panelCap"></div>
    <div class="panel-num" id="panelNum"></div>
    <button class="panel-close" id="panelClose">close ✦</button>
  </div>
  <div class="wm">WishYou.ai</div>
</div>

<div class="screen" id="rv-song">
  <div class="song-icon">✦ ⭐ ✦</div>
  <div class="song-lbl">A song from the stars</div>
  <div class="song-title" id="rvSongT"></div>
  <div class="song-sub">chosen just for you</div>
  <div class="yt-wrap" id="rvYt"><div id="rvYtInner"></div></div>
  <button class="song-nxt" onclick="goTo('rv-letter')">Read your letter ✦</button>
</div>

<div class="screen" id="rv-letter">
  <div class="letter-scroll">
    <div class="letter-star">✦</div>
    <div class="letter-lbl">A letter written for you</div>
    <div class="letter-greet" id="rvLGreet"></div>
    <div class="letter-body" id="rvLBody"></div>
    <div class="letter-sign" id="rvLSign"></div>
    <button class="letter-replay" onclick="goTo('rv-welcome')">✦ Replay</button>
  </div>
</div>

</div>
<script>
const FIREBASE='https://feeltwo-d28b0-default-rtdb.firebaseio.com/wishyou-cards';
let curScreen='';

function goTo(id){
  const prev=document.getElementById(curScreen);
  const next=document.getElementById(id);
  if(!next)return;
  if(prev)prev.classList.remove('active');
  next.classList.add('active');
  curScreen=id;
}

window.addEventListener('DOMContentLoaded',()=>{
  const cardId=new URLSearchParams(window.location.search).get('card');
  if(!cardId){goTo('rv-error');return;}
  goTo('rv-loading');
  fetch(`${FIREBASE}/${cardId}.json`)
    .then(r=>r.json())
    .then(d=>{
      if(!d){goTo('rv-error');return;}
      if(d.expiresAt&&Date.now()>d.expiresAt){goTo('rv-error');return;}
      setupCard(d);
    })
    .catch(()=>goTo('rv-error'));
});

function setupCard(d){
  const name=d.name||'';
  const sender=d.sender||'';
  const photos=(d.photos||[]).filter(Boolean);
  const captions=d.photoCaptions||[];
  const songName=d.songName||'';
  const hasSong=songName&&songName!=='—';

  document.getElementById('rvName').textContent=name||'Happy Birthday';
  document.getElementById('rvSub').textContent=sender?`from ${sender} ✦`:'✦';
  document.getElementById('skyHeading').textContent=d.memoriesHeading||'Your Constellation';

  if(hasSong){
    document.getElementById('rvSongT').textContent=songName;
    const sp=d.spotify||'';
    const ytM=sp.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if(ytM){
      document.getElementById('rvYt').classList.add('show');
      document.getElementById('rvYtInner').innerHTML=`<iframe src="https://www.youtube.com/embed/${ytM[1]}" allow="autoplay" allowfullscreen></iframe>`;
    }
  } else {
    document.querySelector('.song-nxt').textContent='Read your letter ✦';
  }

  document.getElementById('rvLGreet').textContent=name?`Dear ${name},`:'Dear you,';
  document.getElementById('rvLBody').textContent=d.msg||'';
  document.getElementById('rvLSign').textContent=d.sign||(sender?`With love, ${sender} ✦`:'With love ✦');

  document.getElementById('openSkyBtn').onclick=()=>{
    goTo('rv-sky');
    setTimeout(()=>initSky(photos,captions,hasSong),80);
  };

  goTo('rv-welcome');
}

function initSky(photos,captions,hasSong){
  const sky=document.getElementById('rv-sky');
  const canvas=document.getElementById('skyCanvas');
  const W=sky.offsetWidth||window.innerWidth;
  const H=sky.offsetHeight||window.innerHeight;
  canvas.width=W;
  canvas.height=H;
  const ctx=canvas.getContext('2d');

  // Generate star positions
  const stars=[];
  const PAD=0.13;
  const MIN_D=Math.min(W,H)*0.2;
  for(let a=0;a<1000&&stars.length<photos.length;a++){
    const x=(PAD+Math.random()*(1-PAD*2))*W;
    const y=(PAD+Math.random()*(1-PAD*2))*H;
    if(stars.every(s=>Math.hypot(s.x-x,s.y-y)>=MIN_D))
      stars.push({x,y,r:6+Math.random()*4,seen:false,active:false,phase:Math.random()*Math.PI*2});
  }

  let opened=0;
  let rafId=null;
  let frame=0;

  // Preload
  photos.forEach(u=>{const i=new Image();i.src=u;});

  function draw(){
    ctx.clearRect(0,0,W,H);
    frame++;

    // Tiny bg stars (static positions via seeded pattern)
    for(let i=0;i<180;i++){
      const bx=((Math.sin(i*137.508)*0.5+0.5)*W);
      const by=((Math.cos(i*97.3)*0.5+0.5)*H);
      const op=0.04+0.1*Math.abs(Math.sin(frame*0.018+i*0.7));
      const br=i%5===0?1.2:0.5;
      ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);
      ctx.fillStyle=`rgba(210,220,255,${op})`;ctx.fill();
    }

    // Lines between stars
    for(let i=0;i<stars.length-1;i++){
      ctx.beginPath();
      ctx.moveTo(stars[i].x,stars[i].y);
      ctx.lineTo(stars[i+1].x,stars[i+1].y);
      ctx.strokeStyle='rgba(150,180,255,0.06)';
      ctx.lineWidth=1;ctx.stroke();
    }

    // Draw stars
    stars.forEach((s,i)=>{
      const tw=0.65+0.35*Math.sin(frame*0.035+s.phase);
      if(s.active){
        // Outer glow
        const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*7);
        g.addColorStop(0,'rgba(255,240,100,0.35)');
        g.addColorStop(1,'rgba(255,220,60,0)');
        ctx.beginPath();ctx.arc(s.x,s.y,s.r*7,0,Math.PI*2);
        ctx.fillStyle=g;ctx.fill();
        // Core
        ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle='rgba(255,248,160,1)';
        ctx.shadowColor='rgba(255,220,80,1)';ctx.shadowBlur=20;
        ctx.fill();ctx.shadowBlur=0;
        // Spike cross
        ctx.save();ctx.strokeStyle='rgba(255,248,180,0.7)';ctx.lineWidth=1;
        [0,90].forEach(a=>{
          ctx.save();ctx.translate(s.x,s.y);ctx.rotate(a*Math.PI/180);
          ctx.beginPath();ctx.moveTo(0,-s.r*2.5);ctx.lineTo(0,s.r*2.5);ctx.stroke();
          ctx.restore();
        });ctx.restore();
      } else if(s.seen){
        ctx.beginPath();ctx.arc(s.x,s.y,s.r*0.65,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,210,80,${0.3*tw})`;ctx.fill();
      } else {
        // Twinkling white star
        ctx.beginPath();ctx.arc(s.x,s.y,s.r*tw,0,Math.PI*2);
        ctx.fillStyle=`rgba(200,218,255,${0.8*tw})`;
        ctx.shadowColor='rgba(180,205,255,0.9)';ctx.shadowBlur=10*tw;
        ctx.fill();ctx.shadowBlur=0;
        // Spike
        ctx.save();ctx.strokeStyle=`rgba(220,232,255,${0.45*tw})`;ctx.lineWidth=0.8;
        [0,45,90,135].forEach(a=>{
          ctx.save();ctx.translate(s.x,s.y);ctx.rotate(a*Math.PI/180);
          ctx.beginPath();ctx.moveTo(0,-s.r*2);ctx.lineTo(0,s.r*2);ctx.stroke();
          ctx.restore();
        });ctx.restore();
      }
    });
    rafId=requestAnimationFrame(draw);
  }
  draw();

  // Progress
  function updateProg(){
    document.getElementById('skyProg').textContent=
      stars.length?`${opened} of ${stars.length} stars explored`:'';
  }
  updateProg();

  // Panel
  const panel=document.getElementById('photoPanel');
  function closePanel(){
    panel.classList.remove('open');
    stars.forEach(s=>s.active=false);
  }
  document.getElementById('panelClose').onclick=closePanel;

  function openStar(i){
    stars.forEach((s,j)=>s.active=j===i);
    if(!stars[i].seen){stars[i].seen=true;opened++;updateProg();}
    document.getElementById('panelImg').style.opacity='0';
    document.getElementById('panelImg').src=photos[i]||'';
    document.getElementById('panelImg').onload=()=>{
      document.getElementById('panelImg').style.transition='opacity 0.35s';
      document.getElementById('panelImg').style.opacity='1';
    };
    const cap=captions[i]||'';
    document.getElementById('panelCap').textContent=cap;
    document.getElementById('panelCap').style.display=cap?'block':'none';
    document.getElementById('panelNum').textContent=`memory ${i+1} of ${stars.length}`;
    panel.classList.add('open');
    document.getElementById('skyHint').style.opacity='0';
    if(opened>=stars.length){
      setTimeout(()=>{closePanel();setTimeout(()=>shootAndGo(hasSong,ctx,W,H,rafId),900);},1400);
    }
  }

  function onTap(ex,ey){
    if(panel.classList.contains('open')){closePanel();return;}
    const hit=stars.findIndex(s=>Math.hypot(s.x-ex,s.y-ey)<=Math.max(s.r*3,28));
    if(hit>=0)openStar(hit);
  }

  canvas.addEventListener('click',e=>{
    const r=canvas.getBoundingClientRect();
    const scaleX=W/r.width, scaleY=H/r.height;
    onTap((e.clientX-r.left)*scaleX,(e.clientY-r.top)*scaleY);
  });
  canvas.addEventListener('touchend',e=>{
    e.preventDefault();
    const t=e.changedTouches[0];
    const r=canvas.getBoundingClientRect();
    const scaleX=W/r.width, scaleY=H/r.height;
    onTap((t.clientX-r.left)*scaleX,(t.clientY-r.top)*scaleY);
  },{passive:false});

  if(photos.length===0){
    setTimeout(()=>goTo(hasSong?'rv-song':'rv-letter'),800);
  }
}

function shootAndGo(hasSong,ctx,W,H,rafId){
  cancelAnimationFrame(rafId);
  const startY=H*0.25;
  let x=0;
  const step=W/40;
  function shoot(){
    ctx.fillStyle='rgba(2,8,24,0.18)';ctx.fillRect(0,0,W,H);
    const trail=Math.min(x,120);
    const g=ctx.createLinearGradient(x-trail,startY+x*0.1,x,startY+x*0.1);
    g.addColorStop(0,'rgba(255,255,255,0)');
    g.addColorStop(1,'rgba(255,255,255,0.9)');
    ctx.beginPath();ctx.moveTo(x-trail,startY+x*0.1);ctx.lineTo(x,startY+x*0.1);
    ctx.strokeStyle=g;ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.arc(x,startY+x*0.1,2.5,0,Math.PI*2);
    ctx.fillStyle='white';ctx.shadowColor='white';ctx.shadowBlur=14;ctx.fill();ctx.shadowBlur=0;
    x+=step;
    if(x<W+130)requestAnimationFrame(shoot);
    else setTimeout(()=>goTo(hasSong?'rv-song':'rv-letter'),200);
  }
  shoot();
}
</script>
</body>
</html>
