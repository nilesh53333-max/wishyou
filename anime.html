<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Priyanka</title>

<style>

body{
margin:0;
overflow:hidden;
font-family: "Courier New";
background: linear-gradient(to top,#1a1a2e,#16213e,#0f3460);
height:100vh;
color:white;
}

canvas{
position:absolute;
top:0;
left:0;
z-index:0;
}

#text{
position:absolute;
top:35%;
width:100%;
text-align:center;
font-size:28px;
z-index:2;
}

#date{
font-size:22px;
margin-top:15px;
}

#clickmsg{
font-size:18px;
margin-top:10px;
}

#girl{
position:absolute;
bottom:50px;
left:45%;
font-size:60px;
opacity:0;
transition:2s;
}

#boy{
position:absolute;
bottom:50px;
left:-100px;
font-size:70px;
transition:4s linear;
}

#finalmsg{
position:absolute;
top:55%;
width:100%;
text-align:center;
font-size:32px;
opacity:0;
letter-spacing:3px;
text-shadow:0 0 10px pink;
}

.heart{
position:absolute;
font-size:28px;
animation:fall 4s forwards;
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(70vh);}
}

</style>
</head>

<body>

<canvas id="sky"></canvas>

<div id="text"></div>
<div id="date"></div>
<div id="clickmsg"></div>

<div id="girl">👧</div>
<div id="boy">👦</div>

<div id="finalmsg">Happy Birthday Priyanka 🎉</div>

<script>

const canvas=document.getElementById("sky");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<120;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
});
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(star=>{
ctx.beginPath();
ctx.arc(star.x,star.y,star.size,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(drawStars);
}

drawStars();


// TYPEWRITER EFFECT

function typeWriter(text,element,delay){
let i=0;

function typing(){
if(i<text.length){
element.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,delay);
}
}

typing();
}


setTimeout(()=>{
typeWriter("World just got lucky since",
document.getElementById("text"),70);
},1000);


setTimeout(()=>{
typeWriter("25 Jan 1981",
document.getElementById("date"),80);
},4000);


setTimeout(()=>{
typeWriter("Click on any star ⭐",
document.getElementById("clickmsg"),80);
},6500);


// STAR CLICK EVENT

document.addEventListener("click",function(e){

let heart=document.createElement("div");

heart.innerHTML="💖";

heart.className="heart";

heart.style.left=e.clientX+"px";
heart.style.top=e.clientY+"px";

document.body.appendChild(heart);


// AFTER HEART FALL

setTimeout(()=>{

document.getElementById("girl").style.opacity=1;

let boy=document.getElementById("boy");

boy.style.left="45%";


setTimeout(()=>{

boy.innerHTML="🙇‍♂️";

let msg=document.getElementById("finalmsg");

msg.style.opacity=1;

},4000);


},4000);


},{once:true});


</script>

</body>
</html>
