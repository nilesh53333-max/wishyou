<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Card</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Great+Vibes&family=Jost:wght@200;300;400&display=swap');

/* Great Vibes = flowing script (premium feel for name)
   Libre Baskerville = classic editorial serif (date, body)
   Jost 200 = ultra-light modern for small labels         */

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#05080f;}

/* ══════════════════════════════════════════
   SCREEN SYSTEM
══════════════════════════════════════════ */
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity .7s ease, transform .7s ease;
  will-change:opacity,transform;
}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(24px);}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0);}

/* ══════════════════════════════════════════
   SHARED NIGHT SKY
══════════════════════════════════════════ */
#sky-bg{
  position:fixed;inset:0;
  background:linear-gradient(168deg,
    #010208 0%, #020816 30%,
    #040d22 55%, #071820 75%,
    #0a2018 90%, #0d2812 100%
  );
  z-index:0;
}
#sky-bg::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 55% 32% at 18% 28%, rgba(72,22,110,.07) 0%,transparent 70%),
    radial-gradient(ellipse 38% 22% at 78% 18%, rgba(22,55,115,.09) 0%,transparent 70%),
    radial-gradient(ellipse 45% 28% at 52% 65%, rgba(15,72,44,.06) 0%,transparent 70%);
}
#stars-fixed{position:fixed;inset:0;pointer-events:none;z-index:1;}
.star{position:absolute;border-radius:50%;background:#fff;
  animation:twk var(--d,2.5s) ease-in-out var(--dl,0s) infinite;}
@keyframes twk{
  0%,100%{opacity:var(--lo,.12);transform:scale(.8);}
  50%{opacity:var(--hi,.9);transform:scale(1.3);}
}
.stx{position:absolute;width:1px;height:12px;
  background:linear-gradient(180deg,transparent,rgba(255,255,255,.65),transparent);
  animation:twk var(--d,3s) ease-in-out var(--dl,0s) infinite;}
.stx::after{content:'';position:absolute;width:12px;height:1px;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);}
.shoot{position:absolute;height:1.5px;opacity:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.9));
  animation:sht var(--sd,7s) linear var(--sdl,4s) infinite;}
@keyframes sht{
  0%{opacity:0;transform:rotate(-28deg) translateX(0);}
  4%{opacity:1;}40%{opacity:0;transform:rotate(-28deg) translateX(-420px);}100%{opacity:0;}
}
.firefly{position:absolute;width:2.5px;height:2.5px;border-radius:50%;background:#aaff88;
  animation:ff var(--ffd,6s) ease-in-out var(--ffdl,0s) infinite;opacity:0;}
@keyframes ff{
  0%,100%{opacity:0;transform:translate(0,0);}
  25%{opacity:.65;}
  55%{opacity:.35;transform:translate(var(--ffx,12px),var(--ffy,-18px));}
  80%{opacity:.5;}
}

/* moon */
#moon-fixed{
  position:fixed;top:4vh;right:6vw;
  width:68px;height:68px;border-radius:50%;z-index:2;
  background:radial-gradient(circle at 37% 35%,#fffef0,#f7ebb0 44%,#d9c660 78%,#b09025);
  box-shadow:0 0 20px 5px rgba(240,220,80,.2),0 0 55px 16px rgba(240,205,55,.08),0 0 110px 38px rgba(200,155,25,.04);
}
#moon-fixed::before{content:'';position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(135deg,rgba(255,255,220,.14) 0%,transparent 50%);}
#moon-fixed::after{content:'';position:absolute;top:8px;left:14px;width:51px;height:51px;border-radius:50%;
  background:linear-gradient(148deg,transparent 36%,rgba(0,0,0,.07));}

/* ground */
#ground-fixed{
  position:fixed;bottom:0;left:0;right:0;height:18%;z-index:2;
  background:linear-gradient(180deg,#1d5a21 0%,#12380f 32%,#0b2409 66%,#061408 100%);
  border-radius:55% 55% 0 0/15% 15% 0 0;overflow:hidden;
}
#ground-fixed::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 26px,rgba(55,145,55,.05) 26px,rgba(55,145,55,.05) 27px);}

/* ══════════════════════════════════════════
   SCREEN 1 — PREVIEW
══════════════════════════════════════════ */
#screen-preview{z-index:10;}

#preview-card{
  position:relative;
  display:flex;flex-direction:column;align-items:center;
  gap:28px;text-align:center;
  padding:0 24px;
}

#prev-heart{
  font-size:38px;color:#777;
  animation:hb .95s cubic-bezier(.25,.46,.45,.94) infinite;
  text-shadow:0 0 10px rgba(140,140,140,.25);
  cursor:default;
  display:block;line-height:1;
}
@keyframes hb{
  0%,100%{transform:scale(1);}
  15%{transform:scale(1.3);}
  30%{transform:scale(1);}
  45%{transform:scale(1.18);}
  60%{transform:scale(1);}
}

#prev-title{
  font-family:'Great Vibes',cursive;
  font-size:clamp(32px,6vw,56px);
  color:rgba(255,255,255,.82);
  letter-spacing:1px;
  line-height:1.2;
  text-shadow:0 0 40px rgba(245,200,100,.15);
}
#prev-sub{
  font-family:'Jost',sans-serif;
  font-weight:200;
  font-size:clamp(11px,1.5vw,14px);
  color:rgba(255,255,255,.32);
  letter-spacing:4px;
  text-transform:uppercase;
}
#prev-desc{
  font-family:'Libre Baskerville',serif;
  font-style:italic;
  font-size:clamp(12px,1.6vw,16px);
  color:rgba(255,255,255,.38);
  letter-spacing:.5px;
  max-width:340px;
  line-height:1.8;
}

.btn-primary{
  font-family:'Jost',sans-serif;
  font-weight:300;
  font-size:14px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(255,255,255,.85);
  background:transparent;
  border:1px solid rgba(255,255,255,.22);
  border-radius:40px;
  padding:13px 38px;
  cursor:pointer;
  transition:all .3s ease;
  position:relative;overflow:hidden;
}
.btn-primary::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,58,110,.08),rgba(245,200,66,.06));
  opacity:0;transition:opacity .3s;
}
.btn-primary:hover{
  border-color:rgba(255,255,255,.45);
  color:#fff;
  box-shadow:0 0 24px rgba(255,100,150,.12);
}
.btn-primary:hover::before{opacity:1;}

/* ══════════════════════════════════════════
   SCREEN 2 — EDIT
══════════════════════════════════════════ */
#screen-edit{z-index:10;}

#edit-box{
  background:rgba(8,14,20,.88);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  padding:36px 36px 32px;
  width:min(440px,90vw);
  backdrop-filter:blur(16px);
  box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04);
}

#edit-header{
  text-align:center;margin-bottom:30px;
}
#edit-icon{font-size:26px;display:block;margin-bottom:10px;
  animation:hb .95s ease infinite;}
#edit-title{
  font-family:'Great Vibes',cursive;
  font-size:30px;color:rgba(255,255,255,.75);
  display:block;margin-bottom:4px;
}
#edit-hint{
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:11px;color:rgba(255,255,255,.28);letter-spacing:2.5px;text-transform:uppercase;
}

.field{margin-bottom:20px;}
.field label{
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,.3);display:block;margin-bottom:8px;
}
.field input{
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;
  color:rgba(255,255,255,.88);
  font-family:'Libre Baskerville',serif;
  font-size:16px;
  padding:12px 16px;
  outline:none;
  transition:border-color .25s,background .25s,box-shadow .25s;
}
.field input:focus{
  border-color:rgba(245,180,60,.4);
  background:rgba(255,255,255,.06);
  box-shadow:0 0 0 3px rgba(245,180,60,.06);
}
.field input::placeholder{color:rgba(255,255,255,.18);}

.field-row{display:flex;gap:14px;}
.field-row .field{flex:1;margin-bottom:0;}

#edit-actions{display:flex;flex-direction:column;gap:10px;margin-top:8px;}
#btn-make{
  width:100%;
  background:linear-gradient(135deg,rgba(255,58,110,.22),rgba(200,44,88,.14));
  border:1px solid rgba(255,58,110,.35);
  border-radius:12px;
  color:rgba(255,150,180,.95);
  font-family:'Jost',sans-serif;font-weight:300;
  font-size:14px;letter-spacing:2.5px;text-transform:uppercase;
  padding:13px;cursor:pointer;
  transition:all .25s;
}
#btn-make:hover{
  background:linear-gradient(135deg,rgba(255,58,110,.35),rgba(200,44,88,.24));
  box-shadow:0 4px 20px rgba(255,58,110,.2);
  transform:translateY(-1px);
}
#btn-back-edit{
  background:transparent;border:none;
  color:rgba(255,255,255,.25);
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:12px;letter-spacing:2px;
  cursor:pointer;padding:6px;
  transition:color .2s;text-align:center;
}
#btn-back-edit:hover{color:rgba(255,255,255,.5);}

/* ══════════════════════════════════════════
   SCREEN 3 — CARD
══════════════════════════════════════════ */
#screen-card{z-index:10;}

/* Falling heart */
#falling-heart{
  position:fixed;font-size:32px;color:#ff3a6e;
  display:none;z-index:50;pointer-events:none;
  line-height:1;transform-origin:center;
}

/* Tree canvas */
#tree-canvas{
  position:fixed;inset:0;
  width:100%;height:100%;
  pointer-events:none;z-index:15;
}

/* LEFT text panel */
#text-panel{
  position:fixed;
  left:0;top:0;bottom:0;width:44%;
  display:flex;flex-direction:column;
  justify-content:center;
  padding:0 0 0 5vw;
  z-index:40;pointer-events:none;
  gap:0;
}
/* vertical gold thread */
#text-panel::before{
  content:'';position:absolute;
  left:3vw;top:22%;bottom:22%;width:1px;
  background:linear-gradient(180deg,
    transparent,rgba(245,198,60,.12) 25%,
    rgba(245,198,60,.32) 50%,
    rgba(245,198,60,.12) 75%,transparent
  );
}

/* TYPEWRITER lines */
.tw-line{
  display:block;
  overflow:hidden;
  white-space:nowrap;
  width:0;
  opacity:1;
}
.tw-line.typing{
  border-right:2px solid rgba(255,255,255,.6);
  animation:cursor .55s step-end infinite;
}
@keyframes cursor{0%,100%{border-color:transparent;}50%{border-color:rgba(255,255,255,.7);}}

#tw-since{
  font-family:'Libre Baskerville',serif;
  font-style:italic;font-weight:400;
  font-size:clamp(11px,1.5vw,17px);
  color:rgba(255,255,255,.5);
  letter-spacing:2px;
  margin-bottom:14px;
  line-height:1.6;
}
#tw-ornament{
  font-family:'Jost',sans-serif;font-weight:200;
  color:rgba(245,198,60,.35);
  font-size:clamp(13px,1.8vw,20px);
  letter-spacing:8px;
  margin-bottom:14px;
  opacity:0;transition:opacity .8s ease;
}
#tw-ornament.show{opacity:1;}
#tw-date{
  font-family:'Libre Baskerville',serif;
  font-weight:700;
  font-size:clamp(18px,2.8vw,30px);
  color:#f5c842;
  letter-spacing:3px;
  margin-bottom:20px;
  text-shadow:0 0 18px rgba(245,200,66,.45),0 0 40px rgba(245,180,50,.18);
}
#tw-divider{
  display:block;width:0;height:1px;
  background:linear-gradient(90deg,rgba(245,198,60,.55),rgba(255,80,130,.38),transparent);
  margin-bottom:20px;
  transition:width 1.1s cubic-bezier(.22,1,.36,1);
}
#tw-divider.expand{width:78%;}
#tw-name{
  font-family:'Great Vibes',cursive;
  font-size:clamp(26px,4.5vw,48px);
  color:#fff;
  letter-spacing:1px;
  text-shadow:0 0 28px rgba(255,255,255,.2);
  line-height:1.2;
}
#tw-heart-accent{
  display:inline-block;
  color:#ff3a6e;font-size:.6em;
  margin-left:6px;vertical-align:middle;
  animation:hb .95s ease infinite;
  text-shadow:0 0 10px rgba(255,58,110,.6);
}

/* heart zone on card screen */
#card-heart-zone{
  position:fixed;top:28%;left:50%;
  transform:translateX(-50%);
  display:flex;align-items:center;gap:14px;
  z-index:45;
  transition:opacity .5s;
}
#card-main-heart{
  font-size:30px;color:#888;
  text-shadow:0 0 8px rgba(160,160,160,.2);
  animation:hb .95s ease infinite;
  cursor:pointer;user-select:none;line-height:1;
  display:inline-block;
  transition:color .5s,text-shadow .5s;
}
#card-hint{
  font-family:'Jost',sans-serif;font-weight:200;
  color:rgba(255,255,255,.35);font-size:13px;
  letter-spacing:1px;white-space:nowrap;
  animation:hp 2.8s ease-in-out infinite;pointer-events:none;
}
@keyframes hp{0%,100%{opacity:.2;}50%{opacity:.72;};}

/* bottom action bar on card */
#card-actions{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%);
  display:flex;gap:12px;align-items:center;
  z-index:50;opacity:0;
  transition:opacity .8s ease;
}
#card-actions.show{opacity:1;pointer-events:all;}
#btn-wa{
  display:flex;align-items:center;gap:8px;
  background:rgba(37,211,102,.15);
  border:1px solid rgba(37,211,102,.35);
  border-radius:40px;
  color:rgba(120,240,140,.9);
  font-family:'Jost',sans-serif;font-weight:300;
  font-size:13px;letter-spacing:2px;text-transform:uppercase;
  padding:11px 26px;cursor:pointer;
  transition:all .25s;text-decoration:none;
}
#btn-wa:hover{background:rgba(37,211,102,.25);box-shadow:0 4px 18px rgba(37,211,102,.18);}
#btn-wa svg{width:18px;height:18px;fill:currentColor;}
#btn-restart{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:40px;color:rgba(255,255,255,.4);
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:12px;letter-spacing:2px;text-transform:uppercase;
  padding:11px 22px;cursor:pointer;transition:all .25s;
}
#btn-restart:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);}

/* ripple + particles */
.ripple{
  position:fixed;border-radius:50%;
  border:1.5px solid rgba(255,58,110,.55);
  pointer-events:none;z-index:22;
  animation:rp .95s ease-out forwards;
}
@keyframes rp{
  0%{width:0;height:0;opacity:.8;margin:0;}
  100%{width:90px;height:90px;opacity:0;margin:-45px;}
}
.pt{
  position:fixed;width:3px;height:3px;border-radius:50%;
  pointer-events:none;z-index:22;
  animation:ptf var(--pt,.75s) ease-out forwards;
}
@keyframes ptf{
  0%{opacity:1;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:translate(var(--px,0),var(--py,0)) scale(.1);}
}

/* fly hearts */
.fly-heart{
  position:fixed;pointer-events:none;z-index:18;opacity:0;
  animation:flyUp var(--fd,3.5s) ease-out var(--fdl,0s) forwards;
  filter:drop-shadow(0 0 4px currentColor);
}
@keyframes flyUp{
  0%{opacity:0;transform:translate(0,0) scale(.3) rotate(-8deg);}
  10%{opacity:1;transform:translate(var(--fx,6px),-12px) scale(1.05) rotate(-6deg);}
  100%{opacity:0;transform:translate(var(--fx2,20px),-140px) scale(.45) rotate(20deg);}
}
</style>
</head>
<body>

<!-- shared background layers -->
<div id="sky-bg"></div>
<div id="stars-fixed"></div>
<div id="moon-fixed"></div>
<div id="ground-fixed"></div>
<canvas id="tree-canvas"></canvas>
<div id="falling-heart">♥</div>

<!-- ════════ SCREEN 1: PREVIEW ════════ -->
<div id="screen-preview" class="screen active">
  <div id="preview-card">
    <span id="prev-heart">♥</span>
    <div>
      <span id="prev-sub">A Birthday Card for</span>
    </div>
    <span id="prev-title">Someone Special</span>
    <span id="prev-desc">
      A night sky fills with stars, a heart falls gently to earth,<br>
      and a tree of hearts blooms — just for them.
    </span>
    <button class="btn-primary" id="btn-create">Create Your Card</button>
  </div>
</div>

<!-- ════════ SCREEN 2: EDIT ════════ -->
<div id="screen-edit" class="screen hidden">
  <div id="edit-box">
    <div id="edit-header">
      <span id="edit-icon">♥</span>
      <span id="edit-title">Craft the Card</span>
      <span id="edit-hint">fill in the details below</span>
    </div>

    <div class="field">
      <label>Their Name</label>
      <input id="inp-name" type="text" placeholder="e.g. Nilesh" maxlength="30">
    </div>

    <div class="field-row">
      <div class="field">
        <label>Birth Date</label>
        <input id="inp-day" type="text" placeholder="25" maxlength="2" style="text-align:center">
      </div>
      <div class="field">
        <label>Month</label>
        <input id="inp-month" type="text" placeholder="JAN" maxlength="9" style="text-align:center">
      </div>
      <div class="field">
        <label>Year</label>
        <input id="inp-year" type="text" placeholder="1981" maxlength="4" style="text-align:center">
      </div>
    </div>

    <div id="edit-actions">
      <button id="btn-make">Make the Card ♥</button>
      <button id="btn-back-edit">← back</button>
    </div>
  </div>
</div>

<!-- ════════ SCREEN 3: CARD ════════ -->
<div id="screen-card" class="screen hidden">

  <!-- grey heart to click -->
  <div id="card-heart-zone">
    <span id="card-main-heart">♥</span>
    <span id="card-hint">click on heart</span>
  </div>

  <!-- left text panel (hidden until animation) -->
  <div id="text-panel">
    <span id="tw-since" class="tw-line"></span>
    <span id="tw-ornament">✦ · · · ✦</span>
    <span id="tw-date" class="tw-line"></span>
    <span id="tw-divider"></span>
    <span id="tw-name" class="tw-line"></span>
  </div>

  <!-- bottom actions -->
  <div id="card-actions">
    <a id="btn-wa" href="#" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Share on WhatsApp
    </a>
    <button id="btn-restart">Make Another</button>
  </div>
</div>

<script>
/* ══ STARS ══════════════════════════════════ */
const SF=document.getElementById('stars-fixed');
for(let i=0;i<260;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()<.1?(2.2+Math.random()*2.2):(0.6+Math.random()*1.6);
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*80}vh;left:${Math.random()*100}vw;--d:${1.5+Math.random()*3.5}s;--dl:${Math.random()*6}s;--lo:${.07+Math.random()*.2};--hi:${.45+Math.random()*.55};`;
  SF.appendChild(s);
}
for(let i=0;i<9;i++){
  const sc=document.createElement('div');sc.className='stx';
  sc.style.cssText=`top:${4+Math.random()*62}vh;left:${4+Math.random()*92}vw;--d:${2+Math.random()*2.5}s;--dl:${Math.random()*5}s;--lo:.08;--hi:.75;`;
  SF.appendChild(sc);
}
for(let i=0;i<4;i++){
  const sh=document.createElement('div');sh.className='shoot';
  sh.style.cssText=`width:${80+Math.random()*150}px;top:${3+Math.random()*40}vh;left:${20+Math.random()*65}vw;--sd:${6+Math.random()*6}s;--sdl:${2+i*6.5}s;`;
  SF.appendChild(sh);
}
for(let i=0;i<16;i++){
  const ff=document.createElement('div');ff.className='firefly';
  ff.style.cssText=`bottom:${18+Math.random()*8}vh;left:${Math.random()*100}vw;--ffd:${4+Math.random()*5}s;--ffdl:${Math.random()*7}s;--ffx:${(Math.random()-.5)*38}px;--ffy:${-8-Math.random()*22}px;`;
  SF.appendChild(ff);
}

/* ══ CANVAS ═══════════════════════════════════ */
const tc=document.getElementById('tree-canvas');
const tCtx=tc.getContext('2d');
let tW,tH,groundY;
function resizeC(){tW=tc.width=window.innerWidth;tH=tc.height=window.innerHeight;groundY=tH*.83;}
resizeC();window.addEventListener('resize',resizeC);

/* ══ STATE ════════════════════════════════════ */
let userName='', userDate='';
let animDone=false, flyInterval=null;
let landX=0, landY=0;
let cardAnimRunning=false;

/* ══ SCREEN NAVIGATION ═══════════════════════ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('active');s.classList.add('hidden');
  });
  const s=document.getElementById(id);
  s.classList.remove('hidden');
  requestAnimationFrame(()=>s.classList.add('active'));
}

document.getElementById('btn-create').addEventListener('click',()=>showScreen('screen-edit'));
document.getElementById('btn-back-edit').addEventListener('click',()=>showScreen('screen-preview'));

document.getElementById('btn-make').addEventListener('click',()=>{
  const name=document.getElementById('inp-name').value.trim();
  const day=document.getElementById('inp-day').value.trim();
  const month=document.getElementById('inp-month').value.trim().toUpperCase();
  const year=document.getElementById('inp-year').value.trim();
  if(!name){document.getElementById('inp-name').focus();return;}
  userName=name;
  userDate=`${day||'??'} · ${month||'???'} · ${year||'????'}`;
  resetCardState();
  showScreen('screen-card');
});

document.getElementById('btn-restart').addEventListener('click',()=>{
  resetCardState();
  showScreen('screen-edit');
});

/* ══ RESET CARD STATE ════════════════════════ */
function resetCardState(){
  cardAnimRunning=false;animDone=false;
  if(flyInterval){clearInterval(flyInterval);flyInterval=null;}
  document.querySelectorAll('.fly-heart,.ripple,.pt').forEach(e=>e.remove());
  tCtx.clearRect(0,0,tW,tH);

  // reset text panel
  const twLines=[document.getElementById('tw-since'),document.getElementById('tw-date'),document.getElementById('tw-name')];
  twLines.forEach(el=>{el.style.width='0';el.classList.remove('typing');});
  document.getElementById('tw-ornament').classList.remove('show');
  document.getElementById('tw-divider').classList.remove('expand');

  // reset heart zone
  const chz=document.getElementById('card-heart-zone');
  chz.style.opacity='1';chz.style.display='flex';
  const cmh=document.getElementById('card-main-heart');
  cmh.style.color='#888';
  cmh.style.textShadow='0 0 8px rgba(160,160,160,.2)';

  document.getElementById('falling-heart').style.display='none';
  document.getElementById('card-actions').classList.remove('show');
}

/* ══ HEART CLICK ═════════════════════════════ */
document.getElementById('card-main-heart').addEventListener('click',function(){
  if(cardAnimRunning)return;
  cardAnimRunning=true;
  const cmh=this;

  // turn red
  cmh.style.color='#ff3a6e';
  cmh.style.textShadow='0 0 18px rgba(255,58,110,.9),0 0 45px rgba(255,58,110,.3)';

  setTimeout(()=>{
    const chz=document.getElementById('card-heart-zone');
    chz.style.opacity='0';
    setTimeout(()=>chz.style.display='none',600);

    const r=cmh.getBoundingClientRect();
    const sx=r.left+r.width/2, sy=r.top+r.height/2;
    const targetX=tW*.62, ey=groundY-14;
    landX=targetX;landY=ey;

    const fh=document.getElementById('falling-heart');
    fh.style.cssText=`display:block;left:${sx-16}px;top:${sy-16}px;color:#ff3a6e;text-shadow:0 0 14px rgba(255,58,110,.85);`;

    let t0=null;const dur=3800;
    function fall(ts){
      if(!t0)t0=ts;
      const p=Math.min((ts-t0)/dur,1);
      const ep=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
      const cx=sx+(targetX-sx)*ep;
      const sway=Math.sin(p*Math.PI*3.2)*22*(1-p*.68);
      const rot=Math.sin(p*Math.PI*2.4)*20;
      const scl=1+Math.sin(p*Math.PI)*.24;
      fh.style.top=(sy+(ey-sy)*ep-16)+'px';
      fh.style.left=(cx+sway-16)+'px';
      fh.style.transform=`scale(${scl}) rotate(${rot}deg)`;
      fh.style.textShadow=`0 0 ${12+p*24}px rgba(255,58,110,.92),0 0 ${22+p*40}px rgba(255,58,110,.28)`;
      if(p<1){requestAnimationFrame(fall);}else{fh.style.display='none';onLand(targetX,ey);}
    }
    requestAnimationFrame(fall);
  },320);
});

/* ══ LANDING ════════════════════════════════ */
function spawnRipple(x,y){
  for(let i=0;i<3;i++){
    const rp=document.createElement('div');rp.className='ripple';
    rp.style.cssText=`left:${x}px;top:${y}px;animation-delay:${i*.24}s;border-color:rgba(255,${70+i*35},${90+i*25},.${6-i*2});`;
    document.body.appendChild(rp);rp.addEventListener('animationend',()=>rp.remove());
  }
}
function spawnBurst(x,y){
  const cols=['#ff3a6e','#ff9944','#ffcc44','#ff66aa','#cc44ff','#44aaff','#88ff55'];
  for(let i=0;i<16;i++){
    const pt=document.createElement('div');pt.className='pt';
    const ang=Math.random()*Math.PI*2,dist=22+Math.random()*55;
    pt.style.cssText=`left:${x}px;top:${y}px;background:${cols[i%cols.length]};--px:${Math.cos(ang)*dist}px;--py:${Math.sin(ang)*dist}px;--pt:${.45+Math.random()*.65}s;animation-delay:${Math.random()*.08}s;`;
    document.body.appendChild(pt);pt.addEventListener('animationend',()=>pt.remove());
  }
}

function onLand(lx,ly){
  spawnRipple(lx,ly);spawnBurst(lx,ly);
  // start artist tree
  setTimeout(()=>growArtistTree(lx,ly),300);
  // typewriter sequence
  setTimeout(()=>typeSequence(),200);
}

/* ══ TYPEWRITER ENGINE ══════════════════════ */
function typeText(el,text,speed,onDone){
  el.style.width='auto';
  el.textContent='';
  el.classList.add('typing');
  let i=0;
  function tick(){
    if(i<=text.length){
      el.textContent=text.slice(0,i);
      i++;
      setTimeout(tick,speed+(Math.random()*speed*.4));
    }else{
      el.classList.remove('typing');
      if(onDone)onDone();
    }
  }
  tick();
}

function typeSequence(){
  const sinceEl=document.getElementById('tw-since');
  const dateEl=document.getElementById('tw-date');
  const nameEl=document.getElementById('tw-name');
  const orn=document.getElementById('tw-ornament');
  const div=document.getElementById('tw-divider');

  const sinceText='The world just got luckier since';
  const dateText=userDate;
  const nameText='Happy Birthday, '+userName;

  // Step 1: type "The world..."
  typeText(sinceEl,sinceText,52,()=>{
    // Step 2: after 500ms, ornament + date
    setTimeout(()=>{
      orn.classList.add('show');
      setTimeout(()=>{
        typeText(dateEl,dateText,72,()=>{
          // Step 3: divider then name
          setTimeout(()=>{
            div.classList.add('expand');
            setTimeout(()=>{
              typeText(nameEl,nameText,58,()=>{
                // add beating heart accent
                const acc=document.createElement('span');
                acc.id='tw-heart-accent';acc.textContent=' ♥';
                nameEl.appendChild(acc);
                // show actions
                setTimeout(()=>{
                  document.getElementById('card-actions').classList.add('show');
                  setupWhatsApp();
                },600);
              });
            },400);
          },700);
        });
      },180);
    },500);
  });
}

/* ══ WHATSAPP ════════════════════════════════ */
function setupWhatsApp(){
  // Build shareable card URL with name+date baked in as params
  const base = window.location.origin + window.location.pathname;
  const cardURL = `${base}?name=${encodeURIComponent(userName)}&date=${encodeURIComponent(userDate)}`;
  const msg = `🌙✨ *Happy Birthday, ${userName}!* ✨🌙\n\nThe world just got luckier since ${userDate}.\n\n🎁 Open your birthday card:\n${cardURL}\n\nSent with love ♥`;
  document.getElementById('btn-wa').href = `https://wa.me/?text=${encodeURIComponent(msg)}`;
}

/* ══ HEART COLOURS ══════════════════════════ */
const HC=['#ff3a6e','#ff6b9d','#ff99cc','#ffcc44','#ff5588',
  '#ee1155','#ff8822','#cc44ff','#44aaff','#55ffcc',
  '#ff44aa','#ffee55','#88ff44','#ff7744'];

/* ── draw a filled canvas heart ── */
function drawHeart(x,y,sz,col,alpha){
  tCtx.save();
  tCtx.globalAlpha=alpha;
  tCtx.fillStyle=col;
  tCtx.shadowColor=col;
  tCtx.shadowBlur=sz*3.5;
  const s=sz*.05;
  tCtx.beginPath();
  tCtx.moveTo(x,y-s*2);
  tCtx.bezierCurveTo(x+s*5,y-s*10,x+s*13,y+s*2,x,y+s*10);
  tCtx.bezierCurveTo(x-s*13,y+s*2,x-s*5,y-s*10,x,y-s*2);
  tCtx.closePath();
  tCtx.fill();
  tCtx.restore();
}

/* ══ TREE  ══════════════════════════════════
   Fully pre-computed flat node list.
   Every node stores its own ABSOLUTE start/end
   so nothing depends on runtime parent state.
   Rendered branch-by-branch with a time offset
   so it appears to "grow" stroke by stroke —
   like an artist drawing it with a brush pen.
════════════════════════════════════════════ */
function growArtistTree(rootX, rootY){
  const nodes = [];   // flat list, built recursively
  const MAX_DEPTH = 9;

  function build(sx, sy, angle, len, depth, startMs){
    if(depth > MAX_DEPTH) return;

    // end point with a gentle organic bend
    const bendX = (Math.random()-.5) * len * .35;
    const bendY = (Math.random()-.5) * len * .16;
    const ex = sx + Math.sin(angle)*len + bendX;
    const ey = sy - Math.cos(angle)*len + bendY;

    const drawDur  = 300 + depth*30;           // ms to ink this branch
    const maxWidth = Math.max(11 - depth*1.12, .6);
    // bark colour: deep brown trunk → warm chestnut tips
    const rv = Math.round(50  + depth*10);
    const gv = Math.round(24  + depth*3);
    const bv = 9;
    const col = `rgb(${rv},${gv},${bv})`;

    nodes.push({ sx, sy, ex, ey, bendX, bendY,
      depth, startMs, drawDur, maxWidth, col });

    if(depth < MAX_DEPTH){
      const childStart = startMs + drawDur * .52;
      const spread = (Math.PI/5.4) + Math.random()*(Math.PI/9);
      const lenScale = .62 + Math.random()*.12;
      const bias = (Math.random()-.5)*.14;
      const threeKids = depth < 4 && Math.random() < .38;

      build(ex, ey, angle - spread + bias, len*lenScale,        depth+1, childStart);
      build(ex, ey, angle + spread + bias, len*(lenScale-.03),  depth+1, childStart);
      if(threeKids)
        build(ex, ey, angle + bias*.3,    len*lenScale*.72,     depth+1, childStart+100);
    }
  }

  build(rootX, rootY, 0, tH*.135, 0, 0);

  /* ── helpers ── */
  function lerp(a,b,t){ return a+(b-a)*t; }

  // draw one "artist stroke" segment of a branch
  function paintSegment(b, t0f, t1f){
    // quadratic bezier mid-point for the organic curve
    const mx = (b.sx+b.ex)/2 + b.bendX*.5;
    const my = (b.sy+b.ey)/2 + b.bendY*.5;
    // points along the bezier
    const ax = lerp(lerp(b.sx,mx,t0f), lerp(mx,b.ex,t0f), t0f);
    const ay = lerp(lerp(b.sy,my,t0f), lerp(my,b.ey,t0f), t0f);
    const bx = lerp(lerp(b.sx,mx,t1f), lerp(mx,b.ex,t1f), t1f);
    const by = lerp(lerp(b.sy,my,t1f), lerp(my,b.ey,t1f), t1f);
    // pressure: thick in middle, thin at tips
    const pr = Math.sin(((t0f+t1f)*.5)*Math.PI);
    const lw = Math.max(b.maxWidth * pr, .55);
    // hand-wobble perpendicular to stroke direction
    const dx=bx-ax, dy=by-ay, len2=Math.sqrt(dx*dx+dy*dy)+.001;
    const nx=-dy/len2, ny=dx/len2;
    const wob = (Math.random()-.5) * Math.max(3.5-b.depth*.38,.3);
    tCtx.lineWidth = lw;
    tCtx.beginPath();
    tCtx.moveTo(ax+nx*wob,       ay+ny*wob);
    tCtx.lineTo(bx+nx*wob*.75,   by+ny*wob*.75);
    tCtx.stroke();
  }

  const SEGS = 18;  // segments per branch
  const t0 = performance.now();
  const totalDur = nodes.reduce((m,n)=>Math.max(m, n.startMs+n.drawDur), 0) + 2400;
  const heartsPlaced = new Set();

  function frame(now){
    tCtx.clearRect(0,0,tW,tH);
    const elapsed = now - t0;

    for(const b of nodes){
      const el = elapsed - b.startMs;
      if(el <= 0) continue;

      const prog  = Math.min(el/b.drawDur, 1);
      const alpha = (.92 - b.depth*.025) * Math.min(prog*4, 1);

      tCtx.save();
      tCtx.globalAlpha = alpha;
      tCtx.strokeStyle = b.col;
      tCtx.lineCap = tCtx.lineJoin = 'round';

      const drawnSegs = Math.floor(prog * SEGS);
      for(let si=0; si<drawnSegs; si++){
        paintSegment(b, si/SEGS, (si+1)/SEGS);
      }
      // partial last segment
      const partFrac = (prog*SEGS) - drawnSegs;
      if(partFrac > .01 && drawnSegs < SEGS){
        paintSegment(b, drawnSegs/SEGS, (drawnSegs+partFrac)/SEGS);
      }
      tCtx.restore();

      // colourful heart at tip once fully drawn
      if(prog >= 1 && b.depth >= MAX_DEPTH-1 && !heartsPlaced.has(b)){
        heartsPlaced.add(b);
        const isLeaf = b.depth === MAX_DEPTH;
        const sz  = isLeaf ? (5+Math.random()*8) : (3.5+Math.random()*5);
        const col = HC[Math.floor(Math.random()*HC.length)];
        drawHeart(b.ex, b.ey, sz, col, .55+Math.random()*.42);
      }
    }

    if(elapsed < totalDur){
      requestAnimationFrame(frame);
    } else {
      startFallingHearts(rootX, rootY);
    }
  }
  requestAnimationFrame(frame);
}

/* ══ HEARTS RAIN FROM TREE ══════════════════ */
function startFallingHearts(lx, ly){
  const spread = Math.min(tW*.30, 230);

  function spawnOne(){
    const fh  = document.createElement('div');
    fh.className = 'fly-heart';
    const ox  = (Math.random()-.5)*spread*2;
    const fx  = (Math.random()-.5)*55;
    const fx2 = fx + (Math.random()-.5)*35;
    const sz  = 7 + Math.random()*18;
    const col = HC[Math.floor(Math.random()*HC.length)];
    // start at a random height within the tree canopy
    const sb  = tH - ly + 20 + Math.random()*80;
    fh.style.cssText = `
      left:${lx+ox}px; bottom:${sb}px;
      font-size:${sz}px; color:${col};
      --fd:${2.2+Math.random()*2.8}s;
      --fdl:${Math.random()*.4}s;
      --fx:${fx}px; --fx2:${fx2}px;
      text-shadow:0 0 7px ${col};
    `;
    fh.textContent = '♥';
    document.body.appendChild(fh);
    fh.addEventListener('animationend', ()=>fh.remove());
  }

  // initial burst
  for(let i=0;i<26;i++) setTimeout(spawnOne, i*65);
  // continuous shower
  flyInterval = setInterval(()=>{
    const n = 3 + Math.floor(Math.random()*4);
    for(let i=0;i<n;i++) setTimeout(spawnOne, i*110);
  }, 800);
}

/* ══ URL PARAM AUTO-LOAD ════════════════════
   When someone opens a shared link like:
   wishyou.ai/anime.html?name=Nilesh&date=25+·+JAN+·+1981
   → skip straight to card screen and auto-play
════════════════════════════════════════════ */
(function(){
  const params = new URLSearchParams(window.location.search);
  const pName  = params.get('name');
  const pDate  = params.get('date');

  if(pName && pDate){
    // Pre-fill inputs (in case user goes back)
    document.getElementById('inp-name').value  = pName;
    // Parse date back into day/month/year fields
    const parts = pDate.split('·').map(s=>s.trim());
    if(parts[0]) document.getElementById('inp-day').value   = parts[0];
    if(parts[1]) document.getElementById('inp-month').value = parts[1];
    if(parts[2]) document.getElementById('inp-year').value  = parts[2];

    // Set state and jump straight to card
    userName = pName;
    userDate = pDate;
    resetCardState();
    showScreen('screen-card');

    // Auto-trigger the heart click after a short delay
    // so the recipient sees the full animation play out
    setTimeout(()=>{
      const cmh = document.getElementById('card-main-heart');
      cmh.dispatchEvent(new Event('click'));
    }, 1200);
  }
})();
