<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Card</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Great+Vibes&family=Jost:wght@200;300;400&display=swap');

/* Great Vibes = flowing script (premium feel for name)
   Libre Baskerville = classic editorial serif (date, body)
   Jost 200 = ultra-light modern for small labels         */

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#05080f;}

/* ══════════════════════════════════════════
   SCREEN SYSTEM
══════════════════════════════════════════ */
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity .7s ease, transform .7s ease;
  will-change:opacity,transform;
}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(24px);}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0);}

/* ══════════════════════════════════════════
   SHARED NIGHT SKY
══════════════════════════════════════════ */
#sky-bg{
  position:fixed;inset:0;
  background:linear-gradient(168deg,
    #010208 0%, #020816 30%,
    #040d22 55%, #071820 75%,
    #0a2018 90%, #0d2812 100%
  );
  z-index:0;
}
#sky-bg::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 55% 32% at 18% 28%, rgba(72,22,110,.07) 0%,transparent 70%),
    radial-gradient(ellipse 38% 22% at 78% 18%, rgba(22,55,115,.09) 0%,transparent 70%),
    radial-gradient(ellipse 45% 28% at 52% 65%, rgba(15,72,44,.06) 0%,transparent 70%);
}
#stars-fixed{position:fixed;inset:0;pointer-events:none;z-index:1;}
.star{position:absolute;border-radius:50%;background:#fff;
  animation:twk var(--d,2.5s) ease-in-out var(--dl,0s) infinite;}
@keyframes twk{
  0%,100%{opacity:var(--lo,.12);transform:scale(.8);}
  50%{opacity:var(--hi,.9);transform:scale(1.3);}
}
.stx{position:absolute;width:1px;height:12px;
  background:linear-gradient(180deg,transparent,rgba(255,255,255,.65),transparent);
  animation:twk var(--d,3s) ease-in-out var(--dl,0s) infinite;}
.stx::after{content:'';position:absolute;width:12px;height:1px;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);}
.shoot{position:absolute;height:1.5px;opacity:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.9));
  animation:sht var(--sd,7s) linear var(--sdl,4s) infinite;}
@keyframes sht{
  0%{opacity:0;transform:rotate(-28deg) translateX(0);}
  4%{opacity:1;}40%{opacity:0;transform:rotate(-28deg) translateX(-420px);}100%{opacity:0;}
}
.firefly{position:absolute;width:2.5px;height:2.5px;border-radius:50%;background:#aaff88;
  animation:ff var(--ffd,6s) ease-in-out var(--ffdl,0s) infinite;opacity:0;}
@keyframes ff{
  0%,100%{opacity:0;transform:translate(0,0);}
  25%{opacity:.65;}
  55%{opacity:.35;transform:translate(var(--ffx,12px),var(--ffy,-18px));}
  80%{opacity:.5;}
}

/* moon */
#moon-fixed{
  position:fixed;top:4vh;right:6vw;
  width:68px;height:68px;border-radius:50%;z-index:2;
  background:radial-gradient(circle at 37% 35%,#fffef0,#f7ebb0 44%,#d9c660 78%,#b09025);
  box-shadow:0 0 20px 5px rgba(240,220,80,.2),0 0 55px 16px rgba(240,205,55,.08),0 0 110px 38px rgba(200,155,25,.04);
}
#moon-fixed::before{content:'';position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(135deg,rgba(255,255,220,.14) 0%,transparent 50%);}
#moon-fixed::after{content:'';position:absolute;top:8px;left:14px;width:51px;height:51px;border-radius:50%;
  background:linear-gradient(148deg,transparent 36%,rgba(0,0,0,.07));}

/* ground */
#ground-fixed{
  position:fixed;bottom:0;left:0;right:0;height:18%;z-index:2;
  background:linear-gradient(180deg,#1d5a21 0%,#12380f 32%,#0b2409 66%,#061408 100%);
  border-radius:55% 55% 0 0/15% 15% 0 0;overflow:hidden;
}
#ground-fixed::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 26px,rgba(55,145,55,.05) 26px,rgba(55,145,55,.05) 27px);}

/* ══════════════════════════════════════════
   SCREEN 1 — PREVIEW
══════════════════════════════════════════ */
#screen-preview{z-index:10;}

#preview-card{
  position:relative;
  display:flex;flex-direction:column;align-items:center;
  gap:28px;text-align:center;
  padding:0 24px;
}

#prev-heart{
  font-size:38px;color:#777;
  animation:hb .95s cubic-bezier(.25,.46,.45,.94) infinite;
  text-shadow:0 0 10px rgba(140,140,140,.25);
  cursor:default;
  display:block;line-height:1;
}
@keyframes hb{
  0%,100%{transform:scale(1);}
  15%{transform:scale(1.3);}
  30%{transform:scale(1);}
  45%{transform:scale(1.18);}
  60%{transform:scale(1);}
}

#prev-title{
  font-family:'Great Vibes',cursive;
  font-size:clamp(32px,6vw,56px);
  color:rgba(255,255,255,.82);
  letter-spacing:1px;
  line-height:1.2;
  text-shadow:0 0 40px rgba(245,200,100,.15);
}
#prev-sub{
  font-family:'Jost',sans-serif;
  font-weight:200;
  font-size:clamp(11px,1.5vw,14px);
  color:rgba(255,255,255,.32);
  letter-spacing:4px;
  text-transform:uppercase;
}
#prev-desc{
  font-family:'Libre Baskerville',serif;
  font-style:italic;
  font-size:clamp(12px,1.6vw,16px);
  color:rgba(255,255,255,.38);
  letter-spacing:.5px;
  max-width:340px;
  line-height:1.8;
}

.btn-primary{
  font-family:'Jost',sans-serif;
  font-weight:300;
  font-size:14px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(255,255,255,.85);
  background:transparent;
  border:1px solid rgba(255,255,255,.22);
  border-radius:40px;
  padding:13px 38px;
  cursor:pointer;
  transition:all .3s ease;
  position:relative;overflow:hidden;
}
.btn-primary::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,58,110,.08),rgba(245,200,66,.06));
  opacity:0;transition:opacity .3s;
}
.btn-primary:hover{
  border-color:rgba(255,255,255,.45);
  color:#fff;
  box-shadow:0 0 24px rgba(255,100,150,.12);
}
.btn-primary:hover::before{opacity:1;}

/* ══════════════════════════════════════════
   SCREEN 2 — EDIT
══════════════════════════════════════════ */
#screen-edit{z-index:10;}

#edit-box{
  background:rgba(8,14,20,.88);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  padding:36px 36px 32px;
  width:min(440px,90vw);
  backdrop-filter:blur(16px);
  box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04);
}

#edit-header{
  text-align:center;margin-bottom:30px;
}
#edit-icon{font-size:26px;display:block;margin-bottom:10px;
  animation:hb .95s ease infinite;}
#edit-title{
  font-family:'Great Vibes',cursive;
  font-size:30px;color:rgba(255,255,255,.75);
  display:block;margin-bottom:4px;
}
#edit-hint{
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:11px;color:rgba(255,255,255,.28);letter-spacing:2.5px;text-transform:uppercase;
}

.field{margin-bottom:20px;}
.field label{
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,.3);display:block;margin-bottom:8px;
}
.field input{
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;
  color:rgba(255,255,255,.88);
  font-family:'Libre Baskerville',serif;
  font-size:16px;
  padding:12px 16px;
  outline:none;
  transition:border-color .25s,background .25s,box-shadow .25s;
}
.field input:focus{
  border-color:rgba(245,180,60,.4);
  background:rgba(255,255,255,.06);
  box-shadow:0 0 0 3px rgba(245,180,60,.06);
}
.field input::placeholder{color:rgba(255,255,255,.18);}

.field-row{display:flex;gap:14px;}
.field-row .field{flex:1;margin-bottom:0;}

#edit-actions{display:flex;flex-direction:column;gap:10px;margin-top:8px;}
#btn-make{
  width:100%;
  background:linear-gradient(135deg,rgba(255,58,110,.22),rgba(200,44,88,.14));
  border:1px solid rgba(255,58,110,.35);
  border-radius:12px;
  color:rgba(255,150,180,.95);
  font-family:'Jost',sans-serif;font-weight:300;
  font-size:14px;letter-spacing:2.5px;text-transform:uppercase;
  padding:13px;cursor:pointer;
  transition:all .25s;
}
#btn-make:hover{
  background:linear-gradient(135deg,rgba(255,58,110,.35),rgba(200,44,88,.24));
  box-shadow:0 4px 20px rgba(255,58,110,.2);
  transform:translateY(-1px);
}
#btn-back-edit{
  background:transparent;border:none;
  color:rgba(255,255,255,.25);
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:12px;letter-spacing:2px;
  cursor:pointer;padding:6px;
  transition:color .2s;text-align:center;
}
#btn-back-edit:hover{color:rgba(255,255,255,.5);}

/* ══════════════════════════════════════════
   SCREEN 3 — CARD
══════════════════════════════════════════ */
#screen-card{z-index:10;}

/* Falling heart */
#falling-heart{
  position:fixed;font-size:32px;color:#ff3a6e;
  display:none;z-index:50;pointer-events:none;
  line-height:1;transform-origin:center;
}

/* Tree canvas */
#tree-canvas{
  position:fixed;inset:0;
  width:100%;height:100%;
  pointer-events:none;z-index:15;
}

/* LEFT text panel */
#text-panel{
  position:fixed;
  left:0;top:0;bottom:0;width:44%;
  display:flex;flex-direction:column;
  justify-content:center;
  padding:0 0 0 5vw;
  z-index:40;pointer-events:none;
  gap:0;
}
/* vertical gold thread */
#text-panel::before{
  content:'';position:absolute;
  left:3vw;top:22%;bottom:22%;width:1px;
  background:linear-gradient(180deg,
    transparent,rgba(245,198,60,.12) 25%,
    rgba(245,198,60,.32) 50%,
    rgba(245,198,60,.12) 75%,transparent
  );
}

/* TYPEWRITER lines */
.tw-line{
  display:block;
  overflow:hidden;
  white-space:nowrap;
  width:0;
  opacity:1;
}
.tw-line.typing{
  border-right:2px solid rgba(255,255,255,.6);
  animation:cursor .55s step-end infinite;
}
@keyframes cursor{0%,100%{border-color:transparent;}50%{border-color:rgba(255,255,255,.7);}}

#tw-since{
  font-family:'Libre Baskerville',serif;
  font-style:italic;font-weight:400;
  font-size:clamp(11px,1.5vw,17px);
  color:rgba(255,255,255,.5);
  letter-spacing:2px;
  margin-bottom:14px;
  line-height:1.6;
}
#tw-ornament{
  font-family:'Jost',sans-serif;font-weight:200;
  color:rgba(245,198,60,.35);
  font-size:clamp(13px,1.8vw,20px);
  letter-spacing:8px;
  margin-bottom:14px;
  opacity:0;transition:opacity .8s ease;
}
#tw-ornament.show{opacity:1;}
#tw-date{
  font-family:'Libre Baskerville',serif;
  font-weight:700;
  font-size:clamp(18px,2.8vw,30px);
  color:#f5c842;
  letter-spacing:3px;
  margin-bottom:20px;
  text-shadow:0 0 18px rgba(245,200,66,.45),0 0 40px rgba(245,180,50,.18);
}
#tw-divider{
  display:block;width:0;height:1px;
  background:linear-gradient(90deg,rgba(245,198,60,.55),rgba(255,80,130,.38),transparent);
  margin-bottom:20px;
  transition:width 1.1s cubic-bezier(.22,1,.36,1);
}
#tw-divider.expand{width:78%;}
#tw-name{
  font-family:'Great Vibes',cursive;
  font-size:clamp(26px,4.5vw,48px);
  color:#fff;
  letter-spacing:1px;
  text-shadow:0 0 28px rgba(255,255,255,.2);
  line-height:1.2;
}
#tw-heart-accent{
  display:inline-block;
  color:#ff3a6e;font-size:.6em;
  margin-left:6px;vertical-align:middle;
  animation:hb .95s ease infinite;
  text-shadow:0 0 10px rgba(255,58,110,.6);
}

/* ── INTRO TYPEWRITER (before star click) ── */
#intro-panel{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:46;pointer-events:none;
  gap:18px;
}
#intro-since{
  font-family:'Libre Baskerville',serif;
  font-style:italic;font-weight:400;
  font-size:clamp(14px,2.2vw,22px);
  color:rgba(255,255,255,.62);
  letter-spacing:2px;
  min-height:1.6em;
  text-align:center;
}
#intro-date{
  font-family:'Libre Baskerville',serif;
  font-weight:700;
  font-size:clamp(22px,3.8vw,40px);
  color:#f5c842;
  letter-spacing:5px;
  text-shadow:0 0 22px rgba(245,200,66,.55),0 0 50px rgba(245,180,50,.2);
  min-height:1.4em;
  text-align:center;
}
/* blinking cursor for intro */
.intro-cursor{
  display:inline-block;
  border-right:2px solid rgba(255,255,255,.65);
  animation:cur .55s step-end infinite;
  margin-left:1px;
}
@keyframes cur{0%,100%{border-color:transparent;}50%{border-color:rgba(255,255,255,.8);}}
.intro-cursor.gold{border-right-color:rgba(245,200,66,.8);}

/* ── BIRTHDAY TEXT (bottom, after tree) ── */
#bday-panel{
  position:fixed;
  bottom:calc(18% + 18px);
  left:0;right:0;
  text-align:center;
  z-index:40;pointer-events:none;
  opacity:0;transition:opacity .5s ease;
}
#bday-panel.show{opacity:1;}
#tw-bday{
  font-family:'Great Vibes',cursive;
  font-size:clamp(28px,5vw,52px);
  color:#fff;
  letter-spacing:1px;
  text-shadow:
    0 0 30px rgba(255,100,160,.5),
    0 0 60px rgba(255,58,110,.2),
    0 2px 4px rgba(0,0,0,.8);
  display:inline-block;
  min-height:1.3em;
}
#tw-bday-heart{
  display:inline-block;
  color:#ff3a6e;font-size:.7em;
  margin-left:8px;vertical-align:middle;
  animation:hb .95s ease infinite;
  text-shadow:0 0 12px rgba(255,58,110,.7);
}
  position:fixed;top:28%;left:50%;
  transform:translateX(-50%);
  display:flex;align-items:center;gap:14px;
  z-index:45;
  transition:opacity .5s;
}
#card-main-heart{
  font-size:30px;color:#888;
  text-shadow:0 0 8px rgba(160,160,160,.2);
  animation:hb .95s ease infinite;
  cursor:pointer;user-select:none;line-height:1;
  display:inline-block;
  transition:color .5s,text-shadow .5s;
}
#card-hint{
  font-family:'Jost',sans-serif;font-weight:200;
  color:rgba(255,255,255,.35);font-size:13px;
  letter-spacing:1px;white-space:nowrap;
  animation:hp 2.8s ease-in-out infinite;pointer-events:none;
}
@keyframes hp{0%,100%{opacity:.2;}50%{opacity:.72;};}

/* ── CLICKABLE STAR LAYER ── */
#cstar-layer{
  position:fixed;inset:0;
  pointer-events:none;
  z-index:44;
}
.cstar{
  position:absolute;
  pointer-events:all;
  cursor:pointer;
  user-select:none;
  line-height:1;
  color:#fff;
  animation:twk var(--d,2.5s) ease-in-out var(--dl,0s) infinite;
  transition:transform .18s ease, filter .18s ease, opacity .18s;
  transform-origin:center;
}
.cstar:hover{
  animation:none !important;
  opacity:1 !important;
  transform:scale(2) !important;
  filter:drop-shadow(0 0 8px rgba(255,255,200,.95))
         drop-shadow(0 0 20px rgba(255,220,120,.7)) !important;
}

/* star-to-heart morph: scale up + crossfade */
@keyframes starMorph{
  0%  {transform:scale(1)    rotate(0deg);  opacity:1; filter:drop-shadow(0 0 6px #fff);}
  40% {transform:scale(2.8)  rotate(15deg); opacity:.7;filter:drop-shadow(0 0 16px #ff6699);}
  70% {transform:scale(2.2)  rotate(-8deg); opacity:.9;filter:drop-shadow(0 0 22px #ff3a6e);}
  100%{transform:scale(0)    rotate(0deg);  opacity:0; filter:none;}
}
.cstar.morphing{
  animation:starMorph .55s ease-in forwards !important;
  pointer-events:none;
}

/* hint pulse at bottom of sky */
#star-hint{
  position:fixed;
  bottom:calc(19% + 28px);
  left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:9px;
  z-index:45;pointer-events:none;
  transition:opacity .5s;
}
#star-hint span:first-child{
  font-size:14px;color:rgba(255,255,255,.4);
  animation:hb 1.8s ease infinite;
}
#star-hint-text{
  font-family:'Jost',sans-serif;font-weight:200;
  color:rgba(255,255,255,.32);font-size:13px;
  letter-spacing:1.8px;white-space:nowrap;
  animation:hp 2.8s ease-in-out infinite;
}
/* bottom action bar on card */
#card-actions{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%);
  display:flex;gap:12px;align-items:center;
  z-index:50;opacity:0;
  transition:opacity .8s ease;
}
#card-actions.show{opacity:1;pointer-events:all;}
#btn-wa{
  display:flex;align-items:center;gap:8px;
  background:rgba(37,211,102,.15);
  border:1px solid rgba(37,211,102,.35);
  border-radius:40px;
  color:rgba(120,240,140,.9);
  font-family:'Jost',sans-serif;font-weight:300;
  font-size:13px;letter-spacing:2px;text-transform:uppercase;
  padding:11px 26px;cursor:pointer;
  transition:all .25s;text-decoration:none;
}
#btn-wa:hover{background:rgba(37,211,102,.25);box-shadow:0 4px 18px rgba(37,211,102,.18);}
#btn-wa svg{width:18px;height:18px;fill:currentColor;}
#btn-restart{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:40px;color:rgba(255,255,255,.4);
  font-family:'Jost',sans-serif;font-weight:200;
  font-size:12px;letter-spacing:2px;text-transform:uppercase;
  padding:11px 22px;cursor:pointer;transition:all .25s;
}
#btn-restart:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);}

/* ripple + particles */
.ripple{
  position:fixed;border-radius:50%;
  border:1.5px solid rgba(255,58,110,.55);
  pointer-events:none;z-index:22;
  animation:rp .95s ease-out forwards;
}
@keyframes rp{
  0%{width:0;height:0;opacity:.8;margin:0;}
  100%{width:90px;height:90px;opacity:0;margin:-45px;}
}
.pt{
  position:fixed;width:3px;height:3px;border-radius:50%;
  pointer-events:none;z-index:22;
  animation:ptf var(--pt,.75s) ease-out forwards;
}
@keyframes ptf{
  0%{opacity:1;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:translate(var(--px,0),var(--py,0)) scale(.1);}
}

/* fly hearts */
.fly-heart{
  position:fixed;pointer-events:none;z-index:18;opacity:0;
  animation:flyUp var(--fd,3.5s) ease-out var(--fdl,0s) forwards;
  filter:drop-shadow(0 0 4px currentColor);
}
@keyframes flyUp{
  0%{opacity:0;transform:translate(0,0) scale(.3) rotate(-8deg);}
  10%{opacity:1;transform:translate(var(--fx,6px),-12px) scale(1.05) rotate(-6deg);}
  100%{opacity:0;transform:translate(var(--fx2,20px),-140px) scale(.45) rotate(20deg);}
}
</style>
</head>
<body>

<!-- shared background layers -->
<div id="sky-bg"></div>
<div id="stars-fixed"></div>
<div id="moon-fixed"></div>
<div id="ground-fixed"></div>
<canvas id="tree-canvas"></canvas>
<div id="falling-heart">♥</div>

<!-- ════════ SCREEN 1: PREVIEW ════════ -->
<div id="screen-preview" class="screen active">
  <div id="preview-card">
    <span id="prev-heart">♥</span>
    <div>
      <span id="prev-sub">A Birthday Card for</span>
    </div>
    <span id="prev-title">Someone Special</span>
    <span id="prev-desc">
      A night sky fills with stars, a heart falls gently to earth,<br>
      and a tree of hearts blooms — just for them.
    </span>
    <button class="btn-primary" id="btn-create">Create Your Card</button>
  </div>
</div>

<!-- ════════ SCREEN 2: EDIT ════════ -->
<div id="screen-edit" class="screen hidden">
  <div id="edit-box">
    <div id="edit-header">
      <span id="edit-icon">♥</span>
      <span id="edit-title">Craft the Card</span>
      <span id="edit-hint">fill in the details below</span>
    </div>

    <div class="field">

<script>
/* ══ STARS ══════════════════════════════════ */

/* ══ CANVAS ═══════════════════════════════════ */
const tc=document.getElementById('tree-canvas');
const tCtx=tc.getContext('2d');
let tW,tH,groundY;
function resizeC(){tW=tc.width=window.innerWidth;tH=tc.height=window.innerHeight;groundY=tH*.83;}
resizeC();window.addEventListener('resize',resizeC);

/* ══ STATE ════════════════════════════════════ */
let userName='', userDate='';
let animDone=false, flyInterval=null;
let landX=0, landY=0;
let cardAnimRunning=false;

/* ══ SCREEN NAVIGATION ═══════════════════════ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('active');s.classList.add('hidden');
  });
  const s=document.getElementById(id);
  s.classList.remove('hidden');
  requestAnimationFrame(()=>s.classList.add('active'));
}

document.getElementById('btn-create').addEventListener('click',()=>showScreen('screen-edit'));

document.getElementById('btn-make').addEventListener('click',()=>{

  const year=document.getElementById('inp-year').value.trim();
  if(!name){document.getElementById('inp-name').focus();return;}
  userName=name;
  userDate=`${day||'??'} · ${month||'???'} · ${year||'????'}`;
  resetCardState();
  showScreen('screen-card');
  // start intro typewriter after screen transition
  setTimeout(()=>runIntroSequence(), 700);
});

document.getElementById('btn-restart').addEventListener('click',()=>{

/* ══ RESET CARD STATE ════════════════════════ */
function resetCardState(){
  cardAnimRunning=false; animDone=false;
  if(flyInterval){clearInterval(flyInterval);flyInterval=null;}
  document.querySelectorAll('.fly-heart,.ripple,.pt').forEach(e=>e.remove());
  tCtx.clearRect(0,0,tW,tH);

  // reset intro panel
  const introSince = document.getElementById('intro-since');
  const introDate  = document.getElementById('intro-date');
  if(introSince) introSince.textContent = '';
  if(introDate)  introDate.textContent  = '';

  // hide hint
  const hint = document.getElementById('star-hint');
  if(hint) hint.style.opacity = '0';

  // reset bday panel
  const bdayP = document.getElementById('bday-panel');
  if(bdayP){ bdayP.classList.remove('show'); }
  const twB = document.getElementById('tw-bday');
  if(twB) twB.textContent = '';

  // build stars (hidden until intro done)
  buildClickableStars();

  document.getElementById('falling-heart').style.display='none';
  document.getElementById('card-actions').classList.remove('show');
}

/* ══ INTRO TYPEWRITER (runs on card screen open) ═══ */
function runIntroSequence(){
  const sinceEl = document.getElementById('intro-since');
  const dateEl  = document.getElementById('intro-date');

  // type "The world just got luckier since" slowly (char speed 75ms)
  typeTextInto(sinceEl, 'The world just got luckier since', 75, false, ()=>{
    // pause 400ms then type date in gold
    setTimeout(()=>{
      typeTextInto(dateEl, userDate, 90, true, ()=>{
        // pause 600ms then show stars + hint
        setTimeout(()=>{
          const hint = document.getElementById('star-hint');
          hint.style.transition = 'opacity .8s ease';
          hint.style.opacity = '1';
          // make stars clickable now
          document.querySelectorAll('.cstar').forEach(s=>{
            s.style.pointerEvents = 'all';
          });
        }, 600);
      });
    }, 400);
  });
}

/* ══ GENERIC TYPEWRITER ══════════════════════
   types into a plain div (not a tw-line width trick)
   showCursor = true for the gold date cursor
════════════════════════════════════════════ */
function typeTextInto(el, text, speed, isGold, onDone){
  el.textContent = '';
  // add blinking cursor span
  const cur = document.createElement('span');
  cur.className = 'intro-cursor' + (isGold ? ' gold' : '');
  el.appendChild(cur);

  let i = 0;
  function tick(){
    if(i < text.length){
      // insert character before cursor
      el.insertBefore(document.createTextNode(text[i]), cur);
      i++;
      setTimeout(tick, speed + (Math.random()*speed*.35));
    } else {
      // remove cursor after typing done
      setTimeout(()=>{
        if(cur.parentNode) cur.parentNode.removeChild(cur);
        if(onDone) onDone();
      }, 300);
    }
  }
  tick();
}

/* ══ BUILD CLICKABLE STARS ═══════════════════ */
function buildClickableStars(){
  const layer = document.getElementById('cstar-layer');
  if(!layer) return;
  layer.innerHTML = '';

  const grid = [
    [5,5],[12,14],[20,7],[28,18],[36,5],[44,12],[52,22],[60,8],
    [68,16],[76,6],[84,20],[90,10],[8,30],[18,38],[28,32],[38,42],
    [48,28],[58,36],[68,44],[78,30],[88,38],[4,50],[14,55],[24,48],
    [34,58],[44,52],[54,62],[64,50],[74,58],[84,48]
  ];

  grid.forEach(([lp,tp], i)=>{
    const el = document.createElement('div');
    el.className = 'cstar';
    const left = lp + (Math.random()-0.5)*5;
    const top  = tp + (Math.random()-0.5)*4;
    const sz   = 13 + Math.random()*14;
    const op   = 0.45 + Math.random()*0.45;
    const sym  = (i%4===0)?'✦':(i%4===1)?'★':(i%4===2)?'✧':'⋆';
    el.textContent = sym;
    el.style.cssText = `
      left:${left}vw; top:${top}vh;
      font-size:${sz}px; opacity:${op};
      --d:${1.6+Math.random()*3}s;
      --dl:${Math.random()*5}s;
      --lo:${op*.35}; --hi:${op};
      pointer-events:none;
    `;
    // stars start non-clickable — enabled after intro finishes
    el.addEventListener('click', onStarClick);
    layer.appendChild(el);
  });
}

/* ══ STAR CLICK → MORPH → FALL AS HEART ═════ */
function onStarClick(e){
  if(cardAnimRunning) return;
  cardAnimRunning = true;

  const st = e.currentTarget;
  const r  = st.getBoundingClientRect();
  const sx = r.left + r.width/2;
  const sy = r.top  + r.height/2;

  // fade out intro text
  const introPanel = document.getElementById('intro-panel');
  introPanel.style.transition = 'opacity .5s';
  introPanel.style.opacity = '0';

  // hide hint
  const hint = document.getElementById('star-hint');
  hint.style.opacity = '0';

  // morph the star
  st.classList.add('morphing');

  setTimeout(()=>{
    document.getElementById('cstar-layer').innerHTML = '';

    const targetX = tW * .62;
    const ey      = groundY - 14;
    landX = targetX; landY = ey;

    const fh = document.getElementById('falling-heart');
    fh.textContent = '♥';
    fh.style.cssText = `
      display:block;
      left:${sx-16}px; top:${sy-16}px;
      font-size:32px; color:#ff3a6e;
      text-shadow:0 0 18px rgba(255,58,110,.9), 0 0 40px rgba(255,58,110,.3);
      position:fixed; z-index:50; pointer-events:none;
      line-height:1; transform-origin:center;
    `;

    let t0=null; const dur=3800;
    function fall(ts){
      if(!t0) t0=ts;
      const p  = Math.min((ts-t0)/dur, 1);
      const ep = p<.5 ? 2*p*p : 1-Math.pow(-2*p+2,2)/2;
      const cx = sx + (targetX-sx)*ep;
      const sway = Math.sin(p*Math.PI*3.2)*22*(1-p*.68);
      const rot  = Math.sin(p*Math.PI*2.4)*20;
      const scl  = 1 + Math.sin(p*Math.PI)*.26;
      const glow = 12 + p*24;
      fh.style.top       = (sy+(ey-sy)*ep-16)+'px';
      fh.style.left      = (cx+sway-16)+'px';
      fh.style.transform = `scale(${scl}) rotate(${rot}deg)`;
      fh.style.textShadow= `0 0 ${glow}px rgba(255,58,110,.92), 0 0 ${glow*2}px rgba(255,58,110,.28)`;
      if(p<1){ requestAnimationFrame(fall); }
      else   { fh.style.display='none'; onLand(targetX,ey); }
    }
    requestAnimationFrame(fall);
  }, 300);
}

/* ══ LANDING ════════════════════════════════ */
function spawnRipple(x,y){
  for(let i=0;i<3;i++){
    const rp=document.createElement('div');rp.className='ripple';
    rp.style.cssText=`left:${x}px;top:${y}px;animation-delay:${i*.24}s;border-color:rgba(255,${70+i*35},${90+i*25},.${6-i*2});`;
    document.body.appendChild(rp);rp.addEventListener('animationend',()=>rp.remove());
  }
}
function spawnBurst(x,y){
  const cols=['#ff3a6e','#ff9944','#ffcc44','#ff66aa','#cc44ff','#44aaff','#88ff55'];
  for(let i=0;i<16;i++){
    const pt=document.createElement('div');pt.className='pt';
    const ang=Math.random()*Math.PI*2,dist=22+Math.random()*55;
    pt.style.cssText=`left:${x}px;top:${y}px;background:${cols[i%cols.length]};--px:${Math.cos(ang)*dist}px;--py:${Math.sin(ang)*dist}px;--pt:${.45+Math.random()*.65}s;animation-delay:${Math.random()*.08}s;`;
    document.body.appendChild(pt);pt.addEventListener('animationend',()=>pt.remove());
  }
}

function onLand(lx,ly){
  spawnRipple(lx,ly); spawnBurst(lx,ly);
  setTimeout(()=>growHeartTree(lx,ly), 300);
}

/* ══ TYPEWRITER ENGINE (for bday text) ══════ */
function typeText(el, text, speed, onDone){
  el.textContent = '';
  const cur = document.createElement('span');
  cur.className = 'intro-cursor';
  cur.style.borderColor = 'rgba(255,100,160,.7)';
  el.appendChild(cur);
  let i=0;
  function tick(){
    if(i < text.length){
      el.insertBefore(document.createTextNode(text[i]), cur);
      i++;
      setTimeout(tick, speed + Math.random()*speed*.35);
    } else {
      setTimeout(()=>{ if(cur.parentNode) cur.parentNode.removeChild(cur); if(onDone)onDone(); },300);
    }
  }
  tick();
}

/* ══ WHATSAPP ════════════════════════════════ */
function setupWhatsApp(){

/* ══ HEART COLOURS ══════════════════════════ */
const HC=['#ff3a6e','#ff6b9d','#ff99cc','#ffcc44','#ff5588',
  '#ee1155','#ff8822','#cc44ff','#44aaff','#55ffcc',
  '#ff44aa','#ffee55','#88ff44','#ff7744'];

/* ── draw a filled canvas heart ── */
function drawHeart(x,y,sz,col,alpha){
  tCtx.save();
  tCtx.globalAlpha=alpha;
  tCtx.fillStyle=col;
  tCtx.shadowColor=col;
  tCtx.shadowBlur=sz*3.5;
  const s=sz*.05;
  tCtx.beginPath();
  tCtx.moveTo(x,y-s*2);
  tCtx.bezierCurveTo(x+s*5,y-s*10,x+s*13,y+s*2,x,y+s*10);
  tCtx.bezierCurveTo(x-s*13,y+s*2,x-s*5,y-s*10,x,y-s*2);
  tCtx.closePath();
  tCtx.fill();
  tCtx.restore();
}

/* ══ HEART TREE ══════════════════════════════
   Instead of brush strokes, builds a tree made
   entirely from colourful hearts of increasing
   size. The hearts appear from root up, growing
   the tree shape organically.
════════════════════════════════════════════ */
function growHeartTree(rootX, rootY){
  // Build branch skeleton (same recursive system)
  const nodes = [];
  const MAX_DEPTH = 8;

  function build(sx, sy, angle, len, depth, startMs){
    if(depth > MAX_DEPTH) return;
    const bendX = (Math.random()-.5)*len*.32;
    const bendY = (Math.random()-.5)*len*.14;
    const ex = sx + Math.sin(angle)*len + bendX;
    const ey = sy - Math.cos(angle)*len + bendY;
    const drawDur = 280 + depth*32;
    nodes.push({ sx, sy, ex, ey, bendX, bendY, depth, startMs, drawDur });

    if(depth < MAX_DEPTH){
      const childStart = startMs + drawDur*.50;
      const spread = (Math.PI/5.2) + Math.random()*(Math.PI/8.5);
      const lenScale = .62 + Math.random()*.13;
      const bias = (Math.random()-.5)*.16;
      const three = depth < 3 && Math.random() < .4;
      build(ex, ey, angle - spread + bias, len*lenScale,       depth+1, childStart);
      build(ex, ey, angle + spread + bias, len*(lenScale-.03), depth+1, childStart);
      if(three) build(ex, ey, angle + bias*.3, len*lenScale*.7, depth+1, childStart+90);
    }
  }

  build(rootX, rootY, 0, tH*.13, 0, 0);

  function lerp(a,b,t){ return a+(b-a)*t; }

  const t0 = performance.now();
  const totalDur = nodes.reduce((m,n)=>Math.max(m, n.startMs+n.drawDur), 0) + 1800;
  // store all final heart positions for falling later
  const heartPositions = [];

  function frame(now){
    tCtx.clearRect(0,0,tW,tH);
    const elapsed = now - t0;

    for(const b of nodes){
      const el = elapsed - b.startMs;
      if(el <= 0) continue;
      const prog = Math.min(el/b.drawDur, 1);
      const eased = 1 - Math.pow(1-prog, 2.5);

      // draw hearts along the branch path as it grows
      // number of hearts = proportional to depth
      const numDots = Math.max(3, 8 - b.depth);
      const showDots = Math.floor(eased * numDots);

      const mx = (b.sx+b.ex)/2 + b.bendX*.5;
      const my = (b.sy+b.ey)/2 + b.bendY*.5;

      for(let di=0; di<=showDots; di++){
        const t = di / (numDots);
        const hx = lerp(lerp(b.sx,mx,t), lerp(mx,b.ex,t), t);
        const hy = lerp(lerp(b.sy,my,t), lerp(my,b.ey,t), t);
        // size: larger near root, smaller at tips
        const sizeFactor = 1 - (b.depth/MAX_DEPTH)*.65;
        const sz = (6 + (numDots-di)*.8) * sizeFactor;
        const col = HC[((b.depth*3 + di*2) % HC.length)];
        const alpha = .45 + eased*.45;
        drawHeart(hx, hy, Math.max(sz,2), col, alpha);
      }

      // record tip hearts for falling
      if(prog >= 1 && b.depth >= MAX_DEPTH-1){
        heartPositions.push({ x: b.ex, y: b.ey,
          col: HC[Math.floor(Math.random()*HC.length)] });
      }
    }

    if(elapsed < totalDur){
      requestAnimationFrame(frame);
    } else {
      // tree done — start gentle heart drip + bday text together
      startGentleDrip(rootX, rootY, heartPositions);
      showBirthdayText();
    }
  }
  requestAnimationFrame(frame);
}

/* ══ GENTLE HEART DRIP (2-3 hearts, one at a time) ══
   Not a burst — individual hearts drift down slowly
   from random branch tips, one after another
═════════════════════════════════════════════════════ */
function startGentleDrip(rootX, rootY, positions){
  const cols = HC;

  function dropOne(delay){
    setTimeout(()=>{
      // pick a random position near tree canopy
      const pos = positions.length
        ? positions[Math.floor(Math.random()*positions.length)]
        : { x: rootX + (Math.random()-.5)*120,
            y: rootY - tH*.35,
            col: HC[Math.floor(Math.random()*HC.length)] };

      const fh = document.createElement('div');
      fh.className = 'fly-heart';
      const sz  = 16 + Math.random()*14;
      const fx  = (Math.random()-.5)*50;
      const fx2 = fx + (Math.random()-.5)*30;
      // convert canvas y to bottom-relative for CSS
      const sb = tH - pos.y + Math.random()*40;

      fh.style.cssText = `
        left:${pos.x + (Math.random()-.5)*60}px;
        bottom:${sb}px;
        font-size:${sz}px;
        color:${pos.col};
        --fd:${3.5+Math.random()*2}s;
        --fdl:0s;
        --fx:${fx}px; --fx2:${fx2}px;
        text-shadow:0 0 10px ${pos.col};
      `;
      fh.textContent = '♥';
      document.body.appendChild(fh);
      fh.addEventListener('animationend', ()=>fh.remove());
    }, delay);
  }

  // drop 3 hearts, staggered 1.8s apart — gentle, not a shower
  dropOne(400);
  dropOne(2200);
  dropOne(4000);

  // then repeat very gently every ~6s (just 1 at a time)
  flyInterval = setInterval(()=>dropOne(0), 6000);
}

/* ══ BIRTHDAY TEXT (types at bottom while hearts drip) ═ */
function showBirthdayText(){
  const bdayP = document.getElementById('bday-panel');
  const twB   = document.getElementById('tw-bday');
  bdayP.classList.add('show');

  const text = 'Happy Birthday, ' + userName;
  typeText(twB, text, 62, ()=>{
    // add pulsing heart
    const acc = document.createElement('span');
    acc.id = 'tw-bday-heart';
    acc.textContent = ' ♥';
    twB.appendChild(acc);
    // show share buttons
    setTimeout(()=>{
      document.getElementById('card-actions').classList.add('show');
      setupWhatsApp();
    }, 800);
  });
}
/* ══ URL PARAM AUTO-LOAD ════════════════════ */
(function(){
  const params = new URLSearchParams(window.location.search);
  const pName  = params.get('name');
  const pDate  = params.get('date');
  if(pName && pDate){
    document.getElementById('inp-name').value = pName;
    const parts = pDate.split('·').map(s=>s.trim());
    if(parts[0]) document.getElementById('inp-day').value   = parts[0];
    if(parts[1]) document.getElementById('inp-month').value = parts[1];
    if(parts[2]) document.getElementById('inp-year').value  = parts[2];
    userName = pName; userDate = pDate;
    resetCardState();
    showScreen('screen-card');
    // run intro then auto-click a star
    setTimeout(()=>runIntroSequence(), 500);
    // auto-click after intro finishes (~8s for slow typing)
    setTimeout(()=>{
      const stars = document.querySelectorAll('.cstar');
      if(stars.length){
        stars[Math.floor(stars.length/2)].dispatchEvent(new Event('click'));
      }
    }, 9500);
  }
})();
</script>
</body>
</html>
