<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mother's Day Cards — WishYou.ai</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
<meta name="description" content="Create a beautiful Mother's Day card with photos, music & a heartfelt letter.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(160deg,#FDF6F0 0%,#F7E8E8 50%,#FDF6F0 100%);display:flex;align-items:center;justify-content:center;min-height:100vh;}
.petals-bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.petal{position:absolute;bottom:-20px;animation:petalFloat linear infinite;opacity:0;}
@keyframes petalFloat{0%{transform:translateY(0) rotate(0deg);opacity:0;}10%{opacity:0.6;}90%{opacity:0.3;}100%{transform:translateY(-110vh) rotate(360deg);opacity:0;}}
.card{position:relative;z-index:1;background:rgba(255,255,255,0.92);border-radius:28px;width:100%;max-width:390px;margin:16px;padding:32px 22px 28px;box-shadow:0 20px 60px rgba(201,114,122,0.15);border:1.5px solid rgba(255,255,255,0.95);text-align:center;animation:fadeUp 0.6s cubic-bezier(.22,1,.36,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.back-link{position:absolute;top:16px;left:16px;width:36px;height:36px;border-radius:50%;background:rgba(201,114,122,0.08);border:1px solid rgba(201,114,122,0.15);display:flex;align-items:center;justify-content:center;font-size:1rem;text-decoration:none;color:#8B5A5A;transition:background 0.2s;}
.big-emoji{font-size:2.4rem;display:block;margin-bottom:12px;animation:hb 2.4s ease infinite;}
@keyframes hb{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
h1{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:700;color:#3D1C1C;margin-bottom:6px;}
.sub{font-size:0.88rem;color:#8B5A5A;margin-bottom:24px;line-height:1.5;}
.label{font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#8B5A5A;margin-bottom:14px;}
.style-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.style-card{border-radius:18px;padding:20px 12px 16px;cursor:pointer;text-decoration:none;display:block;transition:transform 0.18s,box-shadow 0.18s;touch-action:manipulation;}
.style-card:active{transform:scale(0.95);}
.style-card.blossom{background:linear-gradient(150deg,#FDF0F3,#F7E0E5);border:1.5px solid rgba(201,114,122,0.2);}
.style-card.blossom:hover{box-shadow:0 12px 32px rgba(201,114,122,0.2);transform:translateY(-4px);}
.style-card.sunshine{background:#FFF8E1;border:1.5px solid rgba(255,193,7,0.3);}
.style-card.sunshine:hover{box-shadow:0 12px 32px rgba(255,193,7,0.2);transform:translateY(-4px);}
.style-emoji{font-size:2rem;display:block;margin-bottom:8px;}
.style-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:#3D1C1C;margin-bottom:4px;}
.style-card.sunshine .style-name{color:#7B5800;}
.style-desc{font-size:0.62rem;color:#8B5A5A;line-height:1.4;}
.style-card.sunshine .style-desc{color:#8B6914;}
.style-btn{margin-top:10px;border-radius:50px;padding:7px 0;font-size:0.7rem;font-weight:600;color:white;background:linear-gradient(135deg,#C9727A,#C9973A);}
.style-card.sunshine .style-btn{background:linear-gradient(135deg,#F9A825,#F57F17);}
.coming-soon{font-size:0.6rem;background:rgba(255,193,7,0.2);color:#7B5800;border-radius:6px;padding:3px 8px;margin-top:4px;display:inline-block;}
.footer-note{font-size:0.68rem;color:#8B5A5A;opacity:0.7;margin-top:4px;}
.wm{position:fixed;bottom:10px;right:14px;z-index:100;font-size:0.62rem;color:rgba(201,114,122,0.5);font-weight:600;letter-spacing:0.04em;}
.wm a{color:inherit;text-decoration:none;}
</style>
</head>
<body>
<div class="petals-bg" id="petalsBg"></div>
<div class="card">
  <a href="/" class="back-link">←</a>
  <span class="big-emoji">🌸</span>
  <h1>Mother's Day Cards</h1>
  <p class="sub">Choose the perfect style<br>for the most important person</p>
  <div class="label">Choose a style</div>
  <div class="style-grid">
    <a href="blossom.html" class="style-card blossom">
      <span class="style-emoji">🌸</span>
      <div class="style-name">Blossom</div>
      <div class="style-desc">Soft & emotional<br>cinematic reveal</div>
      <div class="style-btn">Create Card ›</div>
    </a>
    <div class="style-card sunshine" style="cursor:default;opacity:0.7;">
      <span class="style-emoji">☀️</span>
      <div class="style-name">Sunshine</div>
      <div class="style-desc">Fun & colourful<br>retro celebration</div>
      <div class="style-btn" style="background:rgba(0,0,0,0.1);color:#7B5800;">Coming Soon</div>
      <div class="coming-soon">Available soon!</div>
    </div>
  </div>
  <div class="footer-note">🌸 Step-by-step creation • No sign up needed</div>
</div>
<div class="wm"><a href="/">WishYou.ai</a></div>
<script>
(function(){
  const bg=document.getElementById('petalsBg');
  ['🌸','🌷','🌺','💐','✨','🌸'].forEach(function(e){
    var p=document.createElement('span'); p.className='petal'; p.textContent=e;
    p.style.cssText='left:'+Math.random()*100+'%;font-size:'+(9+Math.random()*10)+'px;animation-duration:'+(14+Math.random()*18)+'s;animation-delay:'+(Math.random()*16)+'s;';
    bg.appendChild(p);
  });
})();
</script>
</body>
</html>
