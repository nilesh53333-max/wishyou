<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WishYou.ai — Send Love, Beautifully</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💝</text></svg>">
<meta property="og:title" content="WishYou.ai — Send Love, Beautifully">
<meta property="og:description" content="Interactive cards with photos, music & heartfelt letters.">
<meta property="og:image" content="https://wishyou.ai/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:#111;display:flex;align-items:center;justify-content:center;}

.app{position:relative;width:100%;max-width:430px;height:100vh;overflow:hidden;margin:0 auto;}
@media(min-width:500px){
  .app{height:90vh;max-height:900px;border-radius:40px;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,0.8);}
}

/* OCCASION SCREEN */
#s-occasion{
  position:absolute;inset:0;
  background:linear-gradient(160deg,#0a0008 0%,#140010 50%,#0a0008 100%);
  display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.occ-header{padding:52px 28px 24px;text-align:center;position:relative;}
.occ-logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;letter-spacing:0.15em;color:rgba(255,255,255,0.4);font-weight:400;text-transform:uppercase;margin-bottom:28px;display:block;}
.occ-headline{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,8vw,2.8rem);font-weight:700;color:white;line-height:1.15;margin-bottom:8px;}
.occ-headline em{font-style:italic;background:linear-gradient(135deg,#e83878,#f0a030);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.occ-sub{font-size:0.82rem;color:rgba(255,255,255,0.4);letter-spacing:0.05em;}
.occ-grid{padding:0 18px 40px;display:flex;flex-direction:column;gap:10px;flex:1;}

.occ-item{border-radius:18px;padding:20px 22px;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;gap:18px;border:1px solid rgba(255,255,255,0.07);transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;position:relative;overflow:hidden;}
.occ-item:active{transform:scale(0.97);}
.occ-item::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.3s;background:rgba(255,255,255,0.04);}
.occ-item:active::before{opacity:1;}
.occ-item.birthday{background:linear-gradient(135deg,#1c0410,#2e0b1c);border-color:rgba(232,56,120,0.2);}
.occ-item.birthday:hover{border-color:rgba(232,56,120,0.4);box-shadow:0 8px 32px rgba(232,56,120,0.15);}
.occ-item.mothersday{background:linear-gradient(135deg,#130c06,#221508);border-color:rgba(240,160,60,0.2);}
.occ-item.mothersday:hover{border-color:rgba(240,160,60,0.4);box-shadow:0 8px 32px rgba(240,160,60,0.15);}
.occ-item.anniversary{background:linear-gradient(135deg,#0b0d1e,#161230);border-color:rgba(100,80,220,0.2);opacity:0.5;cursor:default;}
.occ-item.valentine{background:linear-gradient(135deg,#1c0414,#320820);border-color:rgba(220,50,120,0.2);opacity:0.5;cursor:default;}

.occ-icon-wrap{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;background:rgba(255,255,255,0.06);}
.occ-info{flex:1;}
.occ-name{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;color:white;margin-bottom:2px;}
.occ-desc{font-size:0.72rem;color:rgba(255,255,255,0.4);line-height:1.4;}
.occ-badge{font-size:0.58rem;font-weight:600;letter-spacing:0.1em;padding:3px 8px;border-radius:20px;text-transform:uppercase;}
.badge-live{background:rgba(232,56,120,0.2);color:#f06090;border:1px solid rgba(232,56,120,0.3);}
.badge-soon{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.3);border:1px solid rgba(255,255,255,0.08);}

/* STYLE PICKER SCREEN */
#s-style{
  position:absolute;inset:0;
  background:#0f0810;
  display:flex;flex-direction:column;align-items:stretch;
  opacity:0;pointer-events:none;
  transition:opacity 0.4s ease,transform 0.4s cubic-bezier(.4,0,.2,1);
  transform:translateX(60px);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
#s-style.active{opacity:1;pointer-events:all;transform:translateX(0);}

.style-header{padding:52px 24px 20px;display:flex;align-items:center;gap:14px;}
.back-circle{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:rgba(255,255,255,0.6);flex-shrink:0;touch-action:manipulation;transition:background 0.2s;}
.back-circle:active{background:rgba(255,255,255,0.12);}
.style-occasion-label{font-size:0.65rem;color:rgba(255,255,255,0.3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:3px;}
.style-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:white;}
.style-cards-wrap{padding:8px 18px 30px;display:flex;flex-direction:column;gap:16px;flex:1;}

/* CARD PREVIEW CARDS */
.style-card{border-radius:20px;overflow:hidden;cursor:pointer;touch-action:manipulation;transition:transform 0.2s;position:relative;}
.style-card:active{transform:scale(0.97);}
.card-intimate{background:linear-gradient(160deg,#fde8f0,#fce4ec);border:1.5px solid rgba(233,30,99,0.15);padding:20px;}
.card-retro{background:#FFE135;border:3px solid #111;box-shadow:5px 5px 0 #111;padding:20px;}

.card-preview-inner{background:rgba(255,255,255,0.6);border-radius:14px;padding:20px;margin-bottom:14px;text-align:center;}
.card-retro .card-preview-inner{background:white;border:2px solid #111;border-radius:6px;}

.card-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:#4a0e2a;margin-bottom:4px;}
.card-name.retro-name{font-family:'Fredoka One',cursive;color:#d90429;}
.card-desc{font-size:0.62rem;color:#8d3a5a;opacity:0.7;}
.card-desc.retro-desc{font-family:'Patrick Hand',cursive;color:#555;}

.card-btn{width:100%;padding:13px;border:none;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;touch-action:manipulation;transition:transform 0.15s;}
.card-btn:active{transform:scale(0.97);}
.btn-intimate{background:linear-gradient(135deg,#e91e63,#f06292);color:white;box-shadow:0 6px 20px rgba(233,30,99,0.35);}
.btn-retro{background:#d90429;color:white;border:3px solid #111;border-radius:8px;box-shadow:4px 4px 0 #111;font-family:'Fredoka One',cursive;font-size:0.95rem;}
.btn-retro:active{box-shadow:1px 1px 0 #111!important;}

/* PARTICLES */
.particle{position:absolute;pointer-events:none;border-radius:50%;animation:particleDrift linear infinite;}
@keyframes particleDrift{0%{transform:translateY(100vh) scale(0);opacity:0;}10%{opacity:1;}90%{opacity:0.3;}100%{transform:translateY(-20px) scale(1);opacity:0;}}

.wm{position:fixed;bottom:10px;right:14px;z-index:100;font-size:0.6rem;color:rgba(255,255,255,0.2);}
</style>
</head>
<body>
<div class="app">

  <!-- OCCASION PICKER -->
  <div id="s-occasion">
    <div id="particlesBg" style="position:absolute;inset:0;pointer-events:none;overflow:hidden;"></div>
    <div class="occ-header">
      <span class="occ-logo">WishYou.ai</span>
      <div class="occ-headline">Send love,<br><em>beautifully.</em></div>
      <div class="occ-sub">Choose your occasion</div>
    </div>
    <div class="occ-grid">
      <div class="occ-item birthday" onclick="showStyles('birthday')">
        <div class="occ-icon-wrap">🎂</div>
        <div class="occ-info">
          <div class="occ-name">Birthday</div>
          <div class="occ-desc">Make their day unforgettable</div>
        </div>
        <span class="occ-badge badge-live">✦ Live</span>
      </div>
      <div class="occ-item mothersday" onclick="showStyles('mothersday')">
        <div class="occ-icon-wrap">🌸</div>
        <div class="occ-info">
          <div class="occ-name">Mother's Day</div>
          <div class="occ-desc">Thank her the right way</div>
        </div>
        <span class="occ-badge badge-live">✦ Live</span>
      </div>
      <div class="occ-item anniversary">
        <div class="occ-icon-wrap">💍</div>
        <div class="occ-info">
          <div class="occ-name">Anniversary</div>
          <div class="occ-desc">Celebrate your forever together</div>
        </div>
        <span class="occ-badge badge-soon">Soon</span>
      </div>
      <div class="occ-item valentine">
        <div class="occ-icon-wrap">💕</div>
        <div class="occ-info">
          <div class="occ-name">Valentine's</div>
          <div class="occ-desc">Say it with your whole heart</div>
        </div>
        <span class="occ-badge badge-soon">Soon</span>
      </div>
    </div>
  </div>

  <!-- STYLE PICKER -->
  <div id="s-style">
    <div class="style-header">
      <div class="back-circle" onclick="goBack()">←</div>
      <div>
        <div class="style-occasion-label" id="styleLabel">Birthday</div>
        <div class="style-title">Choose your style</div>
      </div>
    </div>
    <div class="style-cards-wrap" id="styleCards"></div>
  </div>

</div>
<div class="wm">WishYou.ai</div>

<script>
// Particles
(function(){
  const bg = document.getElementById('particlesBg');
  const colors = ['rgba(232,56,120,0.4)','rgba(240,160,60,0.3)','rgba(255,255,255,0.15)'];
  for(let i=0;i<20;i++){
    const p=document.createElement('div'); p.className='particle';
    const size=3+Math.random()*5;
    p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${10+Math.random()*15}s;animation-delay:${Math.random()*12}s;`;
    bg.appendChild(p);
  }
})();

function showStyles(occasion){
  const label = document.getElementById('styleLabel');
  const cards = document.getElementById('styleCards');

  if(occasion === 'birthday'){
    label.textContent = 'Birthday';
    cards.innerHTML = `
      <div class="style-card card-intimate" onclick="window.location.href='/birthday/intimate.html'">
        <div class="card-preview-inner">
          <div style="font-size:2.5rem;margin-bottom:10px;">💝</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:#4a0e2a;margin-bottom:4px;">Happy Birthday!</div>
          <div style="font-size:0.7rem;color:#8d3a5a;opacity:0.6;margin-bottom:10px;">Someone special made this just for you 🌸</div>
          <div style="display:flex;gap:6px;justify-content:center;margin-bottom:8px;">
            <div style="width:36px;height:48px;background:white;border-radius:3px;box-shadow:0 2px 8px rgba(0,0,0,0.12);padding:3px 3px 10px;transform:rotate(-2deg);display:flex;align-items:center;justify-content:center;font-size:1rem;">📸</div>
            <div style="width:36px;height:48px;background:white;border-radius:3px;box-shadow:0 2px 8px rgba(0,0,0,0.12);padding:3px 3px 10px;transform:rotate(2deg);display:flex;align-items:center;justify-content:center;font-size:1rem;">🌸</div>
            <div style="width:36px;height:48px;background:white;border-radius:3px;box-shadow:0 2px 8px rgba(0,0,0,0.12);padding:3px 3px 10px;transform:rotate(-1deg);display:flex;align-items:center;justify-content:center;font-size:1rem;">💕</div>
          </div>
          <div style="font-size:0.65rem;color:#8d3a5a;opacity:0.5;">Polaroid photos • Envelope reveal • Heartfelt letter</div>
        </div>
        <div style="margin-bottom:10px;">
          <div class="card-name">💌 Intimate</div>
          <div class="card-desc">Soft & emotional • Envelope reveal</div>
        </div>
        <button class="card-btn btn-intimate" onclick="event.stopPropagation();window.location.href='/birthday/intimate.html'">✨ Create this card</button>
      </div>

      <div class="style-card card-retro" onclick="window.location.href='/birthday/retro.html'">
        <div class="card-preview-inner">
          <div style="font-size:2.5rem;margin-bottom:10px;">🎂</div>
          <div style="font-family:'Fredoka One',cursive;font-size:1rem;color:#d90429;margin-bottom:4px;">Happy Birthday!</div>
          <div style="font-family:'Patrick Hand',cursive;font-size:0.7rem;color:#555;margin-bottom:10px;">Someone special made this 🎊</div>
          <div style="display:flex;gap:4px;justify-content:center;margin-bottom:8px;">
            <div style="width:40px;height:54px;border:2px solid #111;border-radius:3px;background:#fff9c4;display:flex;align-items:center;justify-content:center;font-size:1rem;">🎂</div>
            <div style="width:40px;height:54px;border:2px solid #111;border-radius:3px;background:#ffe0b2;display:flex;align-items:center;justify-content:center;font-size:1rem;">🎉</div>
            <div style="width:40px;height:54px;border:2px solid #111;border-radius:3px;background:#fce4ec;display:flex;align-items:center;justify-content:center;font-size:1rem;">🎈</div>
          </div>
          <div style="font-family:'Patrick Hand',cursive;font-size:0.65rem;color:#555;opacity:0.7;">Comic strip photos • Balloon pop • Newspaper letter</div>
        </div>
        <div style="margin-bottom:10px;">
          <div class="card-name retro-name">🎊 Retro Party</div>
          <div class="card-desc retro-desc">Fun & loud • Balloon pop</div>
        </div>
        <button class="card-btn btn-retro" onclick="event.stopPropagation();window.location.href='/birthday/retro.html'">🎊 Create this card</button>
      </div>
    `;
  } else if(occasion === 'mothersday'){
    label.textContent = "Mother's Day";
    cards.innerHTML = `
      <div class="style-card" style="background:linear-gradient(160deg,#FDF0F3,#F7E0E5);border:1.5px solid rgba(201,114,122,0.2);padding:20px;border-radius:20px;cursor:pointer;" onclick="window.location.href='/mothers-day/blossom.html'">
        <div class="card-preview-inner" style="background:rgba(253,246,240,0.8);">
          <div style="font-size:2.5rem;margin-bottom:10px;">🌸</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:#3D1C1C;margin-bottom:4px;">Happy Mother's Day!</div>
          <div style="font-size:0.7rem;color:#C9727A;opacity:0.7;margin-bottom:10px;">Someone who loves you made this 💛</div>
        </div>
        <div style="margin-bottom:10px;">
          <div style="font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:#3D1C1C;">🌸 Blossom</div>
          <div style="font-size:0.62rem;color:#C9727A;opacity:0.7;">Warm & tender • Film strip photos</div>
        </div>
        <button style="width:100%;padding:13px;border:none;border-radius:50px;background:linear-gradient(135deg,#C9727A,#C9973A);color:white;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;box-shadow:0 6px 20px rgba(201,114,122,0.35);" onclick="event.stopPropagation();window.location.href='/mothers-day/blossom.html'">✨ Create this card</button>
      </div>
    `;
  }

  document.getElementById('s-style').classList.add('active');
}

function goBack(){
  document.getElementById('s-style').classList.remove('active');
}
</script>
</body>
</html>
