<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WishYou.ai — Send love, beautifully.</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💝</text></svg>">
<meta property="og:title" content="WishYou.ai — Send love, beautifully.">
<meta property="og:description" content="Create beautiful interactive greeting cards with photos, music & heartfelt letters.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:#061818;color:#e0f0ee;}
.app{position:fixed;inset:0;overflow:hidden;}

/* Ambient glows */
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;}
.bg-glow::before{content:'';position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:800px;height:600px;background:radial-gradient(ellipse,rgba(20,160,140,0.09) 0%,transparent 65%);}
.bg-glow::after{content:'';position:absolute;bottom:-10%;right:-5%;width:500px;height:400px;background:radial-gradient(ellipse,rgba(240,192,64,0.06) 0%,transparent 65%);}

/* Screen */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:1;z-index:1;}

/* Nav */
.top-nav{position:absolute;top:0;left:0;right:0;z-index:10;padding:28px 22px 0;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:0.82rem;font-weight:400;letter-spacing:0.16em;text-transform:uppercase;color:rgba(160,220,210,0.3);}
.step-pill{font-size:0.56rem;letter-spacing:0.12em;text-transform:uppercase;color:rgba(240,192,64,0.4);border:1px solid rgba(240,192,64,0.14);border-radius:50px;padding:4px 11px;}

/* Step wrap */
.step-wrap{flex:1;display:flex;flex-direction:column;padding:76px 22px 0;overflow:hidden;min-height:0;}
.step-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:10px;min-height:0;}
.step-content::-webkit-scrollbar{display:none;}

/* Eyebrow */
.eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.eyebrow-line{width:18px;height:1px;background:rgba(240,192,64,0.3);}
.eyebrow-txt{font-size:0.56rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(240,192,64,0.4);}

/* Title */
.page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.7rem,6vw,2.2rem);font-weight:300;line-height:1.15;color:rgba(224,240,238,0.92);margin-bottom:4px;text-align:left;}
.page-title em{font-style:italic;color:#f0c040;}
.page-sub{font-size:0.78rem;color:rgba(160,220,210,0.3);line-height:1.7;margin-bottom:20px;text-align:left;}

/* Occasions grid */
.occasions-list{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.occasion-tile{border-radius:14px;padding:14px 10px 12px;display:flex;flex-direction:column;align-items:flex-start;transition:all 0.2s ease;border:1px solid rgba(160,220,210,0.14);background:rgba(255,255,255,0.06);box-shadow:0 2px 12px rgba(0,0,0,0.2);position:relative;min-height:100px;}
.occasion-tile.live{cursor:pointer;touch-action:manipulation;}
.occasion-tile.live:active{transform:scale(0.95);background:rgba(20,160,140,0.12);}
.occasion-tile.soon{opacity:0.55;pointer-events:none;}
.occ-icon-wrap{font-size:1.9rem;margin-bottom:8px;line-height:1;}
.occ-name{font-family:'Cormorant Garamond',serif;font-size:0.88rem;font-weight:600;color:rgba(224,240,238,0.9);line-height:1.25;}
.occ-badge{position:absolute;top:8px;right:8px;font-size:0.44rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;border-radius:50px;padding:2px 7px;}
.occ-badge.live-badge{color:rgba(20,160,140,0.9);border:1px solid rgba(20,160,140,0.35);background:rgba(20,160,140,0.1);}
.occ-badge.soon-badge{color:rgba(160,220,210,0.4);border:1px solid rgba(160,220,210,0.15);}

.rule{width:100%;height:1px;background:linear-gradient(to right,transparent,rgba(20,160,140,0.12),rgba(240,192,64,0.07),transparent);margin:18px 0 0;}
</style>
</head>
<body>
<div class="app">
<div class="bg-glow"></div>
<div class="screen">
  <div class="top-nav">
    <div class="nav-logo">WishYou.ai</div>
    <span class="step-pill">Step 1 of 3</span>
  </div>
  <div class="step-wrap">
    <div class="step-content">
      <div class="eyebrow"><span class="eyebrow-line"></span><span class="eyebrow-txt">Let's begin</span><span class="eyebrow-line"></span></div>
      <div class="page-title">What's the<br><em>occasion?</em></div>
      <div class="page-sub">Pick what you're celebrating</div>
      <div class="occasions-list">
        <div class="occasion-tile live" onclick="go('birthday/')">
          <div class="occ-icon-wrap">🎂</div>
          <div class="occ-name">Birthday</div>
          <span class="occ-badge live-badge">LIVE</span>
        </div>
        <div class="occasion-tile live" onclick="go('mothersday/')">
          <div class="occ-icon-wrap">🌸</div>
          <div class="occ-name">Mother's Day</div>
          <span class="occ-badge live-badge">LIVE</span>
        </div>
        <div class="occasion-tile live" onclick="go('valentine/')">
          <div class="occ-icon-wrap">❤️</div>
          <div class="occ-name">Valentine's Day</div>
          <span class="occ-badge live-badge">LIVE</span>
        </div>
        <div class="occasion-tile soon">
          <div class="occ-icon-wrap">💍</div>
          <div class="occ-name">Anniversary</div>
          <span class="occ-badge soon-badge">SOON</span>
        </div>
        <div class="occasion-tile soon">
          <div class="occ-icon-wrap">🤝</div>
          <div class="occ-name">Friendship Day</div>
          <span class="occ-badge soon-badge">SOON</span>
        </div>
        <div class="occasion-tile soon">
          <div class="occ-icon-wrap">👨</div>
          <div class="occ-name">Father's Day</div>
          <span class="occ-badge soon-badge">SOON</span>
        </div>
        <div class="occasion-tile soon">
          <div class="occ-icon-wrap">🎓</div>
          <div class="occ-name">Graduation</div>
          <span class="occ-badge soon-badge">SOON</span>
        </div>
        <div class="occasion-tile soon">
          <div class="occ-icon-wrap">👶</div>
          <div class="occ-name">New Baby</div>
          <span class="occ-badge soon-badge">SOON</span>
        </div>
        <div class="occasion-tile soon">
          <div class="occ-icon-wrap">🎄</div>
          <div class="occ-name">Christmas</div>
          <span class="occ-badge soon-badge">SOON</span>
        </div>
      </div>
      <div class="rule"></div>
    </div>
  </div>
</div>
</div>
<script>
function go(path) { window.location.href = path; }
</script>
</body>
</html>
