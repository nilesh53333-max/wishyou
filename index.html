<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WishYou.ai — Send Love, Beautifully</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💝</text></svg>">
<meta property="og:title" content="WishYou.ai — Send Love, Beautifully">
<meta property="og:description" content="Interactive cards with photos, music & heartfelt letters.">
<meta property="og:image" content="https://wishyou.ai/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=Fredoka+One&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;height:100%;overflow:hidden;}
.app{position:relative;width:100%;max-width:430px;height:100vh;overflow:hidden;margin:0 auto;}
@media(min-width:500px){
  body{background:#111;display:flex;align-items:center;justify-content:center;}
  .app{height:90vh;max-height:900px;border-radius:40px;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,0.8);}
}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.45s ease,transform 0.45s cubic-bezier(.4,0,.2,1);transform:translateX(60px);overflow:hidden;}
.screen.active{opacity:1;pointer-events:all;transform:translateX(0);}
.screen.slide-out{opacity:0;transform:translateX(-60px);}

/* OCCASION SCREEN */
#s-occasion{background:linear-gradient(170deg,#0a0008 0%,#120010 60%,#0a0008 100%);padding:0;align-items:center;justify-content:center;}
.occ-logo{font-family:'Cormorant Garamond',serif;font-size:0.75rem;letter-spacing:0.22em;color:rgba(255,255,255,0.25);font-weight:400;text-transform:uppercase;display:block;margin-bottom:48px;animation:fadeUp 1s cubic-bezier(.22,1,.36,1) both;}
.occ-headline{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,8vw,3rem);font-weight:700;color:white;line-height:1.1;margin-bottom:12px;text-align:center;animation:fadeUp 1s 0.1s cubic-bezier(.22,1,.36,1) both;}
.occ-headline em{font-style:italic;background:linear-gradient(135deg,#e83878,#f0a030);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.occ-sub{font-size:0.78rem;color:rgba(255,255,255,0.3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:52px;text-align:center;animation:fadeUp 1s 0.2s cubic-bezier(.22,1,.36,1) both;}
.occ-tiles{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;padding:0 28px;animation:fadeUp 1s 0.3s cubic-bezier(.22,1,.36,1) both;}
.occ-tile{aspect-ratio:1;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;border:1px solid rgba(255,255,255,0.07);transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;position:relative;overflow:hidden;gap:10px;}
.occ-tile::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.3s;background:rgba(255,255,255,0.05);}
.occ-tile:active{transform:scale(0.94);}
.occ-tile:active::before{opacity:1;}
.occ-tile.birthday{background:linear-gradient(145deg,#200818,#350d25);}
.occ-tile.birthday:hover{border-color:rgba(232,56,120,0.35);box-shadow:0 16px 48px rgba(232,56,120,0.2);}
.occ-tile.mothersday{background:linear-gradient(145deg,#150e05,#261708);}
.occ-tile.mothersday:hover{border-color:rgba(240,160,60,0.35);box-shadow:0 16px 48px rgba(240,160,60,0.15);}
.occ-tile-emoji{font-size:2.4rem;line-height:1;}
.occ-tile-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:white;text-align:center;line-height:1.2;}
.occ-tile-badge{position:absolute;top:12px;right:12px;width:7px;height:7px;border-radius:50%;background:#e83878;box-shadow:0 0 8px rgba(232,56,120,0.8);animation:pulseDot 2s ease-in-out infinite;}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.7);}}
.occ-coming-soon{font-size:0.65rem;color:rgba(255,255,255,0.2);letter-spacing:0.08em;text-align:center;margin-top:32px;animation:fadeUp 1s 0.45s cubic-bezier(.22,1,.36,1) both;}
#s-occasion::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}
#s-occasion::after{content:'';position:absolute;width:300px;height:300px;top:-80px;left:-80px;background:radial-gradient(circle,rgba(232,56,120,0.08) 0%,transparent 65%);pointer-events:none;z-index:0;animation:blobDrift 12s ease-in-out infinite;}
@keyframes blobDrift{0%,100%{transform:translate(0,0);}50%{transform:translate(40px,30px);}}
.occ-glow-2{position:absolute;width:250px;height:250px;bottom:-60px;right:-60px;background:radial-gradient(circle,rgba(240,160,60,0.06) 0%,transparent 65%);pointer-events:none;z-index:0;animation:blobDrift2 16s ease-in-out infinite;}
@keyframes blobDrift2{0%,100%{transform:translate(0,0);}50%{transform:translate(-30px,-40px);}}

/* STYLE PICKER SCREEN */
#s-style{background:#0f0810;padding:0;align-items:center;overflow-y:auto;-webkit-overflow-scrolling:touch;flex-direction:column;justify-content:flex-start;}
.style-header{padding:52px 24px 16px;display:flex;align-items:center;gap:14px;width:100%;max-width:430px;flex-shrink:0;}
.back-circle{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:rgba(255,255,255,0.6);flex-shrink:0;touch-action:manipulation;transition:background 0.2s;}
.back-circle:active{background:rgba(255,255,255,0.12);}
.style-occasion-label{font-size:0.65rem;color:rgba(255,255,255,0.3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:3px;}
.style-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:white;}
.style-cards-wrap{padding:0 18px 40px;display:flex;flex-direction:column;gap:14px;width:100%;max-width:430px;flex-shrink:0;}

/* PREVIEW CARDS */
.style-preview-card{border-radius:18px;overflow:hidden;cursor:pointer;touch-action:manipulation;transition:transform 0.2s,box-shadow 0.2s;position:relative;width:100%;}
.style-preview-card:active{transform:scale(0.97);}
.preview-intimate{background:linear-gradient(160deg,#fde8f0,#fce4ec);border:1.5px solid rgba(233,30,99,0.15);padding:14px 14px 12px;}
.preview-retro{background:#FFE135;border:3px solid #111;box-shadow:4px 4px 0 #111;padding:14px 14px 12px;}
.preview-blossom{background:linear-gradient(160deg,#FDF0F3,#F7E0E5);border:1.5px solid rgba(201,114,122,0.2);padding:14px 14px 12px;}
.slide-viewport{width:100%;border-radius:10px;overflow:hidden;position:relative;height:140px;margin-bottom:8px;background:rgba(255,255,255,0.6);}
.preview-retro .slide-viewport{background:white;border:2px solid #111;box-shadow:2px 2px 0 #111;}
.preview-slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;opacity:0;transition:opacity 0.6s ease;text-align:center;}
.preview-slide.active-slide{opacity:1;}
.slide-dots{display:flex;gap:5px;justify-content:center;margin-bottom:10px;}
.slide-dot{width:6px;height:6px;border-radius:50%;background:rgba(233,30,99,0.2);transition:all 0.3s;}
.slide-dot.active{background:#e91e63;transform:scale(1.3);}
.retro-dot{background:rgba(17,17,17,0.15)!important;}
.retro-dot.active{background:#d90429!important;}
.slide-screen-label{font-size:0.55rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;opacity:0.4;margin-bottom:6px;}
.slide-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:#4a0e2a;margin-bottom:6px;line-height:1.2;}
.slide-title.retro-slide-title{font-family:'Fredoka One',cursive;color:#d90429;font-size:0.95rem;}
.slide-photos{display:flex;gap:4px;justify-content:center;margin:4px 0;}
.slide-pol{width:38px;height:50px;background:white;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.15);padding:3px 3px 10px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;}
.slide-pol:nth-child(odd){transform:rotate(-2deg);}
.slide-pol:nth-child(even){transform:rotate(2deg);}
.slide-comic{display:flex;gap:3px;justify-content:center;margin:4px 0;}
.slide-panel{width:42px;height:56px;border:2px solid #111;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:1rem;background:#fff9c4;}
.slide-panel:nth-child(2){background:#ffe0b2;}
.slide-panel:nth-child(3){background:#fce4ec;}
.slide-env{font-size:2.2rem;animation:envWiggle 2s ease-in-out infinite;}
@keyframes envWiggle{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}
.slide-balloon{font-size:2.5rem;animation:ballFloat 1.5s ease-in-out infinite;}
@keyframes ballFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.slide-vinyl{width:44px;height:44px;border-radius:50%;background:conic-gradient(#111 0deg,#222 20deg,#111 40deg,#222 60deg,#111 80deg,#222 100deg,#111 120deg,#222 140deg,#111 160deg,#222 180deg,#111 200deg,#222 220deg,#111 240deg,#222 260deg,#111 280deg,#222 300deg,#111 320deg,#222 340deg,#111 360deg);animation:vinylSpin 3s linear infinite;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 3px #333,0 0 0 5px #444;}
@keyframes vinylSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.slide-vinyl-center{width:12px;height:12px;border-radius:50%;background:#e91e63;position:absolute;}
.slide-letter-lines{width:80%;margin:4px auto;}
.slide-line{height:2px;border-radius:2px;background:rgba(74,14,42,0.12);margin-bottom:4px;}
.slide-line:first-child{width:60%;background:rgba(233,30,99,0.3);}
.slide-newspaper{background:#fdf8e7;border:2px solid #111;border-radius:4px;padding:6px 8px;width:100%;}
.slide-news-head{font-family:'Fredoka One',cursive;font-size:0.55rem;color:#111;border-bottom:2px double #111;margin-bottom:4px;padding-bottom:2px;}
.slide-headline{background:#d90429;color:white;font-family:'Fredoka One',cursive;font-size:0.55rem;padding:2px 4px;border-radius:2px;margin-bottom:4px;}
.slide-news-lines{display:flex;flex-direction:column;gap:2px;}
.slide-news-line{height:2px;background:rgba(0,0,0,0.12);border-radius:1px;}
.preview-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.preview-style-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:#4a0e2a;}
.preview-style-name.retro-name{font-family:'Fredoka One',cursive;color:#d90429;}
.preview-style-name.blossom-name{color:#3D1C1C;}
.preview-style-desc{font-size:0.62rem;color:#8d3a5a;margin-top:1px;}
.preview-style-desc.retro-desc{font-family:'Fredoka One',cursive;color:#555;font-size:0.6rem;}
.preview-btn{padding:12px 18px;border:none;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;touch-action:manipulation;width:100%;margin-top:6px;transition:transform 0.15s;}
.preview-btn:active{transform:scale(0.97);}
.preview-btn.intimate-btn{background:linear-gradient(135deg,#e91e63,#f06292);color:white;box-shadow:0 6px 20px rgba(233,30,99,0.35);}
.preview-btn.retro-btn{background:#d90429;color:white;border:2px solid #111;border-radius:6px;box-shadow:3px 3px 0 #111;font-family:'Fredoka One',cursive;font-size:0.9rem;}
.preview-btn.blossom-btn{background:linear-gradient(135deg,#C9727A,#C9973A);color:white;box-shadow:0 6px 20px rgba(201,114,122,0.35);}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.wm{position:fixed;bottom:10px;right:14px;z-index:100;font-size:0.6rem;color:rgba(255,255,255,0.3);font-weight:600;}
.wm a{color:inherit;text-decoration:none;}
</style>
</head>
<body>
<div class="app" id="mainApp">

<div class="screen active" id="s-occasion">
  <div class="occ-glow-2"></div>
  <div style="position:relative;z-index:1;width:100%;display:flex;flex-direction:column;align-items:center;padding:0 0 40px;">
    <span class="occ-logo">WishYou.ai</span>
    <div class="occ-headline">Send love,<br><em>beautifully.</em></div>
    <div class="occ-sub">Choose your occasion</div>
    <div class="occ-tiles">
      <div class="occ-tile birthday" onclick="window.location.href='/birthday/'">
        <div class="occ-tile-badge"></div>
        <span class="occ-tile-emoji">🎂</span>
        <span class="occ-tile-name">Birthday</span>
      </div>
      <div class="occ-tile mothersday" onclick="window.location.href='/mothers-day/'">\
        <div class="occ-tile-badge" style="background:#f0a030;box-shadow:0 0 8px rgba(240,160,60,0.8);"></div>
        <span class="occ-tile-emoji">🌸</span>
        <span class="occ-tile-name">Mother's<br>Day</span>
      </div>
    </div>
    <div class="occ-coming-soon">More occasions coming soon</div>
  </div>
</div>

<div class="screen" id="s-style">
  <div class="style-header">
    <div class="back-circle" onclick="goTo('s-occasion')">←</div>
    <div class="style-header-text">
      <div class="style-occasion-label" id="styleOccasionLabel">Birthday</div>
      <div class="style-title">Choose your style</div>
    </div>
  </div>
  <div class="style-cards-wrap" id="styleCardsWrap"></div>
</div>

</div>
<div class="wm"><a href="https://wishyou.ai">WishYou.ai</a></div>

<script>
let curScreen = 's-occasion';
const slideshowTimers = {};

function goTo(id){
  const prev=document.getElementById(curScreen);
  const next=document.getElementById(id);
  if(!next||curScreen===id) return;
  if(prev){prev.classList.remove('active');prev.classList.add('slide-out');setTimeout(()=>prev.classList.remove('slide-out'),500);}
  next.classList.add('active');
  curScreen=id;
}

function startSlideshow(cardId,totalSlides){
  if(slideshowTimers[cardId]) clearInterval(slideshowTimers[cardId]);
  let idx=0;
  function next(){
    const slides=document.querySelectorAll('#'+cardId+' .preview-slide');
    const dots=document.querySelectorAll('#'+cardId+' .slide-dot');
    slides.forEach(s=>s.classList.remove('active-slide'));
    dots.forEach(d=>d.classList.remove('active'));
    idx=(idx+1)%totalSlides;
    if(slides[idx]) slides[idx].classList.add('active-slide');
    if(dots[idx]) dots[idx].classList.add('active');
  }
  slideshowTimers[cardId]=setInterval(next,2200);
}

function selectOccasion(occ){
  const wrap=document.getElementById('styleCardsWrap');
  const label=document.getElementById('styleOccasionLabel');

  if(occ==='birthday'){
    label.textContent='Birthday';
    wrap.innerHTML=`
      <div class="style-preview-card preview-intimate" id="prev-intimate" onclick="window.location.href='/birthday/intimate.html'">
        <div class="slide-viewport">
          <div class="preview-slide active-slide">
            <div class="slide-screen-label">Welcome Screen</div>
            <div style="font-size:2rem;margin-bottom:6px;">💝</div>
            <div class="slide-title">Happy Birthday!</div>
            <div style="font-size:0.65rem;color:#8d3a5a;opacity:0.7;">Someone special made this just for you 🌸</div>
          </div>
          <div class="preview-slide">
            <div class="slide-screen-label">Your Memories</div>
            <div class="slide-photos">
              <div class="slide-pol">📸</div><div class="slide-pol">🌸</div><div class="slide-pol">💕</div>
            </div>
            <div style="font-size:0.62rem;color:#8d3a5a;margin-top:6px;opacity:0.7;">Your photos as beautiful polaroids</div>
          </div>
          <div class="preview-slide">
            <div class="slide-screen-label">Song Screen</div>
            <div style="position:relative;display:flex;align-items:center;justify-content:center;margin:4px 0;">
              <div class="slide-vinyl"><div class="slide-vinyl-center"></div></div>
            </div>
            <div style="font-size:0.65rem;color:#4a0e2a;font-weight:600;margin-top:6px;">Your Special Song 🎵</div>
          </div>
          <div class="preview-slide">
            <div class="slide-screen-label">Envelope Reveal</div>
            <div class="slide-env">💌</div>
            <div style="font-size:0.62rem;color:#8d3a5a;margin-top:6px;opacity:0.7;">Tap to open the letter...</div>
          </div>
          <div class="preview-slide">
            <div class="slide-screen-label">Heartfelt Letter</div>
            <div style="background:rgba(255,255,255,0.9);border-radius:8px;padding:10px;width:100%;border-top:3px solid #e91e63;">
              <div style="font-family:'Cormorant Garamond',serif;font-size:0.7rem;color:#4a0e2a;font-weight:600;margin-bottom:4px;">Dear Priya,</div>
              <div class="slide-letter-lines">
                <div class="slide-line" style="width:100%"></div>
                <div class="slide-line" style="width:90%"></div>
                <div class="slide-line" style="width:95%"></div>
              </div>
              <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.68rem;color:#e91e63;margin-top:6px;">Forever yours 💕</div>
            </div>
          </div>
        </div>
        <div class="slide-dots">
          <div class="slide-dot active"></div><div class="slide-dot"></div><div class="slide-dot"></div><div class="slide-dot"></div><div class="slide-dot"></div>
        </div>
        <div class="preview-label-row">
          <div>
            <div class="preview-style-name">💌 Intimate</div>
            <div class="preview-style-desc">Soft & emotional • Envelope reveal • Photos & song</div>
          </div>
        </div>
        <button class="preview-btn intimate-btn" onclick="event.stopPropagation();window.location.href='/birthday/intimate.html'">💌 Make this card →</button>
      </div>

      <div class="style-preview-card preview-retro" id="prev-retro" onclick="window.location.href='/birthday/retro.html'">
        <div class="slide-viewport">
          <div class="preview-slide active-slide">
            <div class="slide-screen-label" style="color:#d90429;">Welcome Screen</div>
            <div style="font-size:2rem;margin-bottom:4px;">🎂</div>
            <div class="slide-title retro-slide-title">Happy Birthday!</div>
            <div style="font-family:'Patrick Hand',cursive;font-size:0.65rem;color:#555;">Someone special made this 🎊</div>
          </div>
          <div class="preview-slide">
            <div class="slide-screen-label" style="color:#d90429;">Comic Strip Photos</div>
            <div class="slide-comic">
              <div class="slide-panel">🎂</div><div class="slide-panel">🎉</div><div class="slide-panel">🎈</div>
            </div>
            <div style="font-family:'Patrick Hand',cursive;font-size:0.6rem;color:#555;margin-top:4px;">Your photos as a comic strip!</div>
          </div>
          <div class="preview-slide">
            <div class="slide-screen-label" style="color:#d90429;">Party Anthem</div>
            <div style="background:linear-gradient(135deg,#1a0a00,#2d1500);border-radius:8px;padding:10px;margin:4px 0;width:90%;">
              <div style="display:flex;justify-content:center;"><div class="slide-vinyl" style="width:36px;height:36px;"><div class="slide-vinyl-center" style="background:#FFE135;"></div></div></div>
              <div style="font-family:'Fredoka One',cursive;font-size:0.65rem;color:#FFE135;text-align:center;margin-top:5px;">Your Party Anthem 🎵</div>
            </div>
          </div>
          <div class="preview-slide">
            <div class="slide-screen-label" style="color:#d90429;">Balloon Pop!</div>
            <div class="slide-balloon">🎈</div>
            <div style="font-family:'Fredoka One',cursive;font-size:0.65rem;color:#d90429;margin-top:4px;">Pop it to reveal the letter!</div>
          </div>
          <div class="preview-slide">
            <div class="slide-screen-label" style="color:#d90429;">Newspaper Letter</div>
            <div class="slide-newspaper">
              <div class="slide-news-head">🗞️ THE BIRTHDAY GAZETTE</div>
              <div class="slide-headline">BREAKING: IT'S YOUR BIRTHDAY!</div>
              <div class="slide-news-lines">
                <div class="slide-news-line"></div><div class="slide-news-line" style="width:90%"></div><div class="slide-news-line" style="width:85%"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="slide-dots">
          <div class="slide-dot retro-dot active"></div><div class="slide-dot retro-dot"></div><div class="slide-dot retro-dot"></div><div class="slide-dot retro-dot"></div><div class="slide-dot retro-dot"></div>
        </div>
        <div class="preview-label-row">
          <div>
            <div class="preview-style-name retro-name">🎊 Retro Party</div>
            <div class="preview-style-desc retro-desc">Fun & loud • Balloon pop • Newspaper letter</div>
          </div>
        </div>
        <button class="preview-btn retro-btn" onclick="event.stopPropagation();window.location.href='/birthday/retro.html'">🎊 Make this card →</button>
      </div>`;
    setTimeout(function(){startSlideshow('prev-intimate',5);setTimeout(function(){startSlideshow('prev-retro',5);},1100);},100);

  } else if(occ==='mothersday'){
    label.textContent="Mother's Day";
    wrap.innerHTML=`
      <div class="style-preview-card preview-blossom" id="prev-blossom" onclick="window.location.href='/mothers-day/blossom.html'">
